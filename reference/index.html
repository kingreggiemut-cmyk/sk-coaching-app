const takeover = $("#takeover");
const inner = $("#takeover-inner");

// Lazy-load: fill every <img data-src> inside the freshly-rendered card.
function loadCardImages(){
  inner.querySelectorAll("img[data-src]").forEach(img => {
    img.addEventListener("load", () => img.closest(".imgslot")?.classList.add("loaded"));
    img.addEventListener("error", () => img.closest(".imgslot")?.classList.add("img-missing"));
    img.src = img.dataset.src;
    img.removeAttribute("data-src");
  });
}

// One lazy image slot (placeholder shown until the real screenshot paints)
function imgSlot(src, label){
  return `<div class="imgslot">
    <span class="img-ph">${label}</span>
    <img data-src="${assetUrl(src)}" alt="${label}">
  </div>`;
}

// The field-view slot doubles as the video: a large lazy thumbnail with a gold
// play button + "Watch Breakdown" label. Clicking it EMBEDS the breakdown video
// in place (see embedVideo) so the viewer never leaves the playbook.
function videoSlot(src, label){
  return `<div class="imgslot video-slot" data-video role="button" tabindex="0" aria-label="Watch breakdown">
    <span class="img-ph">${label}</span>
    <img data-src="${assetUrl(src)}" alt="${label}">
    <span class="video-ov">
      <span class="video-play">${PLAY_ICON}</span>
      <span class="video-label">Watch Breakdown</span>
    </span>
  </div>`;
}

// Extract an 11-char YouTube id from any common URL shape (null if none).
// The trailing (?![\w-]) boundary rejects placeholders like "UNLISTED_LINK".
function ytId(url){
  const m = (url||"").match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|v\/|shorts\/))([\w-]{11})(?![\w-])/);
  return m ? m[1] : null;
}

// Swap the field-view thumbnail for the embedded breakdown video, in place.
function embedVideo(slot, url){
  if(slot.classList.contains("playing")) return;
  slot.classList.add("playing");
  const id = ytId(url);
  slot.innerHTML = id
    ? `<iframe class="video-frame"
         src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1&rel=0&modestbranding=1&playsinline=1"
         title="Play breakdown" allow="autoplay; encrypted-media; picture-in-picture; fullscreen"
         allowfullscreen></iframe>`
    : `<div class="video-pending">
         <span class="video-play">${PLAY_ICON}</span>
         <p>Your breakdown video plays here.<br>
           <small>Add this play's YouTube link as <code>videoUrl</code>.</small></p>
       </div>`;
}

const prefersReducedMotion = () => window.matchMedia("(prefers-reduced-motion: reduce)").matches;

// Stagger the inner content blocks — each container's direct children rise in
// one after another, so the card lays itself out in sequence after it lands.
function staggerReveal(root){
  if(prefersReducedMotion()) return;
  root.querySelectorAll(".card-right, .card-left, .overlay-list, .menu-list, .pillars, .card-grid, .form-list, .team-list")
    .forEach(group => Array.from(group.children).forEach((el, i) => {
      el.style.animation = "contentRise .42s var(--ease) both";
      el.style.animationDelay = (0.06 + i * 0.045) + "s";
    }));
}

// Records where the user last clicked a pill/row so the takeover can "whoosh"
// out of that exact spot. Capture phase runs before the open handler fires.
let lastClickOrigin = null;
document.addEventListener("click", (e) => {
  const el = e.target.closest(".patch, .play-item, .callsheet-pill");
  if(el){ const r = el.getBoundingClientRect();
    lastClickOrigin = { x:r.left + r.width/2, y:r.top + r.height/2, t:Date.now() }; }
}, true);

// enter: "scale" (play card, default) | "left" | "right" | "bottom" (panels)
function openTakeover(html, enter){
  inner.innerHTML = html;
  const card = inner.querySelector(".card");
  if(card){
    // if this open came from a fresh pill/row click, balloon out of that spot;
    // otherwise use the directional entrance.
    const o = lastClickOrigin;
    if(o && Date.now() - o.t < 450 && !prefersReducedMotion()){
      const r = card.getBoundingClientRect();
      card.style.transformOrigin = `${(o.x - r.left).toFixed(0)}px ${(o.y - r.top).toFixed(0)}px`;
      card.classList.add("in-morph");
    } else {
      card.classList.add("in-" + (enter || "scale"));
    }
  }
  lastClickOrigin = null;
  loadCardImages();
  staggerReveal(inner);
  takeover.classList.add("open");
  document.body.classList.add("overlay-on");        // hide the field banner behind
  document.removeEventListener("keydown", onKey);   // never stack listeners
  document.addEventListener("keydown", onKey);
}

function closeTakeover(){
  const card = inner.querySelector(".card");
  if(card){ card.style.animation = ""; card.classList.add("out"); }  // play exit anim
  takeover.classList.remove("open");
  document.body.classList.remove("overlay-on");      // restore the field banner
  document.removeEventListener("keydown", onKey);
  state.view = null;
}

function onKey(e){
  if(e.key === "Escape") closeTakeover();
  else if(e.key === "ArrowRight" && state.view?.kind==="play") stepPlay(1);
  else if(e.key === "ArrowLeft"  && state.view?.kind==="play") stepPlay(-1);
}

/* ----- PLAY CARD ----- */
// mode: undefined (grow from center) | "next" (slide in from right) | "prev" (from left)
function openPlay(id, mode){
  const p = PLAYS.find(x => x.id === id);
  if(!p) return;
  // make sure prev/next cycles the list the play actually belongs to
  if(!state.list.includes(id)) state.list = PLAYS.map(x=>x.id);
  state.view = { kind:"play", id };
  const enter = mode === "next" ? "right" : mode === "prev" ? "left" : "scale";

  const typeLabel = (p.type==="Star Play" ? `<span class="star">${STAR_ICON}</span>` : "")
    + p.type + (p.subtype ? ` · ${p.subtype}` : "");

  const reads = p.reads.map(r =>
    `<li><span class="num"></span>
       <span class="read-text"><b>${r.label}</b><br><span>${r.text}</span></span></li>`).join("");

  const adjustments = (p.adjustments||[]).map(a => `<li>${a}</li>`).join("");

  const tags = (p.tags||[]).map(t =>
    `<button class="chip" data-tag="${t}">${tagLabel(t)}</button>`).join("");

  openTakeover(`
    <div class="card cream-patch play-card">
      <button class="card-close" title="Close (Esc)">&times;</button>

      <!-- full-width header: identity on the left, tag pills on the right -->
      <div class="card-head">
        <div class="card-head-id">
          <div class="card-type eyebrow">${typeLabel}</div>
          <h2 class="display card-name">${p.name}</h2>
          <div class="card-form">${p.formation}</div>
          ${p.exclusive ? `<div class="excl excl-lg">${CROWN} Scheme Kings Exclusive Play</div>` : ""}
        </div>
        ${tags ? `<div class="card-head-tags">${tags}</div>` : ""}
      </div>

      <div class="card-body">
        <!-- left: field-view video + formation/play-call + when-to-use -->
        <div class="card-left">
          ${videoSlot(p.images.fieldView, "FIELD VIEW")}
          <div class="thumb-row">
            ${imgSlot(p.images.formation, "FORMATION")}
            ${imgSlot(p.images.playCall, "PLAY CALL")}
          </div>
          ${p.whenToUse ? `<div class="sec-head">When To Use</div><div class="whentouse">${p.whenToUse}</div>` : ""}
        </div>

        <!-- right: setup + reads + adjustments -->
        <div class="card-right">
          ${p.setup ? `<div class="sec-head">Setup</div><div class="setup-note">${p.setup}</div>` : ""}
          <div class="sec-head">Reads</div>
          <ol class="reads">${reads}</ol>
          ${adjustments ? `<div class="sec-head">Adjustments</div><ul class="adjust">${adjustments}</ul>`:""}
          <div class="card-footer">
            <div class="foot-label">${SCHEME_CONFIG.schemeName} <span>· ${p.formation}</span></div>
            <div class="nav-btns">
              <button data-step="-1">&larr; Prev</button>
              <button data-step="1">Next &rarr;</button>
            </div>
          </div>
        </div>
      </div>
    </div>`, enter);

  // wire interactions
  inner.querySelector(".card-close").addEventListener("click", closeTakeover);
  // field-view → embed the breakdown video in place (click or Enter/Space)
  const vslot = inner.querySelector("[data-video]");
  if(vslot){
    const go = () => embedVideo(vslot, p.videoUrl);
    vslot.addEventListener("click", go);
    vslot.addEventListener("keydown", e => {
      if(e.key === "Enter" || e.key === " "){ e.preventDefault(); go(); }
    });
  }
  inner.querySelectorAll("[data-step]").forEach(b =>
    b.addEventListener("click", () => stepPlay(+b.dataset.step)));
  // clicking a tag jumps to the call sheet filtered to that tag
  inner.querySelectorAll("[data-tag]").forEach(b =>
    b.addEventListener("click", () => { state.filter = b.dataset.tag; openCallSheet(); }));
}

// Prev/Next: slide the current card out one way, bring the next in from the other.
let stepping = false;
function stepPlay(dir){
  if(!state.view || state.view.kind!=="play" || stepping) return;
  const list = state.list.length ? state.list : PLAYS.map(p=>p.id);
  let i = list.indexOf(state.view.id);
  i = (i + dir + list.length) % list.length;

  const card = inner.querySelector(".card");
  stepping = true;
  if(card){
    card.style.animation = "none";          // cancel the entrance animation
    card.classList.add("stepping");
    // next → old slides left; prev → old slides right
    card.style.transform = `translateX(${dir>0 ? -64 : 64}px) scale(.98)`;
    card.style.opacity = "0";
  }
  setTimeout(() => {
    openPlay(list[i], dir>0 ? "next" : "prev");   // new card enters from opposite side
    stepping = false;
  }, 165);
}

/* ----- SECTION CARDS (About / Personnel / Formations) ----- */
function openSection(key){
  state.view = { kind:"section", key };
  let body = "", eyebrow = "", title = "";

  if(key === "about"){
    eyebrow = "Scheme Philosophy"; title = ABOUT.title;
    body = `<div class="pillars">` + ABOUT.pillars.map(p =>
      `<div class="pillar cream-patch"><span class="crown-stamp">${CROWN}</span><div class="p-head">${p.head}</div><p>${p.text}</p></div>`).join("") + `</div>`
      + (ABOUT.youtube ? `<a class="yt-link about-yt" href="${ABOUT.youtube}" target="_blank" rel="noopener">${PLAY_ICON} Watch the Full YouTube Breakdown</a>` : "");
  }
  else if(key === "personnel"){
    eyebrow = "Key Positions"; title = "Personnel";
    body = `<div class="card-grid">` + PERSONNEL.map(p =>
      `<div class="mini-card cream-patch">
         <span class="crown-stamp">${CROWN}</span>
         <div class="mc-pos">${p.pos || p.title}</div>
         <div class="mc-role">${p.role}</div>
         <div class="mc-pills">
           <span class="mc-pill"><b>Inspiration</b><i>${p.inspo}</i></span>
           <span class="mc-pill"><b>Card</b><i>${p.card}</i></span>
         </div>
       </div>`).join("") + `</div>`;
  }
  else if(key === "formations"){
    eyebrow = "3 Formations"; title = "Base Sets";
    body = `<div class="form-list">` + FORMATIONS.map(f =>
      `<div class="form-row cream-patch">
         <span class="crown-stamp">${CROWN}</span>
         ${imgSlot(f.img, "FORMATION")}
         <div class="f-text">
           <div class="f-name">${f.name}</div>
           <div class="f-desc">${f.desc}</div>
           ${(f.tags||[]).length ? `<div class="f-tags">${f.tags.map(t => {
             const match = PLAYS.find(x => x.name.toLowerCase() === t.toLowerCase());
             return match
               ? `<button class="ftag" data-play="${match.id}">${t}</button>`
               : `<span class="ftag">${t}</span>`;
           }).join("")}</div>` : ""}
         </div>
       </div>`).join("") + `</div>`;
  }
  else if(key === "series"){
    eyebrow = SERIES.eyebrow; title = SERIES.title;
    body = `<p class="series-intro">${SERIES.intro}</p>
      <div class="team-list">` + SERIES.teams.map(t =>
        `<div class="team-row cream-patch">
           <span class="crown-stamp">${CROWN}</span>
           <div class="t-shield">${t.logo ? `<img src="${assetUrl(t.logo)}" alt="">` : CROWN}</div>
           <div class="t-era">${t.era}</div>
           <div class="t-name">${t.name}</div>
           <p class="t-blurb">${t.blurb}</p>
           <div class="t-actions">
             ${t.youtube ? `<a class="yt-link" href="${t.youtube}" target="_blank" rel="noopener">${PLAY_ICON} Watch YouTube Breakdown</a>` : ""}
             <span class="sk-badge">${CROWN} Full Playbook on Scheme Kings</span>
           </div>
         </div>`).join("") + `</div>
      <p class="series-outro">${SERIES.outro}</p>`;
  }

  openTakeover(`
    <div class="card section-card">
      <button class="card-close" title="Close (Esc)">&times;</button>
      <div class="sc-eyebrow eyebrow">${eyebrow}</div>
      <h2 class="display sc-title">${title}</h2>
      <div class="sc-divider"></div>
      ${body}
    </div>`, "left");

  inner.querySelector(".card-close").addEventListener("click", closeTakeover);
  if(key === "formations"){
    inner.querySelectorAll(".ftag[data-play]").forEach(b =>
      b.addEventListener("click", () => openPlay(b.dataset.play)));
  }
}

/* ----- CATEGORY LIST (opened by a right-side category pill) ----- */
function openCategory(type){
  const plays = PLAYS.filter(p => p.type === type);
  state.view = { kind:"category", type };
  state.list = plays.map(p => p.id);     // prev/next cycles within this category

  const sub = (CATEGORIES.find(c => c.type === type) || {}).sub || "Play Category";
  const title = (CATEGORIES.find(c => c.type === type) || {}).title || type;
  const items = plays.length
    ? plays.map(playItemHTML).join("")
    : `<div class="empty">No plays in this category yet.</div>`;

  openTakeover(`
    <div class="card section-card list-card">
      <button class="card-close" title="Close (Esc)">&times;</button>
      <div class="sc-eyebrow eyebrow">${sub}</div>
      <h2 class="display sc-title">${title}</h2>
      <div class="sc-divider"></div>
      <div class="overlay-list">${items}</div>
    </div>`, "right");

  inner.querySelector(".card-close").addEventListener("click", closeTakeover);
  inner.querySelectorAll("[data-play]").forEach(b =>
    b.addEventListener("click", () => openPlay(b.dataset.play)));
}

/* ----- FULL CALL SHEET (opened by the bottom-center pill) — tag filtering ----- */
function openCallSheet(){
  state.view = { kind:"callsheet" };
  openTakeover(`
    <div class="card section-card list-card">
      <button class="card-close" title="Close (Esc)">&times;</button>
      <div class="sc-eyebrow eyebrow">Tag Filters</div>
      <h2 class="display sc-title">Call Sheet</h2>
      <div class="sc-divider"></div>
      <div class="filter-row" id="ov-filter-row"></div>
      <div class="overlay-list" id="ov-list"></div>
    </div>`, "bottom");
  inner.querySelector(".card-close").addEventListener("click", closeTakeover);
  renderCallSheetBody();
}

// (Re)render the call sheet filter chips + grouped list for the active filter.
function renderCallSheetBody(){
  const match = (p) => state.filter === "all" || (p.tags||[]).includes(state.filter);

  // filter chips
  const fr = $("#ov-filter-row");
  fr.innerHTML = filterChipIds().map(id =>
    `<button class="chip ${id===state.filter?'active':''}" data-filter="${id}">${id==="all" ? "All" : tagLabel(id)}</button>`).join("");
  fr.querySelectorAll("[data-filter]").forEach(b =>
    b.addEventListener("click", () => { state.filter = b.dataset.filter; renderCallSheetBody(); }));

  // grouped play list (also records the order for prev/next)
  const filtered = PLAYS.filter(match);
  state.list = filtered.map(p => p.id);
  const groups = [
    { type:"Run Game",  label:"Run Game" },
    { type:"Pass Game", label:"Pass Game" },
    { type:"Star Play", label:"Star Plays" },
  ];
  let html = "";
  groups.forEach(g => {
    const ps = filtered.filter(p => p.type === g.type);
    if(!ps.length) return;
    html += `<div class="group-label">${g.label}</div>` + ps.map(playItemHTML).join("");
  });
  if(!html) html = `<div class="empty">No plays match this filter.</div>`;

  const list = $("#ov-list");
  list.innerHTML = html;
  list.querySelectorAll("[data-play]").forEach(b =>
    b.addEventListener("click", () => openPlay(b.dataset.play)));
  staggerReveal(inner);   // re-cascade the rows on open + each filter change
}

/* ----- HUB MENUS (mobile) — a hub pill opens a menu of destinations ----- */
function openHub(key){
  if(key === "about"){
    // About content + secondary sections + the series write-up
    openMenu("About", "Scheme · Personnel · Series", [
      { kind:"section", val:"about",      title:"About",            sub:"Scheme Philosophy" },
      { kind:"section", val:"personnel",  title:"Personnel",        sub:"Who Runs It" },
      { kind:"section", val:"formations", title:"Formations",       sub:"Base Sets" },
      { kind:"section", val:"series",     title:SERIES.pillTitle,   sub:SERIES.pillSub },
    ], "left");
  } else { // "plays"
    openMenu("Play Calls", "Choose A Category",
      CATEGORIES.map(c => ({ kind:"category", val:c.type, title:c.title||c.type, sub:c.sub })), "right");
  }
}

// Renders a list of patch-pill destinations inside the takeover overlay.
function openMenu(title, eyebrow, items, enter){
  state.view = { kind:"menu" };
  const pill = (it, attr) =>
    `${attr ? `<button class="patch menu-row" ${attr}>` : `<a class="patch menu-row" href="${it.val}" target="_top">`}
       ${badgeHTML(it.logo || SCHEME_CONFIG.teamLogo)}
       <span class="patch-text">
         <span class="patch-title">${it.title}</span>
         <span class="patch-sub">${it.sub}</span>
       </span>
       <span class="crown">${CROWN}</span>
     ${attr ? `</button>` : `</a>`}`;

  const rows = items.map((it, i) => {
    if(it.kind === "divider") return `<div class="menu-divider"></div>`;
    if(it.kind === "link")    return pill(it, null);
    return pill(it, `data-i="${i}"`);
  }).join("");

  openTakeover(`
    <div class="card section-card list-card menu-card">
      <button class="card-close" title="Close (Esc)">&times;</button>
      <div class="sc-eyebrow eyebrow">${eyebrow}</div>
      <h2 class="display sc-title">${title}</h2>
      <div class="sc-divider"></div>
      <div class="menu-list">${rows}</div>
    </div>`, enter || "bottom");

  inner.querySelector(".card-close").addEventListener("click", closeTakeover);
  inner.querySelectorAll("[data-i]").forEach(b => {
    const it = items[+b.dataset.i];
    b.addEventListener("click", () => {
      if(it.kind === "section")  openSection(it.val);
      else if(it.kind === "category") openCategory(it.val);
    });
  });
}

// Close the takeover by clicking the dark overlay (outside the card).
takeover.addEventListener("click", (e) => { if(e.target === takeover) closeTakeover(); });

/* ==========================================================================
   COVER → FIELD transition + boot
   ========================================================================== */
function openPlaybook(){
  const cover = $("#cover");
  cover.classList.add("lift");
  $("#field").classList.add("show");
  setTimeout(() => cover.classList.add("hidden"), 520);
}

function init(){
  applyConfig();
  buildSkCta();         // top-left persistent Scheme Kings CTA badge
  buildNav();           // desktop left pills: About / Personnel / Formations + series
  buildRightNav();      // desktop right pills: play categories
  buildMobileNav();     // mobile hub pills: About / Play Calls
  buildCallSheetPill(); // bottom-center call sheet pill (both layouts)
  $("#open-btn").addEventListener("click", openPlaybook);
}
init();
</script>
