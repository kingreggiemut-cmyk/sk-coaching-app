/* =====================================================================
   DRIVE BUILDER - situation-first call sheet. Scheme-INDEPENDENT: fixed
   Scheme Kings brand colors (navy/gold/cream), the painterly field floats
   as a 3D object, the camera flies over it, a coaching scoreboard drops in.
   ===================================================================== */
/* full-bleed: no card box - the field floats on a dark, out-of-focus backdrop */
#takeover.drive-open{
  padding:0;
  background:rgba(6,7,13,0.8);
  backdrop-filter:blur(11px); -webkit-backdrop-filter:blur(11px);
}
/* Scheme DNA blurs the field behind the floating graphs - lighter than the
   Drive Builder so more of the stadium reads through (no solid panel). */
#takeover.dna-open{
  background:rgba(6,7,13,0.62);
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
}
.drive-card{
  display:block; width:100vw; height:100vh; max-height:100vh; padding:0;
  border:none; border-radius:0; overflow:hidden; background:transparent;
  box-shadow:none;
}
.db-stage{
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center; overflow:hidden;
  background:transparent;            /* the normal app background (dimmed stadium) shows through */
  perspective:1600px;                /* lets coverage situations tilt toward field level */
}
.drive-card .card-close{ z-index:12; }
/* the field WRAP holds the painterly field + the on-field furniture, and gets
   the camera transform so the furniture stays glued to the field and scales. */
.db-fieldwrap{
  position:relative; aspect-ratio:4096/2286; max-width:82%; max-height:84%;
  transform-origin:50% 50%; will-change:transform;
  transition:transform 1.05s cubic-bezier(.62,.01,.06,1);
  filter:drop-shadow(0 28px 40px rgba(0,0,0,.55));
}
.db-field{ width:100%; height:100%; object-fit:cover; display:block; }
/* ---- close (QB-POV) field: brand field #2, layered over the full field ----
   Lives in an absolute grid-centered layer so it overlays the full field exactly
   without disturbing the flex centering. Sits above the field, below the wash tint. */
.db-closelayer{ position:absolute; inset:0; display:grid; place-items:center;
  pointer-events:none; z-index:2; }
.db-closewrap{
  position:relative; aspect-ratio:4096/2286; max-width:82%; max-height:84%;
  transform-origin:50% 52%; will-change:transform, opacity, filter;
  /* ENTER start state: the close field RESOLVES out of blur (it "populates" the view
     as the wide field dives in + blurs out). Starts mildly zoomed + blurred, lands
     sharp at scale 1 - the wide field carries the big zoom, this resolves the focus. */
  opacity:0; transform:scale(1.22); filter:blur(20px);
  transition:opacity .5s ease,
             filter .86s cubic-bezier(.2,.7,.15,1),
             transform .96s cubic-bezier(.16,.72,.2,1);
}
.db-closewrap.on{ opacity:1; transform:scale(1); filter:blur(0px); }
/* arriving from an already-zoomed wide look - start tighter so the resolve feels like
   the tail of a harder push-in. */
.db-closewrap.from-zoom{ transform:scale(1.5); transform-origin:50% 44%; }
/* combined state must win the source-order tie with .from-zoom so the dolly lands at 1. */
.db-closewrap.from-zoom.on{ transform:scale(1); }
/* EXIT state: the close field zooms OUT (recedes) + blurs + fades as the camera pulls
   back THROUGH it; the wide field then resolves in underneath to "populate" the view. */
.db-closewrap.leaving{ opacity:0; transform:scale(.8); filter:blur(20px);
  transition:opacity .8s ease, filter .82s ease,
             transform .92s cubic-bezier(.5,0,.75,.5); }
.db-field-close{ width:100%; height:100%; object-fit:cover; display:block;
  /* Feather the L/R/front edges so the cropped field dissolves into the dark
     background instead of a hard rectangular cut - sells the "floating 3D" feel.
     Kept tight (7%) so it doesn't creep in and eat the visible field.
     Top (back endzone) stays crisp; it already reads as real 3D depth. */
  -webkit-mask-image:
    linear-gradient(to right, transparent 0, #000 7%, #000 93%, transparent 100%),
    linear-gradient(to bottom, #000 0, #000 89%, transparent 100%);
  -webkit-mask-composite: source-in;
  mask-image:
    linear-gradient(to right, transparent 0, #000 7%, #000 93%, transparent 100%),
    linear-gradient(to bottom, #000 0, #000 89%, transparent 100%);
  mask-composite: intersect; }
.db-furniture-close{ position:absolute; inset:0; pointer-events:none; perspective:300px; }
.db-furniture-close .db-furn-svg{ position:absolute; inset:0; width:100%; height:100%; overflow:visible; }
/* Radial zoom-streak burst - thin light spokes rushing out from center, masked to a
   ring. Fires on BOTH enter and exit (fireStreak()) to sell the ZoomBlur whoosh. */
.db-zoomstreak{
  position:absolute; width:150%; height:150%; left:-25%; top:-25%;
  pointer-events:none; opacity:0; z-index:1; mix-blend-mode:screen;
  background:repeating-conic-gradient(from 0deg at 50% 50%,
    rgba(255,255,255,0) 0deg, rgba(255,255,255,0) 1.4deg,
    rgba(255,249,232,.55) 2deg, rgba(255,255,255,0) 3deg);
  -webkit-mask-image:radial-gradient(circle at 50% 50%, transparent 18%, #000 50%, transparent 84%);
  mask-image:radial-gradient(circle at 50% 50%, transparent 18%, #000 50%, transparent 84%);
  transform:scale(.5);
}
.db-zoomstreak.fire{ animation:dbZoomStreak .82s cubic-bezier(.16,.74,.2,1) forwards; }
@keyframes dbZoomStreak{
  0%{ opacity:0; transform:scale(.45) rotate(0deg); }
  28%{ opacity:.62; }
  100%{ opacity:0; transform:scale(2.0) rotate(7deg); }
}
/* the full field's dive-in (enter) / resolve-in (exit) end-state. Transition timing is
   set inline by JS (DIVE vs RESOLVE) because it differs by direction. */
.db-fieldwrap.recede{ opacity:0; filter:blur(18px) drop-shadow(0 28px 40px rgba(0,0,0,.55)); }
@media (prefers-reduced-motion: reduce){
  .db-closewrap{ transform:scale(1.04); filter:blur(5px);
    transition:opacity .3s ease, filter .3s ease, transform .3s ease; }
  .db-closewrap.from-zoom{ transform:scale(1.06); }
  .db-zoomstreak.fire{ animation:none; }
}
/* on-field furniture (line of scrimmage, first-down line, football) in field-space */
.db-furniture{ position:absolute; inset:0; pointer-events:none; perspective:300px; }
.db-furn-svg{ position:absolute; inset:0; width:100%; height:100%; overflow:visible; }
.db-los, .db-fd{ transform-box:fill-box; transform-origin:center; transform:scaleX(0); opacity:0;
  stroke-linecap:round; transition:transform .52s cubic-bezier(.22,1,.36,1), opacity .35s; }
.db-los{ stroke:#5aa0ff; stroke-width:4.5; }
.db-fd{ stroke:#ffd21f; stroke-width:4.5; }
.db-band{ fill:rgba(196,32,28,.3); opacity:0; transition:opacity .55s ease .1s; }
.db-furniture.on .db-band{ opacity:1; }
/* coverage graphics (zones / man) */
.db-cov{ opacity:0; transition:opacity .5s ease .15s; }
.db-furniture.on .db-cov{ opacity:1; }
.db-furniture-close .db-cov{ opacity:1; transition:none; }
.db-cov .zdeep{ fill:rgba(53,138,221,.28); stroke:rgba(140,190,240,.7); stroke-width:1.5; }
.db-cov .zund{ fill:rgba(245,166,35,.22); stroke:rgba(245,166,35,.7); stroke-width:1.5; }
.db-cov .cov-o{ fill:#f4efe0; stroke:#16285c; stroke-width:2.5; }       /* receiver */
.db-cov .cov-d{ fill:#16285c; stroke:#F5A623; stroke-width:2.5; }      /* defender */
.db-cov .cov-assign{ stroke:#F5A623; stroke-width:2.4; stroke-dasharray:7 5; fill:none;
  filter:drop-shadow(0 0 2px rgba(0,0,0,.4)); }
.db-cov .cov-blitz{ stroke:#F5A623; stroke-width:3.2; fill:none; filter:drop-shadow(0 0 3px rgba(0,0,0,.45)); }
.db-cov .zbadge{ fill:rgba(13,22,45,.66); stroke:#F5A623; stroke-width:1.8; }
.db-cov .zbadge-txt{ font-family:var(--font-display); font-weight:900; font-size:13px; fill:#F0E7CB;
  text-transform:uppercase; letter-spacing:.4px; }
/* One-Play TD - arcing deep ball + target */
/* One-Play TD - deep-ball arc (field-space): yellow arc, BLUE target */
.db-cov .shot-arc{ fill:none; stroke:#F5A623; stroke-width:3; stroke-linecap:round;
  filter:drop-shadow(0 0 4px rgba(245,166,35,.6)); stroke-dasharray:100; stroke-dashoffset:100; }
.db-furniture.on .shot-arc{ animation:shotDraw 1.15s ease .2s forwards; }
@keyframes shotDraw{ to{ stroke-dashoffset:0; } }
.db-cov .shot-ball ellipse{ fill:#7a4a22; stroke:#3a2410; stroke-width:1.2; }
.db-cov .shot-target{ opacity:0; transform-box:fill-box; transform-origin:center; }
.db-cov .st-ring{ fill:none; stroke:#5aa0ff; stroke-width:2.6; }
.db-cov .st-cross{ stroke:#5aa0ff; stroke-width:2.6; }
.db-furniture.on .shot-target{ animation:shotTarget .5s var(--ease) 1.25s forwards; }
@keyframes shotTarget{ from{ opacity:0; transform:scale(.3);} to{ opacity:.95; transform:scale(1);} }
/* Star Plays - spotlight glow + sparkles on the crown */
.db-cov .star-glow{ fill:#F5A623; opacity:0; filter:blur(30px); transform-box:fill-box; transform-origin:center; }
.db-furniture.on .star-glow{ animation:starBloom 1s ease .2s forwards; }
@keyframes starBloom{ from{ opacity:0; transform:scale(.5);} to{ opacity:.55; transform:scale(1);} }
.db-cov .star-spark{ fill:#ffe08a; opacity:0; transform-box:fill-box; transform-origin:center;
  filter:drop-shadow(0 0 3px rgba(245,166,35,.85)); }
.db-furniture.on .star-spark{ animation:starTwinkle 1.7s ease-in-out .3s infinite; }
.db-cov .star-spark.s1{ animation-delay:.7s; }
.db-cov .star-spark.s2{ animation-delay:1.2s; }
@keyframes starTwinkle{ 0%,100%{ opacity:.15; transform:scale(.6);} 50%{ opacity:1; transform:scale(1.15);} }
.db-furniture.on .db-los{ transform:scaleX(1); opacity:.62; }
.db-furniture.on .db-fd{ transform:scaleX(1); opacity:.72; transition-delay:.12s; }
/* football tilted to lie on the field plane (parent perspective makes it natural,
   not a flat squish) - the base look everywhere */
.db-football{ position:absolute; pointer-events:none; opacity:0;
  transform:translate(-50%,-34%) rotateX(40deg) scale(.8);
  transition:transform .5s cubic-bezier(.16,1,.3,1), opacity .4s;
  filter:drop-shadow(0 6px 7px rgba(0,0,0,.55)); }
.db-furniture.on .db-football{ opacity:1; transform:translate(-50%,-50%) rotateX(40deg) scale(1); }
/* broadcast down-&-distance marker that drops in above the first-down line */
.db-marker{ position:absolute; pointer-events:none; opacity:0;
  transform:translate(-50%,-150%) scale(calc(var(--ms,1) * .8)); transform-origin:center bottom;
  transition:transform .5s cubic-bezier(.16,1,.3,1) .28s, opacity .4s .28s; }
.db-furniture.on .db-marker{ opacity:1; transform:translate(-50%,-118%) scale(var(--ms,1)); }
.db-marker-txt{ display:block; font-family:var(--font-display); font-weight:900; font-size:21px;
  letter-spacing:.5px; text-transform:uppercase; color:#3a1c06; white-space:nowrap;
  background:linear-gradient(180deg,#ffe08a,#F5A623 55%,#bd7d18); border:2px solid #16285c;
  border-radius:6px; padding:4px 11px; box-shadow:0 4px 10px rgba(0,0,0,.55); }
.db-marker::after{ content:""; position:absolute; left:50%; bottom:-9px; transform:translateX(-50%);
  border-left:8px solid transparent; border-right:8px solid transparent; border-top:10px solid #16285c; }
.db-wash{ position:absolute; inset:0; pointer-events:none; background:transparent; transition:background .8s ease; z-index:3; }
.db-vig{ position:absolute; inset:0; pointer-events:none; z-index:3;
  background:radial-gradient(130% 120% at 50% 42%, transparent 52%, rgba(0,0,0,.4) 100%); }
.db-hint{
  position:absolute; left:50%; top:52%; transform:translateX(-50%); z-index:6;
  font-family:var(--font-display); font-weight:800; font-size:15px; letter-spacing:.22em;
  text-transform:uppercase; color:rgba(255,255,255,.6); text-shadow:0 1px 6px #000; transition:opacity .3s;
}

/* situation selector - a RIGHT RAIL, every look grouped under a visible label so a
   coach can scan all of them at a glance (discoverability beats tidiness mid-game).
   Play calls drill down on the LEFT; situations live on the RIGHT, where muscle
   memory expects them and they never cover the field. */
.db-sits{ position:absolute; right:18px; top:92px; bottom:72px; width:220px; z-index:9;
  display:flex; flex-direction:column; gap:13px; overflow-y:auto; padding:2px 7px 2px 2px; pointer-events:auto; }
.db-sits::-webkit-scrollbar{ width:5px; } .db-sits::-webkit-scrollbar-thumb{ background:rgba(245,166,35,.5); border-radius:3px; }
.db-sitgrp{ display:flex; flex-direction:column; gap:6px; }
.db-catlabel{ font-family:var(--font-display); font-weight:900; font-size:11px; letter-spacing:.18em;
  text-transform:uppercase; color:var(--gold); text-shadow:0 1px 5px #000;
  padding-bottom:4px; border-bottom:1.5px solid rgba(245,166,35,.32); }
.db-sit{
  font-family:var(--font-display); font-weight:800; font-size:14px; letter-spacing:.03em; text-transform:uppercase;
  color:#eaf0ff; text-align:left; white-space:nowrap; padding:8px 13px; border-radius:8px; cursor:pointer;
  background:linear-gradient(180deg, rgba(40,62,128,.82), rgba(18,30,70,.9));
  border:1.5px solid rgba(245,166,35,.34); box-shadow:0 3px 9px rgba(0,0,0,.4);
  transition:transform .14s var(--ease), border-color .14s, background .14s;
}
.db-sit:hover{ border-color:var(--gold); transform:translateX(-3px); }
.db-sit.on{ background:linear-gradient(180deg, #F5A623, #bd7d18); color:#2a1605; border-color:#fff0c4; }

  background:linear-gradient(180deg, rgba(245,166,35,.26), rgba(40,62,128,.9));
  border-color:rgba(245,166,35,.6); box-shadow:0 4px 12px rgba(0,0,0,.45); }
.db-sit-top::before{ content:"\2654"; margin-right:7px; color:var(--gold); }
.db-allcalls{ color:var(--gold); font-size:.74em; letter-spacing:.06em; }
.db-bn .db-allcalls{ color:#6e3f08; }

/* PLAY CALL - drills down in place on the LEFT (the plays list slides out, this
   slides in over the same zone). Portrait card: name + stacked images + reads +
   adjustments, scrolls if tall. Never competes with the field anymore. */
.db-pc{ position:absolute; left:24px; top:182px; bottom:70px; z-index:10; pointer-events:none;
  width:330px; max-width:34vw; }
.db-pc-card{
  pointer-events:auto; height:100%; display:flex; flex-direction:column; overflow:hidden; border-radius:13px;
  transform-origin:0 50%; transform:translateX(-24px); opacity:0;
  transition:transform .42s cubic-bezier(.22,1,.36,1), opacity .3s;
  background-color:var(--cream);
  background-image:linear-gradient(180deg,rgba(255,255,255,.5),rgba(0,0,0,.05) 60%,rgba(0,0,0,.1)),var(--noise);
  background-blend-mode:soft-light,soft-light;
  border:3px solid #1E3A8A;
  box-shadow:inset 0 0 0 2.5px var(--gold), inset 0 0 0 4px rgba(30,58,138,.28), 0 24px 48px -12px rgba(0,0,0,.72);
}
.db-pc.show .db-pc-card{ transform:translateX(0); opacity:1; }
.db-pc-top{ flex:0 0 auto; display:flex; flex-direction:column; align-items:stretch; gap:7px; padding:10px 12px;
  background:linear-gradient(180deg,#27439a,#16285c); border-bottom:2.5px solid var(--gold); }
.db-pc-name{ display:flex; flex-direction:column; align-items:center; line-height:1; text-align:center; order:-1; }
.db-pc-name > span:first-child{ font-family:var(--font-display); font-weight:900; font-size:20px; letter-spacing:.4px;
  text-transform:uppercase; color:#F4ECD2; }
.db-pc-type{ font-family:var(--font-display); font-weight:700; font-size:9px; letter-spacing:.16em;
  text-transform:uppercase; color:var(--gold); margin-top:3px; }
.db-pc-acts{ display:flex; gap:7px; align-items:stretch; }
.db-pc-acts > button{ flex:1 1 0; }
.db-pc-close, .db-pc-full, .db-pc-add{ font-family:var(--font-display); font-weight:800; font-size:10px;
  letter-spacing:.08em; text-transform:uppercase; cursor:pointer; padding:7px 12px; border-radius:30px;
  display:inline-flex; align-items:center; justify-content:center; gap:5px; transition:transform .12s var(--ease), filter .12s var(--ease); }
.db-pc-close{ align-self:flex-start; background:rgba(255,255,255,.12); border:1.5px solid rgba(255,255,255,.4); color:#eaf0ff; }
.db-pc-full{ background:linear-gradient(180deg,#ffe08a,#F5A623 55%,#bd7d18); border:1.5px solid #fff0c4; color:#3a1c06; }
.db-pc-full svg{ width:12px; height:12px; }
.db-pc-add{ background:linear-gradient(180deg,#2b4aa8,#16285c); border:1.5px solid var(--gold); color:#ffe9b8; }
.db-pc-add.added{ background:linear-gradient(180deg,#2e7d46,#1c5430); border-color:#bff0cf; color:#eafff0; }
.db-pc-close:hover, .db-pc-full:hover, .db-pc-add:hover{ transform:translateY(-1px); filter:brightness(1.07); }
.db-pc-body{ flex:1 1 auto; overflow-y:auto; display:flex; flex-direction:column; gap:13px; padding:13px 14px; }
.db-pc-body::-webkit-scrollbar{ width:5px; } .db-pc-body::-webkit-scrollbar-thumb{ background:rgba(30,58,138,.4); border-radius:3px; }
.db-pc-imgs{ flex:0 0 auto; display:flex; flex-direction:column; gap:10px; min-width:0; }
.db-pc-img{ flex:0 0 auto; margin:0; min-width:0; }
.db-pc-imglabel{ font-family:var(--font-display); font-weight:800; font-size:9px; letter-spacing:.16em;
  text-transform:uppercase; color:#9a6b15; margin-bottom:4px; }
.db-pc-img img{ width:100%; height:auto; object-fit:contain; display:block; border-radius:6px;
  border:2px solid rgba(30,58,138,.4); box-shadow:0 3px 9px rgba(0,0,0,.3); }
.db-pc-pending{ aspect-ratio:16/9; border-radius:6px; border:2px dashed rgba(30,58,138,.4); display:flex; align-items:center;
  justify-content:center; font-family:var(--font-display); font-weight:700; font-size:9px; letter-spacing:.12em;
  text-transform:uppercase; color:rgba(30,58,138,.5); background:rgba(30,58,138,.05); }
.db-pc-readcol{ flex:0 0 auto; min-width:0; }
.db-pc-sec{ font-family:var(--font-display); font-weight:900; font-size:12px; letter-spacing:.16em;
  text-transform:uppercase; color:var(--secondary); margin:0 0 9px; }
.db-pc-reads{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:7px; }
.db-pc-reads li{ display:flex; gap:9px; align-items:center; }
.db-pc-num{ flex:0 0 auto; width:23px; height:23px; border-radius:50%; background:#16285c; color:var(--cream);
  font-family:var(--font-display); font-weight:900; font-size:12px; display:flex; align-items:center; justify-content:center; }
.db-pc-rlabel{ font-family:var(--font-display); font-weight:900; text-transform:uppercase; font-size:16px;
  letter-spacing:.3px; color:#16285c; line-height:1.05; }
/* adjustments - bold strip pinned to the bottom of the card */
.db-pc-adjbar{ flex:0 0 auto; display:flex; align-items:flex-start; flex-direction:column; gap:7px; padding:11px 14px;
  background:linear-gradient(180deg,#1c357f,#13245a); border-top:2.5px solid var(--gold); }
.db-pc-adjlbl{ flex:0 0 auto; font-family:var(--font-display); font-weight:900; font-size:12px; letter-spacing:.2em;
  text-transform:uppercase; color:var(--gold); }
.db-pc-adjitem{ font-family:var(--font-display); font-weight:900; font-size:14px; letter-spacing:.3px; text-transform:uppercase;
  color:#F4ECD2; display:inline-flex; align-items:center; gap:7px; }
.db-pc-adjitem::before{ content:"\25BA"; color:var(--gold); font-size:10px; }

/* ====== DRIVE LADDER - build / showcase a whole drive =======================
   A centered overlay: a vertical SPINE of call-nodes climbing toward the end zone,
   with ONE recovery branch that peels off when you stall and rejoins the mainline.
   Web aesthetic (glowing strands), drive-chain topology (never a wild tree). */
.db-build{
  position:absolute; left:50%; bottom:18px; transform:translateX(-50%); z-index:11;
  font-family:var(--font-display); font-weight:900; font-size:13px; letter-spacing:.14em; text-transform:uppercase;
  color:#2a1605; cursor:pointer; padding:11px 22px; border-radius:30px;
  background:linear-gradient(180deg,#ffe08a,#F5A623 55%,#bd7d18); border:2px solid #fff0c4;
  box-shadow:0 8px 20px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.5);
  display:inline-flex; align-items:center; transition:transform .14s var(--ease), box-shadow .14s;
}
.db-build svg{ width:16px; height:16px; color:#2a1605; }
.db-build:hover{ transform:translateX(-50%) translateY(-2px); box-shadow:0 12px 26px rgba(0,0,0,.55); }
/* the drive now lives ON THE FIELD: a layer that exactly overlays the resting
   field, with call-nodes marching from the near hash up toward the end zone,
   following the field's perspective. Shown at full-field only - it IS the drive
   overview. A slim control bar floats above the Build button. */
.db-drivelayer{ position:absolute; inset:0; display:grid; place-items:center; z-index:7;
  opacity:0; pointer-events:none; transition:opacity .42s ease; overflow:hidden; }
.db-drivelayer.open{ opacity:1; pointer-events:auto; cursor:zoom-in; }
.db-drivefield{ position:relative; aspect-ratio:4096/2286; max-width:82%; max-height:84%;
  transform-origin:50% 50%; will-change:transform; transition:transform .2s ease; }
/* while the drive is shown ON the field, hide the static build field underneath so
   the zoom never reveals a second, non-zooming copy of the grass. Cross-fades with
   the reveal layer's own field (same image) so there's no flash. */
.db-stage.revealing .db-fieldwrap,
.db-stage.revealing .db-closelayer{ opacity:0; transition:opacity .42s ease; }
.db-driveweb{ position:absolute; inset:0; width:100%; height:100%; overflow:visible; }
.db-drivenodes{ position:absolute; inset:0; }
.db-strand{ fill:none; stroke:var(--gold); stroke-width:5; opacity:.9; stroke-linecap:round;
  filter:drop-shadow(0 0 4px rgba(245,166,35,.55)); }
.db-strand.alt{ stroke:#5aa0ff; opacity:.72; stroke-dasharray:11 9; filter:drop-shadow(0 0 4px rgba(90,160,255,.55)); }
.db-strand.pos{ stroke:#4fbf72; opacity:.72; stroke-dasharray:11 9; filter:drop-shadow(0 0 4px rgba(79,191,114,.55)); }
/* travelling energy pulse on the field strands - the loved build-canvas motion, on the grass */
.db-fpulse{ fill:none; stroke:#ffe8a8; stroke-width:5; stroke-linecap:round;
  stroke-dasharray:5 95; filter:drop-shadow(0 0 5px var(--gold)); animation:hubPulse 2.6s linear infinite; }
.db-fpulse.alt{ stroke:#dbe6ff; filter:drop-shadow(0 0 5px #5aa0ff); }
.db-fpulse.pos{ stroke:#cdf6d8; filter:drop-shadow(0 0 5px #4fbf72); }
.db-fnode{
  position:absolute; transform:translate(-50%,-50%) scale(var(--sc,1)); transform-origin:center;
  display:flex; flex-direction:column; align-items:center; gap:1px; min-width:120px; max-width:152px;
  padding:7px 13px 8px; border-radius:11px; cursor:pointer; pointer-events:auto; text-align:center;
  background:var(--cream); border:2px solid #16285c; box-shadow:0 7px 16px rgba(0,0,0,.55);
  transition:box-shadow .14s, filter .14s; }
.db-fnode:hover{ filter:brightness(1.04); box-shadow:0 11px 24px rgba(0,0,0,.65), 0 0 0 2px rgba(245,166,35,.55); }
.db-fnode-num{ position:absolute; top:-9px; left:-9px; width:21px; height:21px; border-radius:50%;
  display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:900;
  font-size:12px; color:var(--cream); background:radial-gradient(circle at 35% 30%, #27439a, #16285c);
  border:2px solid var(--gold); box-shadow:0 2px 5px rgba(0,0,0,.5); }
.db-fnode-name{ font-family:var(--font-display); font-weight:900; font-size:14px; letter-spacing:.2px;
  line-height:1; text-transform:uppercase; color:#16285c; }
.db-fnode-tag{ font-family:var(--font-display); font-weight:700; font-size:8.5px; letter-spacing:.1em;
  text-transform:uppercase; color:#9a6b15; }
.db-fnode.goal{ background:linear-gradient(180deg,#ffe08a,#F5A623 60%,#bd7d18); border-color:#fff0c4; }
.db-fnode.goal .db-fnode-name{ color:#2a1605; } .db-fnode.goal .db-fnode-tag{ color:#6e3f08; }
.db-fnode.goal .db-fnode-num{ background:radial-gradient(circle at 35% 30%,#2c4aa0,#16285c); }
.db-fnode.alt{ background:#eef3ff; border-color:#5aa0ff; }
.db-fnode.alt .db-fnode-name{ color:#1c3a7a; } .db-fnode.alt .db-fnode-tag{ color:#2c5aa0; }
.db-fnode.alt .db-fnode-num{ background:radial-gradient(circle at 35% 30%,#5aa0ff,#2c5aa0); border-color:#cfe2ff; font-size:11px; }
.db-fnode.pos{ background:#ebfbf0; border-color:#4fbf72; }
.db-fnode.pos .db-fnode-name{ color:#1a5c33; } .db-fnode.pos .db-fnode-tag{ color:#2c7d49; }
.db-fnode.pos .db-fnode-num{ background:radial-gradient(circle at 35% 30%,#4fbf72,#22773f); border-color:#c8f0d4; font-size:11px; }

/* slim drive control bar + caption - float above the Build button when open */
.db-dtool{ font-family:var(--font-display); font-weight:800; font-size:10.5px; letter-spacing:.08em; text-transform:uppercase;
  color:#eaf0ff; cursor:pointer; padding:7px 11px; border-radius:30px;
  background:rgba(40,62,128,.6); border:1.5px solid rgba(245,166,35,.4); transition:border-color .14s, color .14s, background .14s; }
.db-dtool:hover{ border-color:var(--gold); color:#fff; }
#db-drive-save{ background:linear-gradient(180deg,#ffe08a,#F5A623 55%,#bd7d18); color:#2a1605; border-color:#fff0c4; }
.db-dtool-x{ padding:7px 10px; }
.db-drivebar{ position:absolute; left:50%; bottom:64px; transform:translateX(-50%) translateY(10px); z-index:11;
  display:none; align-items:center; gap:7px; padding:8px 12px; border-radius:32px;
  background:linear-gradient(180deg, rgba(10,16,38,.95), rgba(6,11,28,.97));
  border:1.5px solid rgba(245,166,35,.5); box-shadow:0 16px 40px rgba(0,0,0,.6);
  opacity:0; transition:opacity .3s ease, transform .3s var(--ease); }
.db-drivebar.open{ display:flex; opacity:1; transform:translateX(-50%) translateY(0); }
.db-drivebar-title{ display:flex; align-items:center; gap:6px; padding-right:3px;
  font-family:var(--font-display); font-weight:900; font-size:13px; letter-spacing:.06em; text-transform:uppercase; color:#F4ECD2; }
.db-drivebar-title svg{ width:16px; height:16px; color:var(--gold); }
.db-drivecap{ position:absolute; left:50%; bottom:112px; transform:translateX(-50%); z-index:11;
  max-width:min(460px,70vw); text-align:center; pointer-events:none; opacity:0; transition:opacity .3s ease;
  font-family:var(--font-body); font-size:12px; color:rgba(234,240,255,.82); text-shadow:0 1px 6px #000; }
.db-drivecap.open{ opacity:1; }

/* ===== BUILD MODE - the RPG drive web (screen-space, grows up from the Build button) =====
   The field behind blurs; the side furniture (rail / plays / coaching keys) stays sharp and
   live. The web is a vertical spine of play-call chips climbing from the button; LEFT branches
   = positive/opportunity calls, RIGHT branches = negative/fallback calls. Same tree the future
   run-mode will walk (consume the bottom call → promote a branch into the live slot). */
.db-stage.building .db-fieldwrap,
.db-stage.building .db-closelayer{ filter:blur(9px) brightness(.46); }
.db-fieldwrap, .db-closelayer{ transition:filter .42s ease; }
/* The web is a PAN/ZOOM CANVAS: a transformed layer holding an SVG strand sheet +
   absolutely-positioned play-call chips. The drive is a real recursive TREE - the
   trunk climbs straight up from the button, and each node can shoot a branch out
   LEFT (counter) or RIGHT (fallback) on a curved glowing strand that then climbs as
   its own sub-spine. Drag the background to pan, wheel to zoom. */
.db-web{ position:absolute; inset:0; z-index:8; pointer-events:none; overflow:hidden;
  opacity:0; transition:opacity .35s ease; }
.db-web.open{ opacity:1; pointer-events:auto; cursor:grab; }
.db-web.grabbing{ cursor:grabbing; }
#db-webcanvas{ position:absolute; left:0; top:0; width:0; height:0; transform-origin:0 0; will-change:transform; }
#db-webstrands{ position:absolute; left:0; top:0; width:10px; height:10px; overflow:visible; pointer-events:none; }
#db-webnodes{ position:absolute; left:0; top:0; }
.db-tstrand{ fill:none; stroke:var(--gold); stroke-width:5; opacity:.85; stroke-linecap:round;
  filter:drop-shadow(0 0 5px rgba(245,166,35,.5)); }
.db-tstrand.br-left{ stroke:#4fbf72; opacity:.8; filter:drop-shadow(0 0 5px rgba(79,191,114,.55)); }
.db-tstrand.br-right{ stroke:#6f93ff; opacity:.8; filter:drop-shadow(0 0 5px rgba(111,147,255,.55)); }
.db-tpulse{ fill:none; stroke:#ffe8a8; stroke-width:5.5; stroke-linecap:round;
  stroke-dasharray:5 95; filter:drop-shadow(0 0 6px var(--gold)); animation:hubPulse 2.6s linear infinite; }
.db-tpulse.br-left{ stroke:#cdf6d8; filter:drop-shadow(0 0 6px #4fbf72); }
.db-tpulse.br-right{ stroke:#dbe6ff; filter:drop-shadow(0 0 6px #6f93ff); }
/* a play-call chip - legible but trim; the pan/zoom canvas gives the room */
.db-tnode{ position:absolute; transform:translate(-50%,-50%); pointer-events:auto; cursor:pointer;
  display:flex; flex-direction:column; align-items:center; gap:2px; min-width:150px; max-width:208px;
  padding:11px 18px 12px; border-radius:14px; text-align:center;
  background:var(--cream); border:3px solid #16285c; box-shadow:0 9px 22px rgba(0,0,0,.5);
  transition:box-shadow .14s, filter .14s; }
.db-tnode:hover{ filter:brightness(1.03); box-shadow:0 13px 30px rgba(0,0,0,.6), 0 0 0 3px rgba(245,166,35,.5); }
.db-tnode.goal{ background:linear-gradient(180deg,#ffe08a,#F5A623 60%,#bd7d18); border-color:#fff0c4; }
.db-tnode.menu-open{ box-shadow:0 14px 32px rgba(0,0,0,.7), 0 0 0 4px var(--gold); z-index:8; }
.db-tnode.br-left{ border-color:#2e7d46; }
.db-tnode.br-right{ border-color:#3a5bbf; }
.db-tnum{ position:absolute; top:-12px; left:-12px; width:27px; height:27px; border-radius:50%;
  display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:900;
  font-size:13px; color:var(--cream); background:radial-gradient(circle at 35% 30%, #27439a, #16285c);
  border:2px solid var(--gold); box-shadow:0 3px 7px rgba(0,0,0,.5); z-index:3; }
.db-tnode.goal .db-tnum{ color:#2a1605; }
/* the badge colour is driven by its OWN class so a branch HEAD glows green/blue while
   its gold continuation calls keep the navy badge */
.db-tnum.br-left{ background:radial-gradient(circle at 35% 30%,#4fbf72,#22773f); border-color:#c8f0d4; color:#fff; }
.db-tnum.br-right{ background:radial-gradient(circle at 35% 30%,#6f93ff,#2c4aa0); border-color:#cfe0ff; color:#fff; }
.db-tnm{ font-family:var(--font-display); font-weight:900; font-size:18px; letter-spacing:.3px; line-height:1.04;
  text-transform:uppercase; color:#16285c; }
.db-tsub{ font-family:var(--font-display); font-weight:700; font-size:11.5px; letter-spacing:.07em;
  text-transform:uppercase; color:#9a6b15; }
.db-tnode.goal .db-tnm{ color:#2a1605; } .db-tnode.goal .db-tsub{ color:#6e3f08; }
.db-tnode.br-left .db-tsub{ color:#2e7d46; } .db-tnode.br-right .db-tsub{ color:#3a5bbf; }
/* per-chain "add the next call" slot - sits at the tip of each spine */
.db-tadd{ position:absolute; transform:translate(-50%,-50%); pointer-events:auto; cursor:pointer; white-space:nowrap;
  font-family:var(--font-display); font-weight:800; font-size:13px; letter-spacing:.09em; text-transform:uppercase;
  color:#ffe9b8; padding:10px 19px; border-radius:30px;
  background:rgba(20,32,70,.8); border:2.5px dashed rgba(245,166,35,.6);
  transition:border-color .14s, color .14s, border-style .14s; }
.db-tadd:hover, .db-tadd.armed{ border-color:var(--gold); color:#fff; border-style:solid; }
.db-tempty{ position:absolute; transform:translate(-50%,-50%); pointer-events:auto; text-align:center; max-width:360px;
  font-family:var(--font-body); font-size:15px; color:rgba(234,240,255,.88); line-height:1.55; text-shadow:0 1px 6px #000; }
/* node action menu (never ejects build mode) */
.db-tactions{ position:absolute; top:calc(100% + 12px); left:50%; transform:translateX(-50%); z-index:9;
  display:none; gap:7px; padding:9px; border-radius:14px; white-space:nowrap;
  background:linear-gradient(180deg,#0c1330,#070c20); border:2px solid rgba(245,166,35,.5); box-shadow:0 18px 40px rgba(0,0,0,.65); }
.db-tnode.menu-open .db-tactions{ display:flex; }
.db-tact{ font-family:var(--font-display); font-weight:800; font-size:13px; letter-spacing:.05em; text-transform:uppercase;
  color:#eaf0ff; cursor:pointer; padding:9px 13px; border-radius:9px; background:rgba(255,255,255,.07);
  border:1.5px solid rgba(255,255,255,.16); transition:background .12s, border-color .12s; }
.db-tact:hover{ background:rgba(245,166,35,.2); border-color:var(--gold); }
.db-tact.pos:hover{ background:rgba(46,125,70,.32); border-color:#3fa463; }
.db-tact.neg:hover{ background:rgba(58,91,191,.32); border-color:#5a82e0; }
.db-tact.rm:hover{ background:rgba(200,60,60,.3); border-color:#e06464; }
/* ＋ on play pills - drops the play into the drive */
.db-padd{ flex:0 0 auto; margin-left:auto; width:24px; height:24px; border-radius:50%; cursor:pointer;
  display:flex; align-items:center; justify-content:center; font-weight:900; font-size:15px; line-height:1;
  color:#ffe9b8; background:rgba(20,32,70,.9); border:1.5px solid rgba(245,166,35,.6);
  transition:background .12s, transform .12s, color .12s; }
.db-padd:hover{ background:var(--gold); color:#16285c; transform:scale(1.12); }
.db-padd.added{ background:#2e7d46; border-color:#bff0cf; color:#fff; }

@media (prefers-reduced-motion: reduce){ .db-web, .db-drivelayer{ transition:opacity .2s; } }

@media (max-width:768px){
  .drive-card{ width:100%; height:100%; max-height:100%; border-radius:0; }
  .db-field{ max-width:96%; }
  .db-sits{ right:auto; left:0; top:6px; bottom:auto; width:100%;
    flex-direction:row; flex-wrap:nowrap; gap:8px; overflow-x:auto; overflow-y:hidden; padding:4px 10px; }
  .db-sitgrp{ flex-direction:row; align-items:center; gap:5px; flex:0 0 auto; }
  .db-catlabel{ border-bottom:none; padding:0 4px 0 0; font-size:9px; white-space:nowrap; align-self:center; }
  .db-sit{ font-size:12px; padding:6px 9px; }
  .db-board{ width:calc(100% - 16px); top:84px; }
  .db-bn{ font-size:22px; } .db-btitle{ padding-left:48px; }
  .db-bks{ display:none; }
  .db-plays{ width:150px; left:8px; top:152px; bottom:84px; }
  .db-pc{ left:8px; right:8px; top:auto; bottom:8px; width:auto; max-width:none; height:auto; max-height:58vh; }
  .db-pc-adjitem{ font-size:13px; }
  .db-build{ bottom:10px; font-size:11px; padding:9px 16px; }
  .db-fnode{ min-width:92px; max-width:120px; padding:5px 8px 6px; }
  .db-fnode-name{ font-size:11px; }
  .db-drivebar{ bottom:58px; gap:5px; padding:6px 9px; flex-wrap:wrap; max-width:94vw; }
  .db-drivebar-title{ font-size:11px; }
  .db-drivecap{ bottom:104px; font-size:11px; }
  .db-tnode{ min-width:150px; max-width:210px; padding:11px 16px 12px; }
  .db-tnm{ font-size:17px; } .db-tsub{ font-size:11px; }
  .db-tact{ font-size:11px; padding:7px 9px; }
}

/* ---- FULLSCREEN TOGGLE ---- */
.fs-btn{
  position:fixed; bottom:16px; right:16px; z-index:9999;
  height:38px; padding:0 14px; border-radius:10px; gap:8px;

/* ---- TAGS ----------------------------------------------------------------

   you use is auto-labeled from its id ("vs-cover-3" → "Vs Cover 3") and auto-

   TAG_LABELS  - only to shorten/override an auto label (e.g. show "Cover 3").
   FILTER_TAGS - only to choose WHICH tags become quick-filter buttons, and
                 their order. Leave it EMPTY ([]) to show every tag you've used.
   -------------------------------------------------------------------------- */
const TAG_LABELS = {
  "vs-all-zone":"Beats Zone", "vs-man":"Beats Man", "vs-cover-2":"Cover 2", "vs-cover-3":"Cover 3",
  "play-action":"Play Action", "rpo":"RPO", "run-play":"Run Play", "screen":"Screen",
  "money-play":"Money Play", "bomb":"One Play TD", "third-down":"3rd Down", "blitz-beater":"Blitz Beater",
  "short-yardage":"Short Yardage", "red-zone":"Red Zone", "goal-line":"Goal Line",
};
const FILTER_TAGS = ["run-play","play-action","screen","rpo","vs-man","vs-all-zone","bomb","red-zone","third-down","money-play"];

// Pretty-print a tag id when it has no TAG_LABELS override ("vs-man" → "Vs Man").
function prettifyTag(id){
  return id.split("-").map(w =>
    w === "vs" ? "Vs" : w === "rpo" ? "RPO" :
    w.charAt(0).toUpperCase() + w.slice(1)).join(" ");
}
function tagLabel(id){ return TAG_LABELS[id] || prettifyTag(id); }
// Every tag actually used across PLAYS, in first-appearance order.
function tagsInUse(){
  const seen = [];
  PLAYS.forEach(p => (p.tags||[]).forEach(t => { if(!seen.includes(t)) seen.push(t); }));
  return seen;
}
// The filter-chip id list: "All" first, then your curated FILTER_TAGS (or, if
// that's empty, every tag in use) - but only tags that some play actually has.
function filterChipIds(){
  const used = tagsInUse();
  const ids = (FILTER_TAGS && FILTER_TAGS.length)
    ? FILTER_TAGS.filter(t => used.includes(t))
    : used;
  return ["all", ...ids];
}

// Prepends assetBaseUrl to a path when deploying to Squarespace via GitHub.
// Returns the path unchanged during local development (assetBaseUrl is "").
function assetUrl(path){
  if(!path) return path;
  const base = (SCHEME_CONFIG.assetBaseUrl || "").replace(/\/+$/, "");
  return base ? `${base}/${path}` : path;
}

/* --- inject the config colors into CSS custom properties + wire assets --- */
function applyConfig(){
  const r = document.documentElement.style;
  r.setProperty("--primary",   SCHEME_CONFIG.primaryColor);
  r.setProperty("--secondary", SCHEME_CONFIG.secondaryColor);
  r.setProperty("--cream",     SCHEME_CONFIG.cream);
  r.setProperty("--gold",      SCHEME_CONFIG.gold);

  // background video + poster (graceful fallback to poster if video fails)
  const v = $("#bg-video");
  v.poster = assetUrl(SCHEME_CONFIG.backgroundPoster);
  v.muted = true;                 // required for muted autoplay on every browser
  v.src = assetUrl(SCHEME_CONFIG.backgroundVideo);
  v.addEventListener("error", () => { v.style.display = "none"; });
  // nudge autoplay; if a browser still blocks it, resume on the first user
  // gesture so the background never sits frozen on a real device.
  const tryPlay = () => { const pr = v.play(); if(pr && pr.catch) pr.catch(()=>{}); };
  tryPlay();
  const kickPlay = () => {
    if(v.paused) tryPlay();
    ["pointerdown","touchstart","keydown","scroll"].forEach(ev =>
      window.removeEventListener(ev, kickPlay));
  };
  ["pointerdown","touchstart","keydown","scroll"].forEach(ev =>
    window.addEventListener(ev, kickPlay, { passive:true }));

  // HERO stadium scrubber - load the clip and hold it on frame 0 (calm night).
  // It never auto-plays; wireHubInteract() seeks it by cursor X (calm -> fireworks).
  // both crossfade layers get the same clip (muted so autoplay is allowed)
  [$("#hub-stadium"), $("#hub-stadium-b")].forEach(hero => {
    if(!hero) return;
    hero.muted = true;
    if(SCHEME_CONFIG.heroVideo){
      hero.src = assetUrl(SCHEME_CONFIG.heroVideo);
      hero.addEventListener("loadedmetadata", () => { try { hero.currentTime = 0; } catch(e){} });
      hero.addEventListener("error", () => { hero.style.display = "none"; });
    } else {
      hero.style.display = "none";
    }
  });
  // pixel-aligned stadium cutout that masks the strand origin (hide if missing)
  const heroCut = $("#hub-cutout");
  if(heroCut){
    if(SCHEME_CONFIG.heroCutout){
      heroCut.src = assetUrl(SCHEME_CONFIG.heroCutout);
      heroCut.addEventListener("error", () => { heroCut.style.display = "none"; });
    } else {
      heroCut.style.display = "none";
    }
  }

  // cover
  $("#cover-series").textContent = SCHEME_CONFIG.seriesLabel;
  $("#cover-title").textContent  = SCHEME_CONFIG.schemeName;
  $("#cover-sub").textContent    = SCHEME_CONFIG.schemeSubtitle;
  $("#cover-logo").innerHTML  = logoMarkup(SCHEME_CONFIG.coverLogo, "100%");
  $("#cover-stamp").innerHTML = CROWN + "<span>Scheme Kings · Premium Playbook</span>";

  // top banner (hidden if no tagline)
  const banner = $("#field-banner");
  if(SCHEME_CONFIG.tagline){
    banner.style.display = "";
    banner.innerHTML =
      `<span class="fb-crown">${CROWN}</span>
       <span class="fb-1">${SCHEME_CONFIG.tagline}</span>
       ${SCHEME_CONFIG.taglineSub ? `<span class="fb-2">${SCHEME_CONFIG.taglineSub}</span>` : ""}`;
  } else { banner.style.display = "none"; }

  // ambient field center: scheme initial as fallback, big team logo if present
  $("#fw-letter").textContent = SCHEME_CONFIG.teamInitial || "";
  const fwLogo = $("#fw-logo");
  fwLogo.onload = () => { fwLogo.style.display = "block"; $("#fw-letter").style.display = "none"; };
  fwLogo.src = assetUrl(SCHEME_CONFIG.coverLogo);   // the big per-scheme team logo

  document.title = `${SCHEME_CONFIG.schemeName} · Scheme Kings`;
}

// Returns a logo block for a configured image path. The inline crown shows by
// default (so the app always looks finished); if the real image loads, it
// swaps in. If the file is missing the crown simply stays - no broken icon.
function logoMarkup(src, size){
  return `<span class="logo-wrap" style="width:${size};height:${size}">
            <span class="logo-fallback">${CROWN}</span>
            <img class="logo-img" src="${assetUrl(src)}" alt=""
                 onload="this.style.display='block';this.previousElementSibling.style.display='none'">
          </span>`;
}

// The pill emblem badge holds a LOGO (the scheme's team logo on most pills, or
// a series team's own logo on series pills). Falls back to the inline gold
// crown if the file is missing, so nothing ever looks broken.
function badgeHTML(src){
  return `<span class="badge">
      <span class="badge-fb">${CROWN}</span>
      ${src ? `<img class="badge-img" src="${assetUrl(src)}" alt=""
           onload="this.previousElementSibling.style.display='none'; this.style.display='block'; this.parentNode.classList.add('has-img');">` : ``}
    </span>`;
}

function loadCardImages(){
  inner.querySelectorAll("img[data-src]").forEach(img => {
    img.addEventListener("load", () => img.closest(".imgslot")?.classList.add("loaded"));

// One lazy image slot (placeholder shown until the real screenshot paints)
function imgSlot(src, label){
  return `<div class="imgslot">
    <span class="img-ph">${label}</span>
    <img data-src="${assetUrl(src)}" alt="${label}">
  </div>`;
}

// The field-view slot doubles as the video: a large lazy thumbnail with a gold
// play button + "Watch Breakdown" label. Clicking it EMBEDS the breakdown video
// in place (see embedVideo) so the viewer never leaves the playbook.
function videoSlot(src, label, videoUrl){
  // If no field-view image, fall back to the YouTube thumbnail automatically
  const id = (!src && videoUrl) ? ytId(videoUrl) : null;
  const imgSrc = id
    ? `https://img.youtube.com/vi/${id}/maxresdefault.jpg`
    : assetUrl(src);
  return `<div class="imgslot video-slot" data-video role="button" tabindex="0" aria-label="Watch breakdown">
    <span class="img-ph">${label}</span>
    <img data-src="${imgSrc}" alt="${label}">
    <span class="video-ov">
      <span class="video-play">${PLAY_ICON}</span>
      <span class="video-label">Watch Breakdown</span>
    </span>
  </div>`;
}

// Extract an 11-char YouTube id from any common URL shape (null if none).
// The trailing (?![\w-]) boundary rejects placeholders like "UNLISTED_LINK".
function ytId(url){
  const m = (url||"").match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|v\/|shorts\/))([\w-]{11})(?![\w-])/);
  return m ? m[1] : null;
}

// Swap the field-view thumbnail for the embedded breakdown video, in place.
function embedVideo(slot, url){
  if(slot.classList.contains("playing")) return;
  slot.classList.add("playing");
  const id = ytId(url);
  slot.innerHTML = id
    ? `<iframe class="video-frame"
         src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1&rel=0&modestbranding=1&playsinline=1"
         title="Play breakdown" allow="autoplay; encrypted-media; picture-in-picture; fullscreen"
         allowfullscreen></iframe>`
    : `<div class="video-pending">
         <span class="video-play">${PLAY_ICON}</span>
         <p>Your breakdown video plays here.<br>
           <small>Add this play's YouTube link as <code>videoUrl</code>.</small></p>
       </div>`;
}

const prefersReducedMotion = () => window.matchMedia("(prefers-reduced-motion: reduce)").matches;

// Stagger the inner content blocks - each container's direct children rise in
// one after another, so the card lays itself out in sequence after it lands.
function staggerReveal(root){
  if(prefersReducedMotion()) return;
  root.querySelectorAll(".card-right, .card-left, .overlay-list, .menu-list, .pillars, .card-grid, .form-list, .team-list")
    .forEach(group => Array.from(group.children).forEach((el, i) => {
      el.style.animation = "contentRise .42s var(--ease) both";
      el.style.animationDelay = (0.06 + i * 0.045) + "s";
    }));
}

// Records where the user last clicked a pill/row so the takeover can "whoosh"
// out of that exact spot. Capture phase runs before the open handler fires.
let lastClickOrigin = null;
document.addEventListener("click", (e) => {
  const el = e.target.closest(".patch, .play-item, .callsheet-pill");
  if(el){ const r = el.getBoundingClientRect();
    lastClickOrigin = { x:r.left + r.width/2, y:r.top + r.height/2, t:Date.now() }; }
}, true);

// "There's more below" cue - a bouncing chevron pill that appears when the open
// card's scroll container has content past the fold, and hides near the bottom.
// Wired generically to whatever element actually scrolls in the current view.
let _cueScroller = null;
function _cueUpdate(){
  const cue = takeover.querySelector("#scroll-cue");
  if(!cue || !_cueScroller) return;
  const el = _cueScroller;
  const overflow = el.scrollHeight - el.clientHeight;
  const remaining = overflow - el.scrollTop;
  cue.classList.toggle("show", overflow > 56 && remaining > 56);
}
function setupScrollCue(){
  let cue = takeover.querySelector("#scroll-cue");
  if(!cue){
    cue = document.createElement("div");
    cue.id = "scroll-cue"; cue.setAttribute("aria-hidden", "true");
    cue.innerHTML = `<span>Scroll for more</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>`;
    takeover.appendChild(cue);
  }
  cue.classList.remove("show");
  if(_cueScroller){ _cueScroller.removeEventListener("scroll", _cueUpdate); _cueScroller = null; }
  const card = inner.querySelector(".card");
  if(!card) return;
  // the scroller = the descendant (or the card) with real overflow-y scroll
  const cands = [card, ...card.querySelectorAll("*")].filter(el => {
    const oy = getComputedStyle(el).overflowY;
    return (oy === "auto" || oy === "scroll") && (el.scrollHeight - el.clientHeight) > 56;
  });
  _cueScroller = cands.sort((a, b) =>
    (b.scrollHeight - b.clientHeight) - (a.scrollHeight - a.clientHeight))[0] || null;
  if(!_cueScroller) return;
  _cueScroller.addEventListener("scroll", _cueUpdate, { passive:true });
  _cueUpdate();
}

// enter: "scale" (play card, default) | "left" | "right" | "bottom" (panels)
function openTakeover(html, enter){
  takeover.classList.remove("drive-open");   // reset; re-added only by the Drive Builder
  takeover.classList.remove("dna-open");     // reset; re-added only by Scheme DNA
  document.body.classList.remove("cat-web-open");  // reset; re-added only by a category web
  document.body.classList.remove("fs-open");       // reset; re-added only by the Full System
  inner.innerHTML = html;
  const card = inner.querySelector(".card");
  if(card){
    // if this open came from a fresh pill/row click, balloon out of that spot;
    // otherwise use the directional entrance.
    const o = lastClickOrigin;
    if(o && Date.now() - o.t < 450 && !prefersReducedMotion()){
      const r = card.getBoundingClientRect();
      card.style.transformOrigin = `${(o.x - r.left).toFixed(0)}px ${(o.y - r.top).toFixed(0)}px`;
      card.classList.add("in-morph");
    } else {
      card.classList.add("in-" + (enter || "scale"));
    }
  }
  lastClickOrigin = null;
  loadCardImages();
  staggerReveal(inner);
  takeover.classList.add("open");
  document.body.classList.add("overlay-on");        // hide the field banner behind
  document.removeEventListener("keydown", onKey);   // never stack listeners
  document.addEventListener("keydown", onKey);
  // let layout + images settle, then check whether to show the "scroll for more" cue
  setTimeout(setupScrollCue, 300);
}

/* ---- BACK NAVIGATION ----------------------------------------------------
   X / Esc returns to the PREVIOUS screen instead of jumping to the hub.
   Each opener records the screen it's leaving; closeTakeover pops it. ------ */
let navStack = [];
let navReplaying = false;
function navMaybePush(incomingKind){
  // skip on a back-replay, when coming from the hub, or on a lateral move
  // (prev/next, sibling, tab - same kind doesn't create a new history level)
  if(navReplaying) return;
  const v = state.view;
  if(!v || v.kind === incomingKind) return;
  navStack.push(v);
}
function navReopen(v){
  navReplaying = true;
  try{
    if(v.kind === "category")       openCategory(v.type);
    else if(v.kind === "callsheet") openDriveBuilder();
    else if(v.kind === "play")      openPlay(v.id);
    else if(v.kind === "drive")     openDriveBuilder();
    else if(v.kind === "section")   openSection(v.key);
    else if(v.kind === "fullsystem") openFullSystem();
    else hardCloseTakeover();
  } finally { navReplaying = false; }
}
function closeTakeover(){
  if(!navReplaying && navStack.length){ navReopen(navStack.pop()); return; }
  hardCloseTakeover();
}
function hardCloseTakeover(){
  navStack = [];
  const card = inner.querySelector(".card");
  if(card){ card.style.animation = ""; card.classList.add("out"); }  // play exit anim
  takeover.classList.remove("open");
  takeover.classList.remove("drive-open");
  takeover.classList.remove("dna-open");
  document.body.classList.remove("cat-web-open");
  document.body.classList.remove("fs-open");
  document.body.classList.remove("overlay-on");      // restore the field banner
  document.removeEventListener("keydown", onKey);
  state.view = null;
}

function onKey(e){
  // On the web play screen, Esc collapses an open node panel before closing.
  const pw = inner.querySelector(".play-web");
  if(e.key === "Escape" && pw && pw.pwIsPanelOpen && pw.pwIsPanelOpen()){ pw.pwClosePanel(); return; }
  if(e.key === "Escape") closeTakeover();
  else if(e.key === "ArrowRight" && state.view?.kind==="play") stepPlay(1);
  else if(e.key === "ArrowLeft"  && state.view?.kind==="play") stepPlay(-1);
}

/* ----- PLAY CARD ----- */
// mode: undefined (grow from center) | "next" (slide in from right) | "prev" (from left)
function openPlay(id, mode){
  const p = PLAYS.find(x => x.id === id);
  if(!p) return;
  // make sure prev/next cycles the list the play actually belongs to
  if(!state.list.includes(id)) state.list = PLAYS.map(x=>x.id);
  navMaybePush("play");
  state.view = { kind:"play", id };
  const enter = mode === "next" ? "right" : mode === "prev" ? "left" : "scale";

  // NEW node-web play screen - currently piloting on MTN PA Wheel. Once approved
  // this becomes the default for every play (flip the guard to `p.webLayout !== false`).
  if(p.id === "mtn-pa-wheel" || p.webLayout){ openPlayWeb(p, enter); return; }

  const typeLabel = (p.type==="Star Play" ? `<span class="star">${STAR_ICON}</span>` : "")
    + p.type + (p.subtype ? ` · ${p.subtype}` : "");

       <span class="read-text"><b>${r.label}</b><br><span>${r.text}</span></span></li>`).join("");

  const tags = (p.tags||[]).map(t =>
    `<button class="chip" data-tag="${t}">${tagLabel(t)}</button>`).join("");

  openTakeover(`
    <div class="card cream-patch play-card">
      <button class="card-close" title="Close (Esc)">&times;</button>

      <!-- full-width header: identity on the left, tag pills on the right -->
      <div class="card-head">

          <h2 class="display card-name">${p.name}</h2>
          ${ratingStars(p.id)}
          <div class="card-form">${p.formation}</div>
          ${p.exclusive ? `<div class="excl excl-lg">${CROWN} Scheme Kings Exclusive Play</div>` : ""}
          <div class="card-save-row">${skBookmarkBtnHTML(p.id)}</div>
        </div>
        ${tags ? `<div class="card-head-tags">${tags}</div>` : ""}
      </div>

      <div class="card-body">
        <!-- left: field-view video + formation/play-call + when-to-use -->
        <div class="card-left">
          ${videoSlot(p.images?.fieldView, "FIELD VIEW", p.videoUrl)}
          <div class="thumb-row">
            ${imgSlot(p.images.formation, "FORMATION")}
            ${imgSlot(p.images.playCall, "PLAY CALL")}
          </div>
          ${p.whenToUse ? `
          <div class="coaching-note">
            <div class="coaching-note-head">
              ${CROWN}
              <span class="coaching-note-label">King Reggie's Coaching Notes</span>
            </div>
            <div class="coaching-note-body">${p.whenToUse}</div>
          </div>` : ""}
        </div>

        <!-- right: setup + reads + adjustments -->
        <div class="card-right">
          ${p.setup ? `<div class="sec-head">Setup</div><div class="setup-note">${p.setup}</div>` : ""}
          <div class="sec-head">Reads</div>
          <ol class="reads">${reads}</ol>
          ${adjustments ? `<div class="sec-head">Adjustments</div><ul class="adjust">${adjustments}</ul>`:""}
          <div class="card-footer">
            <div class="foot-label">${SCHEME_CONFIG.schemeName} <span>· ${p.formation}</span></div>
            <div class="nav-btns">
              <button data-step="-1">&larr; Prev</button>
              <button data-step="1">Next &rarr;</button>
            </div>
          </div>
        </div>
      </div>
    </div>`, enter);

  // wire interactions
  inner.querySelector(".card-close").addEventListener("click", closeTakeover);
  // field-view → embed the breakdown video in place (click or Enter/Space)
  const vslot = inner.querySelector("[data-video]");
  if(vslot){
    const go = () => embedVideo(vslot, p.videoUrl);
    vslot.addEventListener("click", go);
    vslot.addEventListener("keydown", e => {
      if(e.key === "Enter" || e.key === " "){ e.preventDefault(); go(); }
    });
  }
  inner.querySelectorAll("[data-step]").forEach(b =>
    b.addEventListener("click", () => stepPlay(+b.dataset.step)));
  // clicking a tag jumps to the call sheet filtered to that tag
  inner.querySelectorAll("[data-tag]").forEach(b =>
    b.addEventListener("click", () => { state.filter = b.dataset.tag; openCallSheet(); }));
  wireBookmark(inner, p);   // Save Play → coaching-app library (sign-in on demand)

const PW_EYE = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>`;

  eye:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>`,
};

// Coaching "keys" for a play - authored points if present, else split the
// write-up into sentence-points so the Coaching node always breaks into pieces.
function pwCoachPoints(p){
  if(p.coachingPoints && p.coachingPoints.length) return p.coachingPoints;
  const sents = (p.whenToUse||"").split(/(?<=[.!?])\s+/).map(s=>s.trim()).filter(s=>s.length>4);
  return sents.slice(0,3).map((s,i)=>({ title:`Key ${i+1}`, text:s }));
}

function openPlayWeb(p, enter){
  const typeLabel = (p.type==="Star Play" ? `<span class="star">${STAR_ICON}</span>` : "")
    + p.type + (p.subtype ? ` · ${p.subtype}` : "");
  const hero = assetUrl(p.heroShot || "");

  const coach = pwCoachPoints(p);
  const siblings = PLAYS.filter(x => x.formation === p.formation && x.id !== p.id);

  // adjustments float in the top-right of the field zone, over the screenshot
  const adjustHTML = (p.adjustments||[]).length
    ? `<div class="pw-adj-panel">
        <button class="pw-adj-toggle" type="button"><span class="pw-rail-ey">Adjustments</span><span class="pw-adj-caret" aria-hidden="true">&rsaquo;</span></button>
        <ul class="pw-rail-adj">${p.adjustments.map(a => `<li>${a}</li>`).join("")}</ul></div>`

    <div class="pw-rail-sec" style="display:flex;flex-direction:column;gap:8px;">
      ${p.images?.formation ? imgSlot(p.images.formation, "FORMATION") : ""}
      ${p.images?.playCall  ? imgSlot(p.images.playCall,  "PLAY CALL")  : ""}
    </div>` : "";

  // the interactive nodes - they live at the BOTTOM of the rail. "Same Set"
  // branches the other calls from this formation (interconnection as a node).
  const CATS = [
    (p.reads||[]).length && { key:"reads", title:"The Reads", ico:PW_EYE,
      preview:`<ol class="pw-cat-list">${p.reads.map(r=>`<li>${r.label}</li>`).join("")}</ol>` },
    coach.length && { key:"note", title:"Coaching Keys", ico:CROWN, king:true,
      preview:`<span class="pw-cat-sub">King Reggie · ${coach.length} key${coach.length===1?"":"s"}</span>` },
    (p.tags||[]).length && { key:"dna", title:"Play Tags", ico:STAR_ICON,

    siblings.length && { key:"formation", title:"Same Set", ico:PW_FORM,
      preview:`<span class="pw-cat-sub">${siblings.length} more from ${p.formation}</span>` },
  ].filter(Boolean);

  const cats = CATS.map((c,i) => `
    <button class="pw-cat${c.king?" king":""}" data-cat="${c.key}" style="--d:${(0.1 + i*0.06).toFixed(2)}s">
      <span class="pw-cat-ico">${c.ico}</span>
      <span class="pw-cat-body"><span class="pw-cat-title">${c.title}</span>${c.preview}</span>
      <span class="pw-cat-chev">&rsaquo;</span>
    </button>`).join("");

  const html = `
    <div class="card pw-card">
      <button class="card-close" title="Close (Esc)">&times;</button>

      <div class="pw-header">
        <div class="pw-header-id">
          <div class="pw-eyebrow eyebrow">${typeLabel}</div>
          <h2 class="display pw-title">${p.name}</h2>
        </div>
        <div class="pw-header-meta">
          ${ratingStars(p.id)}<span class="pw-form-inline">${p.formation}</span>
          ${p.exclusive ? `<span class="excl">${CROWN} Exclusive</span>` : ""}
          ${skBookmarkBtnHTML(p.id)}
          <div class="pw-nav"><button data-step="-1" aria-label="Previous play">&lsaquo;</button><button data-step="1" aria-label="Next play">&rsaquo;</button></div>
        </div>
      </div>

      <div class="pw-overview">
        <aside class="pw-rail">
          ${diagHTML}
          <div class="pw-rail-bottom">
            <div class="pw-rail-nodes">
              <div class="pw-rail-ey">Break It Down</div>
              ${cats}
            </div>
            <button class="pw-watch">
              <span class="pw-watch-ico">${PLAY_ICON}</span>
              <span class="pw-watch-tx"><b>Watch the Full Breakdown</b><em>King Reggie breaks down this play on film</em></span>
            </button>
          </div>
        </aside>

        <div class="pw-field-zone">
          <img class="pw-field-img" src="${hero}" alt="">
          <div class="pw-hint">Tap a node - it branches across the field</div>
          <div class="pw-web" aria-hidden="true"></div>
          ${adjustHTML}
        </div>
      </div>
    </div>`;

  openTakeover(html, enter);

  const root = inner.querySelector(".pw-card");
  const zone = root.querySelector(".pw-field-zone");
  const web  = root.querySelector(".pw-web");
  let openKey = null;
  wireBookmark(root, p);   // Save Play → coaching-app library (sign-in on demand)

  // Adjustments chip: tap to expand/collapse (phone only; inert on desktop where
  // the panel is always open).
  const adjToggle = root.querySelector(".pw-adj-toggle");
  if(adjToggle) adjToggle.addEventListener("click", () =>
    adjToggle.closest(".pw-adj-panel").classList.toggle("open"));

  // HERO ENTRANCE - bloom/unfold from the node that was clicked (shared-element

  root.classList.remove("in-morph","in-scale","in-left","in-right","in-bottom");
  root.classList.add("pw-enter");

  requestAnimationFrame(() => requestAnimationFrame(() => root.classList.add("ready")));
  setTimeout(() => root.classList.add("ready"), 90);

  // the strands branch out FROM the clicked rail node - so the origin rides
  // the node's vertical position at the field's left edge.
  function originY(sourceEl){
    if(!sourceEl) return 80;
    const zr = zone.getBoundingClientRect(), sr = sourceEl.getBoundingClientRect();
    return Math.max(10, Math.min(90, (sr.top + sr.height/2 - zr.top) / zr.height * 100));
  }
  function openWeb(key, sourceEl){
    web.classList.remove("in");
    web.innerHTML = pwWebHTML(key, p, originY(sourceEl));
    web.querySelectorAll("[data-video]").forEach(vs => {
      const go = () => embedVideo(vs, p.videoUrl);
      vs.addEventListener("click", go);
      vs.addEventListener("keydown", e => { if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(); } });
    });
    web.querySelectorAll("[data-tag]").forEach(b =>
      b.addEventListener("click", () => { const s=sitForTag(b.dataset.tag); s?openDriveBuilderAt(s):openDriveBuilder(); }));
    web.querySelectorAll("[data-play]").forEach(b =>
      b.addEventListener("click", () => openPlay(b.dataset.play)));
    web.querySelectorAll("[data-webback]").forEach(b => b.addEventListener("click", closeWeb));
    root.querySelectorAll(".pw-cat").forEach(c => c.classList.toggle("active", c.dataset.cat === key));
    zone.classList.add("pw-zoomed");
    web.setAttribute("aria-hidden", "false");
    requestAnimationFrame(() => requestAnimationFrame(() => web.classList.add("in")));
    setTimeout(() => web.classList.add("in"), 60);
    openKey = key;
  }
  function closeWeb(){
    web.classList.remove("in");
    zone.classList.remove("pw-zoomed");
    web.setAttribute("aria-hidden", "true");
    root.querySelectorAll(".pw-cat").forEach(c => c.classList.remove("active"));
    openKey = null;
    setTimeout(() => { if(!openKey) web.innerHTML = ""; }, 280);
  }
  root.pwClosePanel = closeWeb;          // let Esc collapse the web first (see onKey)
  root.pwIsPanelOpen = () => !!openKey;

  root.querySelector(".card-close").addEventListener("click", closeTakeover);
  root.querySelectorAll(".pw-cat").forEach(c =>
    c.addEventListener("click", () => openKey === c.dataset.cat ? closeWeb() : openWeb(c.dataset.cat, c)));
  // Watch button = direct link to the unlisted YouTube breakdown (new tab),
  // not an embedded in-card player.
  const watch = root.querySelector(".pw-watch");
  const ytUrl = p.videoUrl || SCHEME_CONFIG.youtubeUrl || "";
  if(ytUrl){
    watch.addEventListener("click", () => window.open(ytUrl, "_blank", "noopener"));
  } else {
    watch.style.display = "none";
  }
  root.querySelectorAll("[data-step]").forEach(b =>
    b.addEventListener("click", () => stepPlay(+b.dataset.step)));
}

// The expansion WEB for one rail node - its items branch out as individual
// nodes over the blurred field, strands tracing back to the source node.
function pwWebHTML(key, p, oy){
  let items = [];
  if(key === "reads")       items = (p.reads||[]).map((r,i) => ({ kind:"read", n:i+1, label:r.label, text:r.text }));
  else if(key === "adjust") items = (p.adjustments||[]).map((a,i) => ({ kind:"adj", n:i+1, label:a }));
  else if(key === "note")   items = pwCoachPoints(p).map((c,i) => ({ kind:"cpoint", n:i+1, title:c.title||`Key ${i+1}`, text:c.text, ico:c.icon }));
  else if(key === "dna")    items = (p.tags||[]).map(t => ({ kind:"tagnode", tag:t, label:tagLabel(t) }));
  else if(key === "formation") items = PLAYS.filter(x => x.formation === p.formation && x.id !== p.id)
                                  .map(s => ({ kind:"playnode", id:s.id, name:s.name, type:s.type, subtype:s.subtype }));
  else if(key === "video")  items = [{ kind:"video" }];

  // Cap at 6 so POS always has a valid entry (7+ items would throw on pos[i])
  if(items.length > 6) items = items.slice(0, 6);

  // node targets in the FIELD region (right of the rail); origin fans up-and-right
  const POS = {
    1:[[58,48]],
    2:[[52,30],[64,68]],
    3:[[50,24],[78,46],[54,72]],
    4:[[48,22],[78,30],[50,60],[80,70]],
    5:[[46,20],[76,26],[62,48],[50,74],[80,80]],
    6:[[46,18],[74,24],[54,42],[80,50],[52,72],[78,80]],
  };
  const pos = POS[Math.min(items.length,6)] || POS[6];
  const single = items.length === 1;
  const O = [0, oy*9];                       // branch origin = source node, left edge

  let strands = "", pulses = "", nodes = "";
  items.forEach((it, i) => {
    const [xp, yp] = pos[i], nx = xp*16, ny = yp*9;
    if(!single){
      const cx = nx*0.42, cy = (O[1]+ny)/2;
      const d = `M${O[0]},${O[1].toFixed(0)} Q${cx.toFixed(0)},${cy.toFixed(0)} ${nx.toFixed(0)},${ny.toFixed(0)}`;
      strands += `<path class="pw-wstrand" d="${d}" pathLength="100"/>`;
      pulses  += `<path class="pw-wpulse" d="${d}" pathLength="100" style="animation-delay:${(i*0.45).toFixed(2)}s"/>`;
    }
    nodes += pwWNode(it, xp, yp, i, single, p);
  });

  return `
    <div class="pw-web-veil" data-webback></div>
    <svg class="pw-web-svg" viewBox="0 0 1600 900" preserveAspectRatio="none" aria-hidden="true">${strands}${pulses}</svg>
    ${nodes}
    <button class="pw-web-back" data-webback><span>&lsaquo;</span> Back</button>`;
}

function pwWNode(it, xp, yp, i, single, p){
  const style = `left:${xp}%;top:${yp}%;--d:${(0.16 + i*0.08).toFixed(2)}s`;
  if(it.kind === "read")
    return `<div class="pw-wnode read" style="${style}">
        <span class="pw-wn-n">${it.n}</span>
        <div class="pw-wn-tx"><b>${it.label}</b><p>${it.text}</p></div>
      </div>`;
  if(it.kind === "adj")
    return `<div class="pw-wnode adj" style="${style}">
        <span class="pw-wn-n">${it.n}</span>
        <div class="pw-wn-tx"><p>${it.label}</p></div>
      </div>`;
  if(it.kind === "cpoint"){
    const cyc = ["target","eye","motion"];
    const ico = PW_ICONS[it.ico] || PW_ICONS[cyc[i % cyc.length]];
    return `<div class="pw-wnode cpoint" style="${style}">
        <span class="pw-wn-ico">${ico}</span>
        <div class="pw-wn-tx"><b>${it.title}</b><p>${it.text}</p></div>
      </div>`;
  }
  if(it.kind === "tagnode")
    return `<button class="pw-wnode tagnode" data-tag="${it.tag}" style="${style}">
        <span class="pw-wn-tag-ico">${STAR_ICON}</span>
        <span class="pw-wn-tag-l">${it.label}</span>
        <span class="pw-wn-tag-go">View calls &rsaquo;</span>
      </button>`;
  if(it.kind === "playnode")
    return `<button class="pw-wnode playnode" data-play="${it.id}" style="${style}">
        <span class="pw-wn-play-type">${it.type}${it.subtype ? ` · ${it.subtype}` : ""}</span>
        <span class="pw-wn-play-name">${it.name}</span>
        <span class="pw-wn-tag-go">Open play &rsaquo;</span>
      </button>`;
  if(it.kind === "video")
    return `<div class="pw-wnode video single" style="${style}">
        <div class="pw-wn-ey">Live Breakdown</div>
        <div class="pwp-video">${videoSlot(p.images?.fieldView, "FIELD VIEW", p.videoUrl)}</div>
      </div>`;
  return "";
}

// Prev/Next: slide the current card out one way, bring the next in from the other.
let stepping = false;
function stepPlay(dir){
  if(!state.view || state.view.kind!=="play" || stepping) return;
  const list = state.list.length ? state.list : PLAYS.map(p=>p.id);
  let i = list.indexOf(state.view.id);
  i = (i + dir + list.length) % list.length;

  const card = inner.querySelector(".card");
  stepping = true;
  if(card){
    card.style.animation = "none";          // cancel the entrance animation
    card.classList.add("stepping");
    // next → old slides left; prev → old slides right
    card.style.transform = `translateX(${dir>0 ? -64 : 64}px) scale(.98)`;
    card.style.opacity = "0";
  }
  setTimeout(() => {
    openPlay(list[i], dir>0 ? "next" : "prev");   // new card enters from opposite side
    stepping = false;
  }, 165);
}

// Full-screen "pop then zoom down" reset for a tenet - a video beat. The tenet
// flashes up large & centered over a dark scrim, holds a moment, then settles
// down into its slot. Uses a fixed-overlay clone so the card's overflow:hidden
// never clips the zoom. Falls back to an instant show under reduced-motion.
function popTenet(slotEl, done){
  const finish = () => { slotEl.style.opacity = "1"; done && done(); };
  if(prefersReducedMotion()){ finish(); return; }
  slotEl.style.opacity = "0";
  const L = slotEl.getBoundingClientRect();
  if(!L.width){ finish(); return; }
  const vw = window.innerWidth, vh = window.innerHeight;

  const pop = document.createElement("div");
  pop.className = "tenet-pop";
  const clone = slotEl.cloneNode(true);
  clone.className = "mf-tenet tenet-pop-card";
  clone.style.cssText = `position:fixed; left:${L.left}px; top:${L.top}px; width:${L.width}px; margin:0; opacity:0;`;
  pop.appendChild(clone);
  takeover.appendChild(pop);

  const s  = Math.max(1.08, Math.min(vh * 0.86 / L.height, vw * 0.9 / L.width, 1.8));
  const dx = (vw / 2) - (L.left + L.width / 2);
  const dy = (vh / 2) - (L.top + L.height / 2);
  clone.style.transformOrigin = "center center";
  clone.style.transform = `translate(${dx}px, ${dy}px) scale(${(s * 0.92).toFixed(3)})`;
  void clone.offsetWidth;                                   // commit start state

  // Phase 1 - pop up big over the scrim
  requestAnimationFrame(() => {
    pop.classList.add("dim");
    clone.style.transition = "transform .34s var(--ease), opacity .3s ease";
    clone.style.opacity = "1";
    clone.style.transform = `translate(${dx}px, ${dy}px) scale(${s.toFixed(3)})`;
  });

  // Phase 2 - after a hold beat, zoom down into the slot
  let settling = false, cleaned = false;
  const settle = setTimeout(() => {
    settling = true;
    pop.classList.remove("dim");
    clone.style.transition = "transform .6s var(--ease)";
    clone.style.transform = "translate(0px, 0px) scale(1)";
  }, 720);
  const cleanup = () => {
    if(cleaned) return; cleaned = true;
    clearTimeout(settle); finish(); pop.remove();
  };
  clone.addEventListener("transitionend", (e) => {
    if(settling && e.propertyName === "transform") cleanup();
  });
  setTimeout(cleanup, 1800);                                // safety net
}

// Premium full-screen "segment bumper" - a title card that wipes in, holds,
// then dissolves to reveal the section (like a YouTube chapter card). Click
// anywhere to skip. Calls done() once it resolves into the section.
function runBumper(eyebrow, title, done, key){
  const b = document.createElement("div");
  b.className = "seg-bumper seg-" + (key || "default");
  const logo = SCHEME_CONFIG.teamLogo;
  const hero = logo ? `<img src="${assetUrl(logo)}" alt="">` : CROWN;
  const schemeName = SCHEME_CONFIG.schemeName || "";
  const wm = logo ? `<div class="seg-wm" aria-hidden="true"><img src="${assetUrl(logo)}" alt=""></div>` : "";

  // Each section gets its own motif inside the shared brand frame (rays + watermark).
  let card;
  if(key === "about"){
    // Manifesto: the scheme's tagline words stamp in one at a time.
    const words = (SCHEME_CONFIG.tagline || schemeName || "").split(/\s+/).filter(Boolean).slice(0, 4);
    const manifesto = words.length
      ? words.map((w, i) => `<span class="seg-mword m${i}">${w}</span>`).join("")
      : `<span class="seg-mword m0">${title||""}</span>`;
    card = `<div class="seg-card">
        <div class="seg-eyebrow seg-eb-top">${schemeName}</div>
        <div class="seg-manifesto">${manifesto}</div>
        <h2 class="seg-title">${title||""}</h2>
        <div class="seg-rule"></div>
      </div>`;
  } else if(key === "personnel"){
    // Roster: the position badges deal in like a starting lineup.
    const seen = [];
    PERSONNEL.forEach(p => { if(p.pos && !seen.includes(p.pos)) seen.push(p.pos); });
    const badges = seen.slice(0, 5).map((p, i) => `<span class="seg-pos p${i}">${p}</span>`).join("");
    card = `<div class="seg-card">
        <div class="seg-roster">${badges}</div>
        ${schemeName ? `<div class="seg-ribbon"><span>${schemeName}</span></div>` : ""}
        <h2 class="seg-title">${title||""}</h2>
        <div class="seg-rule"></div>
        <div class="seg-eyebrow">${eyebrow||""}</div>
      </div>`;
  } else if(key === "dna"){
    // Scouting report: a scan line sweeps the logo, then a stamp slaps on.
    card = `<div class="seg-card">
        <div class="seg-dna-hero">
          <div class="seg-logo">${hero}</div>
          <div class="seg-scan" aria-hidden="true"></div>
        </div>
        <div class="seg-stamp">${eyebrow||"Scouting Report"}</div>
        <h2 class="seg-title">${title||""}</h2>
        <div class="seg-rule"></div>
      </div>`;
  } else {
    card = `<div class="seg-card">
        <div class="seg-logo">${hero}</div>
        ${schemeName ? `<div class="seg-ribbon"><span>${schemeName}</span></div>` : ""}
        <h2 class="seg-title">${title||""}</h2>
        <div class="seg-rule"></div>
        <div class="seg-eyebrow">${eyebrow||""}</div>
      </div>`;
  }

  b.innerHTML =
    `<div class="seg-rays" aria-hidden="true"></div>
     ${wm}
     <span class="seg-star s1">${STAR_ICON}</span>
     <span class="seg-star s2">${STAR_ICON}</span>
     ${card}`;
  takeover.appendChild(b);
  takeover.classList.add("open");
  document.body.classList.add("overlay-on");

  let finished = false;
  const finish = () => {
    if(finished) return;
    finished = true;
    clearTimeout(timer);
    b.classList.add("out");
    setTimeout(() => { b.remove(); done(); }, 430);
  };
  requestAnimationFrame(() => requestAnimationFrame(() => b.classList.add("in")));
  const timer = setTimeout(finish, 1850);   // in (~1.1s) + hold, then resolve
  b.addEventListener("click", finish);       // click anywhere to skip
}

  const all = DRIVE_SITUATIONS.filter(s => (s.tags||[]).includes(tag));
  return (all.find(s => s.grp !== "Down & Distance") || all[0])?.btn || null;
}

/* ==========================================================================
   [SCHEME DNA] - the "Scouting Report" section. Three modes, switched via the
   premium tabs at the bottom: Scheme Analytics (the computed identity), King
   Reggie Recommended (the coach's overlay), Formation Breakdown (absorbs the
   old Formations). Almost everything derives from PLAYS - see computeDNA().
   ========================================================================== */
function computeDNA(){
  const cfg = SCHEME_CONFIG.dna || {};
  const plays = PLAYS, total = plays.length || 1;
  const has = (p,t) => (p.tags||[]).includes(t);
  const cnt = t => plays.filter(p => has(p,t)).length;
  const pct = n => Math.round((n/total)*100);
  const runs = plays.filter(p => p.type === "Run Game").length;
  // "motion" reads off the play name (MTN / Motion prefix) - the signature stat.
  const motion = plays.filter(p => /^(mtn|motion)\b/i.test((p.name||"").trim())).length;
  const weapons = [
    { label:"Play-Action", val: cnt("play-action") },
    { label:"Option Runs", val: cnt("option-run") },
    { label:"Screens",     val: cnt("screen") },
    { label:"Deep Shots",  val: cnt("bomb") },
  ];
  // Attack DNA - the deception tree's branches: one snap into every attack, and
  // each branch carries its own plays (the second level: leaf = a real play card).
  const lp = t => plays.filter(p => has(p,t)).map(p => ({ id:p.id, name:p.name }));
  // Formation-based attack families: the tree groups plays by how you line up,
  // which tells the story better than generic tag buckets for this scheme.
  const byForm = (rx, pred) => plays.filter(p => rx.test(p.formation||"") && pred(p)).map(p => ({id:p.id, name:p.name}));
  const sbPA   = byForm(/singleback/i, p => has(p,"play-action"));
  const ifPA   = byForm(/i.?form/i,    p => has(p,"play-action"));
  const sbRun  = byForm(/singleback/i, p => p.type === "Run Game");
  const ifRun  = byForm(/i.?form/i,    p => p.type === "Run Game");
  const dropBk = plays.filter(p => p.type !== "Run Game" && !has(p,"play-action")).map(p => ({id:p.id, name:p.name}));
  const arsenal = [
    { tag:"sb-pa",  label:"Singleback PA",  val: sbPA.length,   kind:"pass", drive:"",         plays: sbPA },
    { tag:"if-pa",  label:"I-Form PA",      val: ifPA.length,   kind:"pass", drive:"",         plays: ifPA },
    { tag:"sb-run", label:"Singleback Run", val: sbRun.length,  kind:"run",  drive:"Run Game", plays: sbRun },
    { tag:"if-run", label:"I-Form Run",     val: ifRun.length,  kind:"run",  drive:"Run Game", plays: ifRun },
    { tag:"drop",   label:"Drop-Back",      val: dropBk.length, kind:"pass", drive:"",         plays: dropBk },
  ].sort((a,b) => b.val - a.val);
  // Coverage answers as defensive shells; each tile is a door to its situation.
  const coverage = [
    { label:"Man",     shell:"man",    val: cnt("vs-man"),       drive:"Vs Man" },
    { label:"Zone",    shell:"zone",   val: cnt("vs-all-zone"),  drive:"Vs Zone" },
    { label:"Cover 3", shell:"cover3", val: cnt("vs-cover-3"),   drive:"Vs Cover 3" },
    { label:"Cover 2", shell:"cover2", val: cnt("vs-cover-2"),   drive:"Vs Cover 2" },
    { label:"Blitz",   shell:"blitz",  val: cnt("blitz-beater"), drive:"Blitz Beater" },
  ];
  const runPct = pct(runs);
  return {
    total: plays.length, runs, passes: plays.length - runs,
    runPct, passPct: 100 - runPct,
    motionPct: pct(motion),
    signaturePct: cfg.signaturePct != null ? cfg.signaturePct : pct(motion),
    weapons, weaponMax: Math.max(1, ...weapons.map(w => w.val)),
    arsenal, arsenalMax: Math.max(1, ...arsenal.map(a => a.val)),
    coverage,
    signatureLabel:   (cfg.signatureLabel || "Motion").toUpperCase(),
    signatureCaption: cfg.signatureCaption || "The Signature",
    thesisLine1:      cfg.thesisLine1 || "Same look.",
    thesisLine2:      cfg.thesisLine2 || "Every answer.",
    thesisNote:       cfg.thesisNote  || "so the defense can't read which of these is coming until it's too late.",
    recommendedRun:   cfg.recommendedRun != null ? cfg.recommendedRun : 50,
    recommendedNote:  cfg.recommendedNote || "",
    keys:             cfg.keys || [],
  };
}

// The second level of the tree: an active branch fans into its actual plays.
// Each leaf is a door to that play's full breakdown card.
function dnaBranchLeaves(branch, nodeY){
  const ps = branch.plays || [];
  const N = ps.length, top = 45, bot = 335;
  return ps.map((p, i) => {
    const y = N <= 1 ? 190 : +(top + (bot - top) * (i / (N - 1))).toFixed(1);
    const delay = (i * 0.05).toFixed(2);
    const c = "c" + (i % 3);   // cycle the three brand colors per leaf
    return `<g class="dz-leaf" data-play="${p.id}" tabindex="0" role="button" aria-label="${p.name}" style="animation-delay:${delay}s">
        <path class="dz-sub ${c}" pathLength="100" d="M592,${nodeY} C 676,${nodeY} 700,${y} 772,${y}" style="animation-delay:${delay}s"/>
        <circle class="dz-leafdot ${c}" cx="772" cy="${y}" r="4"/>
        <text class="dz-leaftext" x="786" y="${(y + 5).toFixed(1)}">${p.name}</text>
      </g>`;
  }).join("");
}
