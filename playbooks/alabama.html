// Each feature gets a bespoke, self-contained looping mini-animation (no uploads).
// They evoke the real screen: chips popping, bars filling, routes drawing, a drive
// branching, team cards cross-fading. A real screenshot path in `img` overrides it.
function coverMockHTML(kind){
  if(kind === "personnel"){
    return `<div class="ct-mk ct-mk-pers-photo"><img src="${assetUrl(SCHEME_CONFIG.personnelImg)}" alt="Personnel" style="object-position:center 20%"></div>`;
  }
  if(kind === "dna"){
    const d = computeDNA();
    const paCount = (PLAYS.filter(p => (p.tags||[]).includes("play-action")).length);
    const bmbCount = (PLAYS.filter(p => (p.tags||[]).includes("bomb")).length);
    const rows = [
      ["RUN GAME",    d.runPct],
      ["PASS GAME",   d.passPct],
      ["PLAY-ACTION", Math.round(paCount / d.total * 100)],
      ["DEEP SHOTS",  Math.round(bmbCount / d.total * 100)],
    ];
    return `<div class="ct-mk ct-mk-dna">${rows.map((r, i) =>
      `<div class="mkd-row"><span class="mkd-lbl">${r[0]}</span><span class="mkd-bar"><i style="--w:${r[1]}%;--d:${(i*0.32).toFixed(2)}s"></i></span><span class="mkd-pct">${r[1]}%</span></div>`).join("")}</div>`;
  }
  if(kind === "plays"){
    const p = PLAYS.find(x => x.type === "Star Play" && x.images?.playCall) || PLAYS[0];
    const reads = (p.reads||[]).slice(0, 2);
    return `<div class="ct-mk ct-mk-plays">
      <div class="ct-mk-pc-top">
        <span class="ct-mk-pc-name">${p.name}</span>
        <span class="ct-mk-pc-type">${p.type}${p.subtype ? " · "+p.subtype : ""} · ${p.formation}</span>
      </div>
      ${p.images?.playCall ? `<img class="ct-mk-pc-img" src="${assetUrl(p.images.playCall)}" alt="${p.name}">` : ""}
      <div class="ct-mk-pc-reads">${reads.map(r => `<div class="ct-mk-pc-read">${r.label}</div>`).join("")}</div>
    </div>`;
  }
  if(kind === "drive"){
    const sampleSits = [
      { label:"All Calls", on:true },
      { label:"1st & 10" },
      { label:"Red Zone" },
      { label:"Blitz Beater" },
      { label:"Run Game" },
    ];
    return `<div class="ct-mk ct-mk-db">
      <div class="ct-mk-db-field">
        <img src="${assetUrl(FIELD_ASSET)}" alt="">
        <div class="ct-mk-db-ov"></div>
      </div>
      <div class="ct-mk-db-rail">
        <div class="ct-mk-db-grplabel">Situation</div>
        ${sampleSits.map(s => `<div class="ct-mk-db-sit${s.on?" s-on":""}">${s.label}</div>`).join("")}
      </div>
    </div>`;
  }
  if(kind === "series"){
    return `<div class="ct-mk ct-mk-ser">${SERIES.teams.map(t =>
      `<div class="ct-mk-ser-card" style="--acc:${t.accent}">
        <img class="ct-mk-ser-bg" src="${assetUrl(t.heroBg)}" alt="${t.short}">
        <div class="ct-mk-ser-veil"></div>
        <div class="ct-mk-ser-body">
          <div class="ct-mk-ser-name">${t.short}</div>
          <div class="ct-mk-ser-titles">${t.titles.map(y=>`<i>${y}</i>`).join("")}</div>
        </div>
      </div>`).join("")}</div>`;
  }
  return `<div class="ct-ph">${CROWN}<span>Preview</span></div>`;
}

// Cover feature walkthrough: a skippable carousel of what's inside. Anyone can flip
// through it; the Open Playbook button ignores it. Auto-advances gently, then stops
// for good the moment the user takes control (so it never fights them).
function buildCoverTour(){
  const track = $("#ct-track"), dotsWrap = $("#ct-dots"), tour = $("#cover-tour");
  if(!track || !dotsWrap) return;
  track.innerHTML = COVER_TOUR.map((s, i) =>
    `<div class="ct-slide${i === 0 ? " on" : ""}" data-i="${i}">
       <div class="ct-shot">${s.img
         ? `<img src="${assetUrl(s.img)}" alt="${s.title}">`
         : coverMockHTML(s.mock)}</div>
       <div class="ct-caption">
         <div class="ct-num">Feature ${i + 1} / ${COVER_TOUR.length}</div>
         <div class="ct-title">${s.title}</div>
         <p class="ct-desc">${s.desc}</p>
       </div>
     </div>`).join("");
  dotsWrap.innerHTML = COVER_TOUR.map((_, i) =>
    `<button class="ct-dot${i === 0 ? " on" : ""}" data-i="${i}" aria-label="Feature ${i + 1}"></button>`).join("");
  const slides = [...track.querySelectorAll(".ct-slide")];
  const dots = [...dotsWrap.querySelectorAll(".ct-dot")];
  let idx = 0, timer = null, stopped = false;
  const show = (n) => {
    n = (n + slides.length) % slides.length;
    slides.forEach((s, i) => s.classList.toggle("on", i === n));
    dots.forEach((d, i) => d.classList.toggle("on", i === n));
    idx = n;
  };
  // Hand control to the user permanently on first interaction.
  const takeOver = (n) => { stopped = true; clearInterval(timer); show(n); };
  const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if(!reduced){ timer = setInterval(() => { if(!stopped) show(idx + 1); }, 7000); }
  $("#ct-next").addEventListener("click", () => takeOver(idx + 1));
  $("#ct-prev").addEventListener("click", () => takeOver(idx - 1));
  dots.forEach((d, i) => d.addEventListener("click", () => takeOver(i)));
}

// Draw the hub web: connecting lines from the crest center out to every nav node
// and the Drive Builder, measured from the live layout (so it stays aligned).
let _hubWebWired = false;
function wireHubWeb(){
  const field = $("#field"), web = $("#hub-web");
  if(!field || !web) return;
  // launch point: pushed DOWN into the stadium bowl, hidden behind the cutout.
  // Strands fan out before they clear the rim, so they read as rising from
  // behind the stadium with no visible convergence knot.
  const ORX = 50, ORY = 72;
  const draw = () => {
    const fr = field.getBoundingClientRect();
    if(!fr.width || !fr.height) return;
    // each strand: straight up out of the stadium, then a soft fan to the node
    const line = (el, key, idx) => {
      const r = el.getBoundingClientRect();
      const x = (r.left + r.width/2 - fr.left) / fr.width * 100;
      const y = (r.top + r.height/2 - fr.top) / fr.height * 100;
      const c1x = ORX,                 c1y = ORY + (y - ORY) * 0.45;   // launch vertically
      const c2x = x + (ORX - x) * 0.15, c2y = y + (ORY - y) * 0.18;     // arc in to the node
      const d = `M${ORX},${ORY} C${c1x.toFixed(2)},${c1y.toFixed(2)} ${c2x.toFixed(2)},${c2y.toFixed(2)} ${x.toFixed(2)},${y.toFixed(2)}`;
      return `<path class="hub-line" data-for="${key}" d="${d}"/>`
           + `<path class="hub-pulse" data-for="${key}" pathLength="100" style="animation-delay:${(idx * 0.34).toFixed(2)}s" d="${d}"/>`;
    };
    let svg = "", i = 0;
    field.querySelectorAll(".left-nav .patch, .right-nav .patch").forEach(n => {
      svg += line(n, n.dataset.section || n.dataset.category || "n" + i, i); i++;
    });
    // Drive Builder is no longer a sky node - it lives "on the field," so no strand.
    web.innerHTML = svg;
  };
  requestAnimationFrame(() => requestAnimationFrame(draw));
  setTimeout(draw, 300); setTimeout(draw, 700); setTimeout(draw, 1200);
  if(!_hubWebWired){
    window.addEventListener("resize", draw);
    // hovering a node lights up its own strand of the web
    field.querySelectorAll(".left-nav .patch, .right-nav .patch").forEach(n => {
      const key = n.dataset.section || n.dataset.category;
      n.addEventListener("pointerenter", () => web.querySelectorAll(`[data-for="${key}"]`).forEach(l => l.classList.add("lit")));
      n.addEventListener("pointerleave", () => web.querySelectorAll(`[data-for="${key}"]`).forEach(l => l.classList.remove("lit")));
    });
    _hubWebWired = true;
  }
}

// Hub hero: the stadium clip plays as a quiet looping backdrop. Two stacked
// copies hand off at the seam - as the foreground clip nears its end (full
// fireworks), the background copy restarts from the calm opening and the two
// CROSSFADE, so the loop dissolves instead of hard-cutting. --fw rides the
// blended playhead so the strand trails glow up with the fireworks and ease
// back down through the dissolve. A soft gold light pool tracks the cursor.
const HUB_XFADE = 0.9;            // seconds of crossfade at the loop seam
function wireHubInteract(){
  const field = $("#field");
  if(!field || field._interact) return;
  field._interact = true;

  const reduce = prefersReducedMotion();
  const setFw = v => field.style.setProperty("--fw", Math.max(0, Math.min(1, v)).toFixed(3));
  const vids = [$("#hub-stadium"), $("#hub-stadium-b")];
  const durOf = v => (v && isFinite(v.duration) && v.duration > 0) ? v.duration : 0;
  const playSafe = v => { if(v){ const p = v.play(); if(p && p.catch) p.catch(()=>{}); } };

  if(vids[0] && vids[1]){
    let active = 0, crossing = false;
    const start = () => {                       // foreground = active, background hidden
      vids[active].style.opacity = "1";
      vids[1 - active].style.opacity = "0";
      if(!reduce){ try { vids[active].currentTime = 0; } catch(e){} playSafe(vids[active]); }
    };
    const frame = () => {
      const cur = vids[active], nxt = vids[1 - active], d = durOf(cur);
      if(d){
        const t = cur.currentTime;
        if(!reduce && !crossing && t >= d - HUB_XFADE){     // seam approaching: bring the calm copy in
          crossing = true;
          try { nxt.currentTime = 0; } catch(e){} playSafe(nxt);
        }
        if(crossing){
          const into = Math.min(1, (t - (d - HUB_XFADE)) / HUB_XFADE);   // 0..1 across the dissolve
          cur.style.opacity = (1 - into).toFixed(3);
          nxt.style.opacity = into.toFixed(3);
          const dn = durOf(nxt);
          setFw((cur.currentTime / d) * (1 - into) + (dn ? nxt.currentTime / dn : 0) * into);
          if(into >= 1){ cur.pause(); active = 1 - active; crossing = false; }
        } else {
          setFw(cur.currentTime / d);
        }
      }
      requestAnimationFrame(frame);
    };
    start();
    requestAnimationFrame(frame);
  }

  // --- decorative gold light pool (skipped under reduced motion) ---
  if(reduce) return;
  const glow = $("#hub-cursor-glow");
  field.addEventListener("pointermove", e => {
    const r = field.getBoundingClientRect();
    if(glow){ glow.style.left = (e.clientX - r.left) + "px"; glow.style.top = (e.clientY - r.top) + "px"; glow.style.opacity = "1"; }
  });
  field.addEventListener("pointerleave", () => { if(glow) glow.style.opacity = "0"; });
}

/* ==========================================================================
   SUPABASE SYNC - auto-pushes scheme + play data on load, fetches ratings
   ========================================================================== */

// Aggregate play ratings keyed by play_key: { avg, count }
let PLAY_RATINGS = {};

function sbHeaders(extra = {}) {
  return {
    'apikey': SCHEME_CONFIG.supabaseAnonKey,
    'Authorization': `Bearer ${SCHEME_CONFIG.supabaseAnonKey}`,
    'Content-Type': 'application/json',
    ...extra,
  };
}

async function syncPlaybookToSupabase() {
  const { schemeKey, supabaseUrl, supabaseAnonKey } = SCHEME_CONFIG;
  if (!schemeKey || !supabaseUrl || !supabaseAnonKey) return;

  try {
    // 1. Upsert playbook row
    await fetch(`${supabaseUrl}/rest/v1/playbooks`, {
      method: 'POST',
      headers: sbHeaders({ 'Prefer': 'resolution=merge-duplicates' }),
      body: JSON.stringify({
        scheme_key:      schemeKey,
        name:            SCHEME_CONFIG.schemeName,
        subtitle:        SCHEME_CONFIG.schemeSubtitle || '',
        series_label:    SCHEME_CONFIG.seriesLabel || '',
        primary_color:   SCHEME_CONFIG.primaryColor,
        secondary_color: SCHEME_CONFIG.secondaryColor,
        tagline:         SCHEME_CONFIG.tagline || '',
        tagline_sub:     SCHEME_CONFIG.taglineSub || '',
        asset_base_url:  SCHEME_CONFIG.assetBaseUrl || '',
        youtube_url:     ABOUT.youtube || '',
        published_at:    new Date().toISOString(),
      }),
    });

    // 2. Replace all plays — delete stale rows first, then insert fresh.
    // This ensures the DB always matches exactly what's in the PLAYS array,
    // so duplicating this file for a new scheme never leaves ghost plays behind.
    await fetch(`${supabaseUrl}/rest/v1/plays?scheme_key=eq.${encodeURIComponent(schemeKey)}`, {
      method: 'DELETE',
      headers: sbHeaders(),
    });

    const playsPayload = PLAYS.map(p => ({
      play_key:     p.id,
      scheme_key:   schemeKey,
      name:         p.name,
      type:         p.type || '',
      subtype:      p.subtype || '',
      formation:    p.formation || '',
      tags:         p.tags || [],
      reads:        p.reads || [],
      adjustments:  p.adjustments || [],
      when_to_use:  p.whenToUse || '',
      setup:        p.setup || '',
      exclusive:    p.exclusive || false,
      images:       p.images || {},
      video_url:    p.videoUrl || '',
    }));

    await fetch(`${supabaseUrl}/rest/v1/plays`, {
      method: 'POST',
      headers: sbHeaders(),
      body: JSON.stringify(playsPayload),
    });
  } catch (e) {
    // Silent fail - sync is background, never blocks the UI
  }
}

async function fetchPlayRatings() {
  const { schemeKey, supabaseUrl, supabaseAnonKey } = SCHEME_CONFIG;
  if (!schemeKey || !supabaseUrl || !supabaseAnonKey) return;

  try {
    const res = await fetch(
      `${supabaseUrl}/rest/v1/play_ratings?scheme_key=eq.${schemeKey}&select=play_key,rating`,
      { headers: sbHeaders() }
    );
    const rows = await res.json();
    if (!Array.isArray(rows)) return;

    const agg = {};
    rows.forEach(r => {
      if (!agg[r.play_key]) agg[r.play_key] = { sum: 0, count: 0 };
      agg[r.play_key].sum += r.rating;
      agg[r.play_key].count++;
    });
    PLAY_RATINGS = Object.fromEntries(
      Object.entries(agg).map(([k, v]) => [k, {
        avg: Math.round((v.sum / v.count) * 10) / 10,
        count: v.count,
      }])
    );
  } catch (e) {}
}

// Star rating display helper - call this anywhere you render a play card
function ratingStars(playId) {
  const r = PLAY_RATINGS[playId];
  if (!r || !r.count) return '';
  const filled = Math.round(r.avg);
  const stars = Array.from({ length: 5 }, (_, i) =>
    `<svg viewBox="0 0 24 24" width="13" height="13" fill="${i < filled ? 'var(--gold)' : 'rgba(0,0,0,.15)'}"><path d="M12 2l2.9 6.3 6.9.7-5.2 4.6 1.5 6.8L12 17.8 5.9 20.4l1.5-6.8L2.2 9l6.9-.7L12 2z"/></svg>`
  ).join('');
  return `<span style="display:inline-flex;align-items:center;gap:3px;margin-top:4px">${stars}<span style="font-family:var(--font-display);font-size:11px;font-weight:700;color:var(--ink-soft);margin-left:4px">${r.avg.toFixed(1)} · ${r.count} rating${r.count !== 1 ? 's' : ''}</span></span>`;
}

/* ==========================================================================
   SK_AUTH - shared sign-in bridge to the coaching app
   --------------------------------------------------------------------------
   The playbook is FREE TO BROWSE. There is NO login wall: anonymous visitors
   (and YouTube viewers) see everything exactly as before. We only need to know
   WHO is signed in so future "save" actions (Save Drive, Save Play to library,
   etc.) can attach to their account and show up in the coaching app.

   Same Supabase project + default session storage as the coaching app, so on a
   shared origin the member is ALREADY signed in here - no second login. On a
   separate origin, skRequireLogin() prompts once (see stub below).
   ========================================================================== */
const SK_AUTH = {
  client: null,   // supabase-js client (only created if the CDN lib loaded)
  user:   null,   // the auth user, or null while browsing anonymously
  get memberId(){ return this.user ? this.user.id : null; },
  get signedIn(){ return !!this.user; },
};

async function initAuth(){
  // supabase-js is a CDN script; if it didn't load, degrade silently to
  // anonymous browsing - the playbook still works 100%.
  if (typeof supabase === 'undefined' || !supabase.createClient) return;
  const { supabaseUrl, supabaseAnonKey } = SCHEME_CONFIG;
  if (!supabaseUrl || !supabaseAnonKey) return;
  try {
    // Default storage + same project ref = the very session the coaching app
    // wrote, so a same-origin member is already signed in here.
    SK_AUTH.client = supabase.createClient(supabaseUrl, supabaseAnonKey);
    const { data:{ session } } = await SK_AUTH.client.auth.getSession();
    SK_AUTH.user = session ? session.user : null;
    loadSavedPlays();   // hydrate the member's bookmarks (no-op while anonymous)
    // Stay in sync if they sign in/out in the coaching-app tab next door.
    SK_AUTH.client.auth.onAuthStateChange((_evt, sess) => {
      SK_AUTH.user = sess ? sess.user : null;
      loadSavedPlays();
    });
  } catch (e) { /* never let an auth hiccup break the playbook */ }
}

/* --------------------------------------------------------------------------
   SAVED PLAYS - the member's bookmarked play_keys for THIS scheme.
   Loaded once we know who's signed in; keeps every bookmark button in sync.
   -------------------------------------------------------------------------- */
const SK_SAVED = new Set();   // play_keys this member has bookmarked (this scheme)

async function loadSavedPlays(){
  SK_SAVED.clear();
  if (!SK_AUTH.signedIn || !SK_AUTH.client) { refreshBookmarkButtons(); return; }
  try {
    const { data, error } = await SK_AUTH.client
      .from('saved_plays').select('play_key')
      .eq('scheme_key', SCHEME_CONFIG.schemeKey);
    if (error) throw error;
    (data || []).forEach(r => SK_SAVED.add(r.play_key));
  } catch (e) { /* keep browsing; bookmarks just show empty */ }
  refreshBookmarkButtons();
}

// Repaint any bookmark buttons currently on screen to match SK_SAVED.
function refreshBookmarkButtons(){
  document.querySelectorAll('[data-bookmark]').forEach(b =>
    setBookmarkState(b, SK_SAVED.has(b.dataset.bookmark)));
}

const SK_BM_LINE = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`;
const SK_BM_FILL = `<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`;

// Button markup for any play card. data-bookmark = the play id (play_key).
function skBookmarkBtnHTML(playId){
  const saved = SK_SAVED.has(playId);
  return `<button class="sk-bookmark${saved ? ' saved' : ''}" data-bookmark="${playId}" type="button"
            aria-pressed="${saved}" title="${saved ? 'Saved to your coaching app' : 'Save to your coaching app'}">
            <span class="sk-bm-ico">${saved ? SK_BM_FILL : SK_BM_LINE}</span>
            <span class="sk-bm-tx">${saved ? 'Saved' : 'Save Play'}</span>
          </button>`;
}

function setBookmarkState(btn, saved){
  btn.classList.toggle('saved', saved);
  btn.setAttribute('aria-pressed', saved ? 'true' : 'false');
  btn.title = saved ? 'Saved to your coaching app' : 'Save to your coaching app';
  const ico = btn.querySelector('.sk-bm-ico'), tx = btn.querySelector('.sk-bm-tx');
  if (ico) ico.innerHTML = saved ? SK_BM_FILL : SK_BM_LINE;
  if (tx)  tx.textContent = saved ? 'Saved' : 'Save Play';
}

// Attach bookmark behavior to every [data-bookmark] inside `scope` for play `p`.
function wireBookmark(scope, p){
  scope.querySelectorAll('[data-bookmark]').forEach(b => {
    setBookmarkState(b, SK_SAVED.has(p.id));
    b.addEventListener('click', e => { e.stopPropagation(); toggleSavePlay(p, b); });
  });
}

// Toggle a play in/out of the member's library (sign-in prompt on first save).
let skSaving = false;
async function toggleSavePlay(p, btn){
  if (skSaving) return;
  const ok = await skRequireLogin('save plays to your library');
  if (!ok) return;
  skSaving = true;
  if (btn) btn.classList.add('busy');
  const wasSaved = SK_SAVED.has(p.id);
  try {
    if (wasSaved) {
      const { error } = await SK_AUTH.client.from('saved_plays').delete()
        .eq('member_id', SK_AUTH.memberId)
        .eq('scheme_key', SCHEME_CONFIG.schemeKey)
        .eq('play_key', p.id);
      if (error) throw error;
      SK_SAVED.delete(p.id);
      skToast('Removed from your library');
    } else {
      const { error } = await SK_AUTH.client.from('saved_plays')
        .upsert({ member_id: SK_AUTH.memberId, scheme_key: SCHEME_CONFIG.schemeKey, play_key: p.id },
                { onConflict: 'member_id,scheme_key,play_key' });
      if (error) throw error;
      SK_SAVED.add(p.id);
      skToast('Saved to your coaching app');
    }
    refreshBookmarkButtons();   // every copy of this play's button on screen
  } catch (e) {
    skToast('Could not reach your library - try again');
  } finally {
    skSaving = false;
    if (btn) btn.classList.remove('busy');
  }
}

/* --------------------------------------------------------------------------
   skRequireLogin(reason) - friendly contextual sign-in (NOT a browse wall).
   Resolves true the moment the member is signed in; otherwise pops the
   varsity-patch sign-in modal wired to signInWithPassword. The member types
   their OWN email/password (same as the coaching app); we never store it.
     returns - Promise<boolean> (true = signed in, ok to proceed).
   -------------------------------------------------------------------------- */
let skLoginResolve = null;
function skRequireLogin(reason = 'save this'){
  if (SK_AUTH.signedIn) return Promise.resolve(true);
  if (!SK_AUTH.client) { skToast('Sign-in is unavailable right now'); return Promise.resolve(false); }
  skInjectAuthCSS();
  return new Promise(resolve => { skLoginResolve = resolve; skOpenLoginModal(reason); });
}

function skSettleLogin(ok){
  const r = skLoginResolve; skLoginResolve = null;
  if (r) r(ok);
}

function skOpenLoginModal(reason){
  document.getElementById('sk-login')?.remove();
  const wrap = document.createElement('div');
  wrap.id = 'sk-login';
  wrap.innerHTML = `
    <div class="sk-login-backdrop"></div>
    <div class="sk-login-card" role="dialog" aria-modal="true" aria-label="Sign in">
      <button class="sk-login-x" type="button" aria-label="Close">&times;</button>
      <div class="sk-login-emblem">${typeof CROWN !== 'undefined' ? CROWN : '★'}</div>
      <div class="sk-login-eyebrow">Scheme Kings</div>
      <h3 class="sk-login-title">Sign in to ${reason}</h3>
      <p class="sk-login-sub">It saves straight to your coaching app, so your plays and drives stay in sync across the playbook and the app.</p>
      <form class="sk-login-form" autocomplete="on">
        <input class="sk-login-input" type="email" name="email" placeholder="Email" autocomplete="email" required>
        <input class="sk-login-input" type="password" name="password" placeholder="Password" autocomplete="current-password" required>
        <div class="sk-login-err" role="alert"></div>
        <button class="sk-login-go" type="submit">Sign In &amp; Save</button>
      </form>
      <p class="sk-login-foot">Same email &amp; password as your Scheme Kings coaching app.</p>
    </div>`;
  document.body.appendChild(wrap);
  void wrap.offsetWidth;            // force reflow so the opacity:0 start registers
  wrap.classList.add('open');      // then transition in (no deferred callback needed)

  const close = (ok) => {
    wrap.classList.remove('open');
    setTimeout(() => wrap.remove(), 220);
    document.removeEventListener('keydown', onEsc);
    skSettleLogin(!!ok);
  };
  const onEsc = (e) => { if (e.key === 'Escape') close(false); };
  document.addEventListener('keydown', onEsc);
  wrap.querySelector('.sk-login-x').addEventListener('click', () => close(false));
  wrap.querySelector('.sk-login-backdrop').addEventListener('click', () => close(false));

  const form = wrap.querySelector('.sk-login-form');
  const err  = wrap.querySelector('.sk-login-err');
  const go   = wrap.querySelector('.sk-login-go');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    err.textContent = '';
    const email = form.email.value.trim();
    const password = form.password.value;
    if (!email || !password) { err.textContent = 'Enter your email and password.'; return; }
    go.disabled = true; go.textContent = 'Signing in…';
    try {
      const { data, error } = await SK_AUTH.client.auth.signInWithPassword({ email, password });
      if (error) throw error;
      SK_AUTH.user = data.user;
      await loadSavedPlays();
      close(true);
    } catch (ex) {
      err.textContent = (ex && /invalid/i.test(ex.message || ''))
        ? 'That email or password didn’t match. Try again.'
        : 'Could not sign in right now. Please try again.';
      go.disabled = false; go.textContent = 'Sign In & Save';
    }
  });
  setTimeout(() => wrap.querySelector('.sk-login-input')?.focus(), 80);
}

// Lightweight toast (auto-dismiss). Self-styled via the injected auth CSS.
let skToastTimer = null;
function skToast(msg){
  skInjectAuthCSS();
  let t = document.getElementById('sk-toast');
  if (!t) { t = document.createElement('div'); t.id = 'sk-toast'; document.body.appendChild(t); }
  t.textContent = msg;
  void t.offsetWidth;              // force reflow so the fade-in transition fires
  t.classList.add('show');
  clearTimeout(skToastTimer);
  skToastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

  #sk-login .sk-login-foot{ font-size:12px; color:#3a3320; opacity:.6; margin:14px 0 0; }

  #sk-toast{ position:fixed; left:50%; bottom:34px; transform:translate(-50%, 18px); z-index:9100;
    padding:12px 20px; border-radius:999px; pointer-events:none; opacity:0;
    font-family:var(--font-display,"Barlow Condensed"),sans-serif; font-weight:800; text-transform:uppercase;
    letter-spacing:.04em; font-size:14px; color:var(--cream,#F0E7CB); background:#15233f;
    border:2px solid var(--gold,#F5A623); box-shadow:0 12px 30px rgba(0,0,0,.4);
    transition:opacity .25s ease, transform .25s ease; }
  #sk-toast.show{ opacity:1; transform:translate(-50%, 0); }
  @media (prefers-reduced-motion: reduce){
    #sk-login, #sk-login .sk-login-card, #sk-toast, .sk-bookmark{ transition:none; }
  }`;
  const s = document.createElement('style');
  s.id = 'sk-auth-css';
  s.textContent = css;
  document.head.appendChild(s);
}

function init(){
  applyConfig();
  buildSkCta();
  buildNav();
  buildRightNav();
  buildMobileNav();
  buildCallSheetPill();
  $("#fs-launch")?.addEventListener("click", openFullSystem);
  $("#open-btn").addEventListener("click", openPlaybook);
  buildCoverTour();

  // Background sync - owner-only write guard (anon key is public; gate the write)
  if (SK_AUTH.memberId === '80498288-8171-4d65-af9f-20648b279041') syncPlaybookToSupabase();
  fetchPlayRatings();

  // Shared sign-in bridge - silent; anonymous browsing is unaffected
  skInjectAuthCSS();   // so Save-Play buttons are styled the moment a card opens
  initAuth();

  // Deep-link: ?play=<id> opens that play's breakdown directly (coaching-app saved plays)
  try {
    const _pid = new URLSearchParams(location.search).get('play');
    if (_pid && PLAYS.some(x => x.id === _pid)) requestAnimationFrame(() => openPlay(_pid));
  } catch(_){}
}
init();

// ---- FULLSCREEN TOGGLE ----
(function(){
  // The button markup is defined AFTER this script, so wire it once the DOM is
  // ready (otherwise getElementById returns null and the listener never attaches).
  const wire = () => {
    const btn = document.getElementById('fs-btn');
    if (!btn) return;
    btn.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(()=>{});
      } else {
        document.exitFullscreen().catch(()=>{});
      }
    });
    document.addEventListener('fullscreenchange', () => {
      btn.classList.toggle('is-fullscreen', !!document.fullscreenElement);
    });
  };
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', wire);
  } else {
    wire();
  }
})();
</script>
