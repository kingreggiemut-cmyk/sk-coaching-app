/* Formation Breakdown - master-detail: one featured formation + selectable thumbnails */
.fm-wrap{ display:flex; gap:22px; align-items:stretch; padding:8px 0 2px; }
.fm-feature{ flex:1 1 auto; min-width:0; display:flex; gap:26px; }
.fm-feature-img{ flex:0 0 46%; align-self:flex-start; }
.fm-feature-img .imgslot{ width:100%; aspect-ratio:16/9; border-radius:12px; overflow:hidden;
  box-shadow:0 14px 34px rgba(0,0,0,.45); }
.fm-feature-img img{ width:100%; height:100%; object-fit:cover; display:block; }
.fm-feature-body{ flex:1; min-width:0; display:flex; flex-direction:column; }
.fm-feature-name{ font-family:var(--font-display); font-weight:900; font-size:clamp(26px,2.8vw,38px); line-height:1.02;
  letter-spacing:.5px; text-transform:uppercase; color:var(--gold); }
.fm-feature-bar{ position:relative; height:16px; border-radius:5px; overflow:hidden; margin:12px 0 18px; max-width:360px;
  background:color-mix(in srgb,var(--cream) 62%, var(--primary)); }
.dna-f-run{ position:absolute; left:0; top:0; bottom:0; width:0; transition:width 1s cubic-bezier(.16,1,.3,1) .2s; background:var(--secondary); }
.fm-feature-bal{ position:absolute; right:9px; top:50%; transform:translateY(-50%); font-family:var(--font-display);
  font-weight:800; font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:#fff; text-shadow:0 1px 3px rgba(0,0,0,.65); }
.fm-feature-points{ list-style:none; margin:0 0 18px; padding:0; display:flex; flex-direction:column; gap:14px; }
.fm-pt{ position:relative; padding-left:30px; font-family:var(--font-body); font-size:16.5px; line-height:1.4; color:var(--cream);
  opacity:0; transform:translateY(8px); animation:fmPt .5s cubic-bezier(.16,1,.3,1) both; }
.fm-pt::before{ content:""; position:absolute; left:4px; top:8px; width:11px; height:11px; border-radius:3px;
  background:var(--gold); transform:rotate(45deg); }
@keyframes fmPt{ to{ opacity:1; transform:none; } }
.fm-feature-chips{ display:flex; flex-wrap:wrap; gap:8px; margin-top:auto; }
.fm-feat-anim{ animation:fmFeat .42s cubic-bezier(.16,1,.3,1); }
@keyframes fmFeat{ from{ opacity:0; transform:translateX(12px); } to{ opacity:1; transform:none; } }
.fm-rail{ flex:0 0 312px; display:flex; flex-direction:column; gap:14px; }
.fm-thumb{ display:flex; align-items:center; gap:14px; padding:12px; cursor:pointer; transition:all .18s ease; text-align:left;
  background:color-mix(in srgb,var(--cream) 5%, transparent); border:1px solid color-mix(in srgb,var(--cream) 16%, transparent); border-radius:12px; }
.fm-thumb:hover{ border-color:color-mix(in srgb,var(--gold) 55%, transparent); transform:translateY(-2px); }
.fm-thumb.active{ border-color:var(--gold); background:color-mix(in srgb,var(--gold) 10%, transparent); }
.fm-thumb-img{ flex:0 0 116px; }
.fm-thumb-img .imgslot{ width:116px; height:73px; border-radius:8px; overflow:hidden; }
.fm-thumb-img img{ width:100%; height:100%; object-fit:cover; display:block; }
.fm-thumb-text{ display:flex; flex-direction:column; min-width:0; }
.fm-thumb-name{ font-family:var(--font-display); font-weight:800; font-size:15px; letter-spacing:.03em; text-transform:uppercase; color:var(--cream); line-height:1.12; }
.fm-thumb-n{ font-family:var(--font-display); font-weight:700; font-size:10.5px; letter-spacing:.05em; text-transform:uppercase; color:color-mix(in srgb,var(--cream) 55%, var(--primary)); margin-top:3px; }
@media (max-width:860px){ .fm-wrap{ flex-direction:column; } .fm-feature{ flex-direction:column; } .fm-feature-img{ flex:none; } .fm-rail{ flex:none; flex-direction:row; overflow-x:auto; } }
/* Phone: horizontal scroll of the formation selectors is undiscoverable - stack
   them vertically so all three are reachable by normal page scroll. */
@media (max-width:560px){
  .fm-rail{ flex-direction:column !important; overflow-x:visible !important; gap:10px; }
  .fm-thumb{ width:100%; }
  .fm-thumb-img{ flex:0 0 104px; }
  .fm-thumb-img .imgslot{ width:104px; height:66px; }
}
.dna-fchip{ font-family:var(--font-display); font-weight:700; font-size:11px; letter-spacing:.04em; text-transform:uppercase;
  border-radius:20px; padding:5px 11px; cursor:pointer; transition:all .15s ease; }
.dna-fchip.run{ color:var(--cream); background:color-mix(in srgb, var(--secondary) 30%, #000);
  border:1px solid color-mix(in srgb, var(--secondary) 70%, transparent); }
.dna-fchip.run:hover{ background:var(--secondary); color:var(--ink-sec); border-color:var(--secondary); }
.dna-fchip.pass{ color:var(--cream); background:color-mix(in srgb, var(--cream) 12%, transparent);
  border:1px solid color-mix(in srgb, var(--cream) 55%, transparent); }
.dna-fchip.pass:hover{ background:var(--cream); color:var(--ink); border-color:var(--cream); }
.dna-fchip.dead{ color:var(--cream); background:color-mix(in srgb, var(--primary) 40%, #000);
  border:1px solid color-mix(in srgb, var(--cream) 20%, transparent); opacity:.6; cursor:default; }

/* the premium mode tabs (bottom) - each tab carries its own --accent */
.dna-tabs{ position:relative; display:flex; justify-content:center; gap:10px; margin-top:16px; flex-wrap:wrap; }
.dna-tab{ position:relative; display:inline-flex; align-items:center; gap:9px; font-family:var(--font-display);
  font-weight:800; font-size:14px; letter-spacing:.07em; text-transform:uppercase;
  color:color-mix(in srgb,var(--cream) 68%, #000);
  background:color-mix(in srgb, var(--accent) 12%, #0c1018);
  border:1.5px solid color-mix(in srgb, var(--accent) 45%, transparent);
  border-radius:9px; padding:11px 20px; cursor:pointer; transition:all .2s ease; box-shadow:0 4px 12px rgba(0,0,0,.3); }
.dna-tab-dot{ width:9px; height:9px; border-radius:50%; background:var(--accent); flex:0 0 auto;
  box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 30%, transparent); }
.dna-tab::after{ content:""; position:absolute; left:50%; bottom:-7px; transform:translateX(-50%);
  height:3px; width:0; border-radius:3px; background:var(--accent); transition:width .3s cubic-bezier(.16,1,.3,1); }
.dna-tab:hover{ border-color:var(--accent); color:var(--cream); transform:translateY(-2px); }
.dna-tab.on{ color:var(--cream); background:color-mix(in srgb, var(--accent) 80%, #000); transform:translateY(-2px);
  border-color:color-mix(in srgb, var(--accent) 90%, #fff);
  box-shadow:0 10px 22px color-mix(in srgb,var(--accent) 38%, transparent),
             inset 0 0 0 1.5px color-mix(in srgb,var(--cream) 18%, transparent); }
.dna-tab.on::after{ width:62%; }
.dna-tab.on .dna-tab-dot{ background:var(--cream); animation:tabPulse 1.9s ease-in-out infinite; }
@keyframes tabPulse{ 0%,100%{ box-shadow:0 0 0 3px color-mix(in srgb,var(--cream) 26%, transparent); }
  50%{ box-shadow:0 0 0 6px color-mix(in srgb,var(--cream) 10%, transparent); } }
@media (prefers-reduced-motion:reduce){ .dna-tab.on .dna-tab-dot{ animation:none; } }

.pers-section-card{
  width:92vw !important; max-height:96vh !important;
  padding:10px 14px 14px !important;
}
.pers-section-card .sc-title{ font-size:clamp(18px,2.2vw,28px); }
.pers-section-card .sc-divider{ margin:5px auto 8px; }

/* Overview = left scouting rail + the formation field */
.pers-overview{ display:flex; gap:16px; align-items:flex-start; }
.pers-rail{
  flex:0 0 322px; max-width:322px; display:flex; flex-direction:column; gap:13px;
  max-height:calc(96vh - 80px); overflow-y:auto; padding-right:4px;
}
.pers-rail-eyebrow{
  font-family:var(--font-display); font-weight:800; font-size:11px;
  letter-spacing:.18em; text-transform:uppercase; color:var(--gold);
}
.pers-rail-title{
  font-family:var(--font-display); font-weight:900; font-size:30px; line-height:.95;
  text-transform:uppercase; color:var(--cream); margin:3px 0 7px;
}
.pers-rail-intro{ font-size:12.5px; line-height:1.5; color:rgba(240,231,203,.62); margin:0; }
.pers-rail-list{ display:flex; flex-direction:column; gap:11px; }

/* Top of the rail: how the SYSTEM uses its personnel (bullet manifesto). */
.pers-system{ margin-bottom:4px; }
.pers-sys-eyebrow{
  font-family:var(--font-display); font-weight:800; font-size:11px;
  letter-spacing:.18em; text-transform:uppercase; color:var(--gold);
}
.pers-sys-title{
  font-family:var(--font-display); font-weight:900; font-size:23px; line-height:.98;
  text-transform:uppercase; color:var(--cream); margin:3px 0 10px;
  text-shadow:0 2px 8px rgba(0,0,0,.55);
}
.pers-sys-points{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:8px; }
.pers-sys-points li{
  position:relative; padding-left:19px; font-size:12px; line-height:1.45;
  color:rgba(240,231,203,.82);
}
.pers-sys-points li::before{
  content:""; position:absolute; left:2px; top:5px; width:8px; height:8px;
  background:var(--gold); transform:rotate(45deg);          /* gold diamond marker */
  box-shadow:0 0 6px rgba(245,166,35,.55);
}
.pers-sys-points b{ color:var(--cream); font-weight:800; }
.pers-sys-rule{
  height:2px; margin:15px 0 14px; border:0;
  background:linear-gradient(90deg, var(--gold), rgba(245,166,35,0));
}

/* Scouting card per playmaker - a varsity patch (cream felt, scheme-color
   stitched border, gold pinstripe) that taps open to reveal the breakdown. */
.pers-pcard{
  position:relative;
  background-color:var(--cream);
  background-image:
    linear-gradient(180deg, rgba(255,255,255,.5), rgba(0,0,0,.05) 60%, rgba(0,0,0,.09)),
    var(--noise);
  background-blend-mode:soft-light, soft-light;
  border:2.5px solid var(--primary); border-radius:12px;
  box-shadow:
    inset 0 0 0 2px var(--secondary),                 /* gold pinstripe */
    inset 0 2px 2px rgba(255,255,255,.6),
    0 8px 20px rgba(0,0,0,.42);
  padding:11px 13px; color:var(--ink-soft);
  cursor:pointer; transition:transform .14s var(--ease), box-shadow .2s var(--ease);
}
.pers-pcard::before{                                   /* dashed cream stitch inside the border */
  content:""; position:absolute; inset:5px; pointer-events:none;
  border:1.4px dashed var(--stitch); border-radius:8px;
}
.pers-pcard:hover{
  transform:translateY(-2px);
  box-shadow:inset 0 0 0 2px var(--secondary), inset 0 2px 2px rgba(255,255,255,.6), 0 13px 28px rgba(0,0,0,.52);
}
.pers-pcard.active{
  box-shadow:inset 0 0 0 2.5px var(--gold), 0 0 0 1px var(--gold), 0 15px 32px rgba(0,0,0,.55);
}
.pp-head{ display:flex; align-items:center; gap:10px; position:relative; z-index:1; }
/* position emblem: blue disc, cream rim, gold inner ring - the SK badge look */
.pp-pos{
  flex:0 0 auto; width:38px; height:38px; border-radius:50%;
  background:radial-gradient(circle at 50% 30%, color-mix(in srgb,var(--primary) 80%,#fff) 0%, var(--primary) 55%);
  border:2.5px solid var(--cream); color:var(--cream);
  box-shadow:inset 0 0 0 2px var(--gold), 0 3px 7px rgba(0,0,0,.45);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display); font-weight:900; font-size:13px;
}
.pp-id{ flex:1; display:flex; flex-direction:column; line-height:1.16; min-width:0; }
.pp-id b{
  font-family:var(--font-display); font-weight:900; font-size:15.5px; color:var(--primary);
  text-transform:uppercase; letter-spacing:.3px; text-shadow:0 1px 0 rgba(255,255,255,.5);
}
.pp-id em{ font-style:normal; font-size:10px; color:var(--ink-soft); font-weight:600; }
.pp-tier{
  font-family:var(--font-display); font-weight:900; font-size:9px; letter-spacing:.1em;
  text-transform:uppercase; padding:3px 9px; border-radius:999px; white-space:nowrap;
}
.pp-tier.elite{ background:linear-gradient(180deg,#ffe08a,#F5A623); color:#3a2406; box-shadow:inset 0 0 0 1px rgba(255,255,255,.4); }
.pp-tier.premium{ background:transparent; color:var(--primary); border:1.5px solid var(--primary); }
.pp-chips{ display:flex; flex-wrap:wrap; gap:5px; margin-top:10px; position:relative; z-index:1; }
.pp-chip{
  font-family:var(--font-display); font-weight:800; font-size:8.5px; letter-spacing:.05em;
  text-transform:uppercase; color:var(--cream);
  background:var(--primary); border-radius:999px; padding:3px 9px;
  box-shadow:inset 0 0 0 1px var(--secondary);
}
/* Accordion body - grid-rows 0fr→1fr animates height with no magic numbers */
.pp-detail{ display:grid; grid-template-rows:0fr; transition:grid-template-rows .34s cubic-bezier(.4,0,.1,1); position:relative; z-index:1; }
.pp-detail-in{ overflow:hidden; min-height:0; }
.pers-pcard.active .pp-detail{ grid-template-rows:1fr; }
.pp-section-lbl{
  font-family:var(--font-display); font-weight:900; font-size:9.5px; letter-spacing:.12em;
  text-transform:uppercase; color:var(--primary); margin:12px 0 7px;
  padding-bottom:4px; border-bottom:1.5px solid color-mix(in srgb,var(--primary) 22%, transparent);
}
.pp-bar{ display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.pp-bar-lbl{
  flex:0 0 98px; font-family:var(--font-display); font-weight:800; font-size:9px;
  letter-spacing:.03em; text-transform:uppercase; color:var(--ink-soft); text-align:right;
}
.pp-bar-track{ flex:1; height:7px; border-radius:4px; background:rgba(0,0,0,.13); overflow:hidden; box-shadow:inset 0 1px 2px rgba(0,0,0,.2); }
.pp-bar-track i{
  display:block; height:100%; border-radius:4px; width:0;
  background:linear-gradient(90deg, var(--primary), var(--gold));
  transition:width .6s cubic-bezier(.22,1,.36,1) .12s;
}
.pers-pcard.active .pp-bar-track i{ width:var(--w); }
.pp-scheme{ display:flex; gap:8px; margin-bottom:7px; }
.pp-scheme span{
  flex:0 0 76px; font-family:var(--font-display); font-weight:900; font-size:9.5px;
  text-transform:uppercase; letter-spacing:.03em; color:var(--primary); padding-top:1px;
}
.pp-scheme p{ flex:1; margin:0; font-size:11px; line-height:1.4; color:var(--ink-soft); }
.pp-breakdown{
  margin-top:12px; width:100%; display:flex; align-items:center; justify-content:center; gap:7px;
  background:linear-gradient(180deg,#ffe08a,var(--gold)); color:#3a2406; border:none; border-radius:999px; padding:9px;
  font-family:var(--font-display); font-weight:900; font-size:11px; letter-spacing:.06em;
  text-transform:uppercase; cursor:pointer; transition:filter .15s, transform .12s;
  box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.45), 0 3px 8px rgba(0,0,0,.3);
}
.pp-breakdown:hover{ filter:brightness(1.06); transform:translateY(-1px); }
.pp-breakdown span{ font-size:15px; line-height:0; }

.pers-field-zone{
  position:relative; border-radius:8px; overflow:hidden;
  aspect-ratio:16/9; flex:1 1 auto; min-width:0; width:auto;
  max-height:calc(96vh - 80px); /* height-constrained on short screens */
  box-shadow:0 4px 22px rgba(0,0,0,.55);
}
.pers-field-img{
  position:absolute; inset:0; width:100%; height:100%;
  object-fit:cover; display:block;
  transform-origin:50% 50%;
  animation:kenBurnsGroup 22s ease-in-out infinite alternate;
}
.pers-field-img.zoomed{ animation-play-state:paused; }

/* Script labels on the personnel group image */
.pers-player-label{
  position:absolute; transform:translateX(-50%);
  background:rgba(245,238,218,.93); border:none; cursor:pointer;
  padding:6px 14px 9px; border-radius:7px;
  display:flex; flex-direction:column; align-items:center; gap:3px; z-index:6;
  box-shadow:0 3px 14px rgba(0,0,0,.45);
  transition:opacity .15s ease, transform .15s ease;
  text-align:center;
}
.pers-player-label:hover{ opacity:.82; transform:translateX(-50%) translateY(-3px); }
.ppl-pos{
  display:block; font-family:var(--font-display); font-weight:900;
  font-size:13px; letter-spacing:.18em; text-transform:uppercase;
  color:var(--primary); text-shadow:none;
}
.ppl-arch{
  display:block; font-family:'Cinzel', 'Georgia', serif; font-weight:700;
  font-size:22px; letter-spacing:.03em; color:var(--primary); line-height:1.1;
  text-shadow:none;
}

/* Featured-play web - strands branch from behind the blown-up card to the
   player's go-to play calls. Same strand + travelling-pulse language as the
   Drive Builder, scaled onto the personnel field. */
.pers-web{ position:absolute; inset:0; pointer-events:none; }
.pers-web-svg{ position:absolute; inset:0; width:100%; height:100%; overflow:visible; z-index:7; }
.pers-strand{
  fill:none; stroke:var(--gold); stroke-width:6; stroke-linecap:round; opacity:.85;
  filter:drop-shadow(0 0 4px rgba(245,166,35,.55));
  stroke-dasharray:100; stroke-dashoffset:100;
  transition:stroke-dashoffset .6s cubic-bezier(.4,0,.1,1);
}
.pers-strand.thin{ stroke-width:3; opacity:.4; filter:drop-shadow(0 0 3px rgba(245,166,35,.4)); }
.pers-web.active .pers-strand,
.pers-deep.in .pers-strand{ stroke-dashoffset:0; }
.pers-pulse{
  fill:none; stroke:#ffe8a8; stroke-width:6; stroke-linecap:round;
  stroke-dasharray:5 95; filter:drop-shadow(0 0 5px var(--gold));
  opacity:0; animation:hubPulse 2.6s linear infinite;
}
.pers-web.active .pers-pulse,
.pers-deep.in .pers-pulse{ opacity:1; transition:opacity .4s ease .55s; }

.pers-web-label{
  position:absolute; left:5.5%; top:7%; z-index:9; pointer-events:none;
  font-family:var(--font-display); font-weight:900; text-transform:uppercase;
  font-size:23px; letter-spacing:1px; color:var(--cream); line-height:1;
  text-shadow:0 2px 10px rgba(0,0,0,.92);
  opacity:0; transform:translateY(-8px);
  transition:opacity .42s ease .25s, transform .42s cubic-bezier(.22,1,.36,1) .25s;
}
.pers-web.active .pers-web-label,
.pers-deep.in .pers-web-label{ opacity:1; transform:none; }
.pers-web-label span{
  display:block; margin-top:6px; font-size:10px; font-weight:700;
  letter-spacing:.09em; color:rgba(240,231,203,.6);
}

/* Each play call = a node on the web (cream pill, SK pill aesthetic) */
.pers-web-node{
  position:absolute; transform:translate(-50%,-50%) scale(.55); transform-origin:center;
  display:flex; align-items:center; gap:0; min-width:204px; max-width:230px;
  background:var(--cream); border:2.5px solid var(--primary); border-radius:999px;
  overflow:hidden; cursor:pointer; pointer-events:auto; z-index:9; text-align:left;
  box-shadow:0 3px 14px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.6);
  opacity:0;
  transition:transform .46s cubic-bezier(.22,1,.36,1) var(--d,0s),
             opacity .46s ease var(--d,0s),
             box-shadow .14s var(--ease);
}
.pers-web.active .pers-web-node,
.pers-deep.in .pers-web-node{ opacity:1; transform:translate(-50%,-50%) scale(1); }
.pers-web-node:hover{ box-shadow:0 9px 24px rgba(0,0,0,.62), 0 0 0 2px rgba(245,166,35,.6); }
/* Larger nodes for the full-screen deep dive */
.pers-web-node.lg{ min-width:230px; max-width:262px; }
.pers-web-node.lg .pers-web-node-num{ flex-basis:46px; height:46px; font-size:17px; }
.pers-web-node.lg .pers-web-node-title{ font-size:15px; }
.pers-web-node-num{
  flex:0 0 40px; height:40px; border-radius:50%; margin:3px 0 3px 3px;
  background:radial-gradient(circle at 35% 30%, #27439a, var(--primary));
  border:2px solid var(--gold); color:var(--cream);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display); font-weight:900; font-size:15px;
}
.pers-web-node-text{ flex:1; padding:0 16px 0 11px; }
.pers-web-node-title{
  font-family:var(--font-display); font-weight:900; font-size:13.5px;
  text-transform:uppercase; letter-spacing:.4px; color:var(--ink);
  display:block; line-height:1.12;
}
.pers-web-node-sub{
  font-family:var(--font-display); font-weight:700; font-size:8.5px;
  text-transform:uppercase; letter-spacing:.1em; color:var(--primary);
  opacity:.7; display:block; margin-top:1px;
}

/* ============================================================
   DEEP DIVE - full-screen blacked-out takeover.
   Polaroid blows up centered; play calls web out on curved strands.
   ============================================================ */
.pers-deep{
  position:fixed; inset:0; z-index:120;
  display:none; opacity:0;
  transition:opacity .42s ease;
}
.pers-deep.open{ display:block; }
.pers-deep.in{ opacity:1; }
/* the real field, thrown out of focus - same camera language as the close field */
.pers-deep-bg{
  position:absolute; inset:0; cursor:zoom-out; overflow:hidden; background:#05070e;
}
.pers-deep-field{
  position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
  transform:scale(1.12);                           /* hide the blur bleed at the edges */
  filter:blur(20px) brightness(.42) saturate(1.05);
}
.pers-deep-bg::after{                               /* vignette so the card + web pop */
  content:""; position:absolute; inset:0; pointer-events:none;
  background:radial-gradient(120% 100% at 50% 44%, rgba(4,7,16,.28) 0%, rgba(3,5,12,.62) 62%, rgba(2,3,9,.84) 100%);
}
.pers-deep-stage{
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  padding:24px; pointer-events:none;
}
.pers-deep-frame{
  position:relative; pointer-events:none;
  width:min(100%, 1640px); aspect-ratio:16/9;
  max-height:calc(100vh - 40px);
  transition:transform .14s ease-out;   /* smooth parallax drift */
  will-change:transform;
}
/* Full-bleed player card - landscape art card fills the frame */
.pers-deep-card{
  position:absolute; left:50%; top:50%;
  transform:translate(-50%,-50%) scale(1.04);
  width:96%; max-width:96%;
  display:block; z-index:2; border-radius:6px;
  filter:blur(18px) drop-shadow(0 26px 60px rgba(0,0,0,.8));
  opacity:0;
  pointer-events:auto; cursor:default;   /* absorb clicks so card doesn't close the dive */
  transition:opacity .55s ease, filter .58s ease, transform .6s cubic-bezier(.22,1,.36,1);
}
.pers-deep.in .pers-deep-card{
  transform:translate(-50%,-50%) scale(1);
  filter:blur(0) drop-shadow(0 22px 56px rgba(0,0,0,.65));
  opacity:1;
  /* Ken Burns starts after entrance clears */
  animation:kenBurnsCard 20s ease-in-out .65s infinite alternate;
}
/* Featured plays - top-left corner of the deep dive frame */
.pers-feat-plays{
  position:absolute; left:3%; top:5%; z-index:4; pointer-events:auto;
  display:flex; flex-direction:column; gap:8px;
  background:rgba(245,238,218,.93); border-radius:9px; padding:10px 13px 12px;
  box-shadow:0 4px 18px rgba(0,0,0,.5);
  opacity:0; transform:translateY(-8px);
  transition:opacity .4s ease .45s, transform .42s cubic-bezier(.22,1,.36,1) .45s;
}
.pers-deep.in .pers-feat-plays{ opacity:1; transform:none; }
.pers-feat-ey{
  font-family:var(--font-display); font-weight:800; font-size:9px;
  letter-spacing:.2em; text-transform:uppercase; color:var(--primary);
  margin-bottom:2px; text-shadow:none;
}
.pers-feat-btn{
  display:flex; align-items:center; gap:0; min-width:186px;
  background:var(--cream); border:2px solid var(--primary); border-radius:999px;
  padding:0; cursor:pointer;
  box-shadow:0 6px 18px rgba(0,0,0,.6);
  transition:transform .14s ease, box-shadow .14s ease;
}
.pers-feat-btn:hover{ transform:translateY(-1px); box-shadow:0 9px 26px rgba(0,0,0,.75), 0 0 0 2px rgba(245,166,35,.55); }
.pers-feat-num{
  flex:0 0 36px; height:36px; border-radius:50%; margin:2px 0 2px 2px;
  background:radial-gradient(circle at 35% 30%, #27439a, var(--primary));
  border:2px solid var(--gold); color:var(--cream);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display); font-weight:900; font-size:14px;
}
.pers-feat-name{
  flex:1; padding:0 14px 0 10px;
  font-family:var(--font-display); font-weight:900; font-size:12.5px;
  text-transform:uppercase; letter-spacing:.3px; color:var(--ink); line-height:1.2;
}
/* back-to-roster control */
.pers-deep-x{
  position:absolute; left:22px; top:20px; z-index:4;
  display:inline-flex; align-items:center; gap:7px;
  font-family:var(--font-display); font-weight:800; font-size:12.5px;
  text-transform:uppercase; letter-spacing:.12em; color:var(--cream);
  background:rgba(14,24,48,.72); border:1px solid rgba(245,166,35,.34);
  border-radius:999px; padding:9px 16px 9px 13px; cursor:pointer;
  backdrop-filter:blur(6px);
  transition:background .15s var(--ease), border-color .15s var(--ease), transform .15s var(--ease);
}
.pers-deep-x:hover{ background:rgba(20,34,66,.92); border-color:var(--gold); transform:translateX(-2px); }
.pers-deep-x-ico{ font-size:18px; line-height:1; margin-top:-1px; }

/* Right panel - combined player card, materializes from mist */
.pers-panel{
  position:absolute; right:10px; top:10px;
  width:48%; line-height:0; z-index:8; pointer-events:none;
  opacity:0; filter:blur(20px); transform:scale(1.05);
  transition:opacity .5s ease, filter .52s ease, transform .5s cubic-bezier(.22,1,.36,1);
}
.pers-panel.active{ opacity:1; filter:blur(0); transform:scale(1); pointer-events:auto; }
.pers-panel img{ width:100%; display:block; border-radius:6px; }

/* ============================================================
   PLAY · WEB LAYOUT - Personnel-scale node-web play screen.
   Near full-screen dark card on the dimmed hub: a left INFO RAIL
   (description + play-profile bars + the four nodes at the bottom) and a
   big FIELD CUTOUT. Click a rail node → the field blurs and its pieces
   BRANCH OUT as individual nodes, strands tracing back to that node.
   ============================================================ */
/* frameless + transparent, exactly like .section-card - the dimmed hub IS the
   backdrop (no panel fill, no noise, no box) so the field reads big and clean. */
.card.pw-card{
  flex-direction:column; gap:0; max-width:none;
  width:93vw; height:91vh; max-height:91vh;
  background:none; border:0; border-radius:0; box-shadow:none;
  padding:4px 6px 8px; overflow:hidden;
}
.pw-card .card-close{ z-index:30; }
/* hero entrance - a layered UNFOLD from the node that was clicked:
   (1) the whole screen blooms out of the click point, blur clearing;
   (2) the field cutout wipes open via clip-path;
   (3) the rail slides in just behind. Confident ease-out-expo throughout. */
@keyframes pwEnter{
  0%   { opacity:0; transform:scale(.5); filter:blur(16px); }
  50%  { opacity:1; }
  100% { opacity:1; transform:scale(1); filter:blur(0); }
}
.pw-card.pw-enter{ animation:pwEnter .58s cubic-bezier(.16,1,.3,1) both; }
@keyframes pwFieldWipe{
  from{ opacity:.2; clip-path:inset(0 0 0 38%); }
  to  { opacity:1; clip-path:inset(0 0 0 0); }
}
.pw-card.pw-enter .pw-field-zone{ animation:pwFieldWipe .62s cubic-bezier(.16,1,.3,1) .08s both; }
@keyframes pwRailSlide{ from{ opacity:0; transform:translateX(-30px); } to{ opacity:1; transform:none; } }
.pw-card.pw-enter .pw-rail{ animation:pwRailSlide .56s cubic-bezier(.16,1,.3,1) .14s both; }

/* slim header bar */
.pw-header{ flex:0 0 auto; display:flex; align-items:flex-end; justify-content:space-between;
  gap:18px; padding:0 50px 12px 4px; }
.pw-header .pw-eyebrow{ display:inline-flex; align-items:center; gap:6px; color:var(--gold);
  font-size:11px; letter-spacing:.18em; }
.pw-header .pw-eyebrow .star, .pw-header .pw-eyebrow .star svg{ width:12px; height:12px; }
.pw-title{ font-family:var(--font-display); font-weight:900; text-transform:uppercase; line-height:.9;
  font-size:clamp(34px,4vw,60px); color:var(--cream); margin:6px 0 0; letter-spacing:.5px;
  text-shadow:0 3px 18px rgba(0,0,0,.7); }
.pw-header-meta{ display:flex; align-items:center; gap:13px; flex-wrap:wrap; padding-bottom:3px; }
.pw-form-inline{ font-family:var(--font-display); font-weight:700; text-transform:uppercase;
  letter-spacing:.12em; font-size:12px; color:rgba(240,231,203,.78); }
.pw-header-meta .excl{ color:var(--gold); }
.pw-nav{ display:flex; gap:8px; }
.pw-nav button{ width:38px; height:38px; border-radius:50%; cursor:pointer; color:var(--cream);
  font-size:20px; line-height:1; display:flex; align-items:center; justify-content:center;
  background:rgba(10,18,38,.7); border:1.5px solid rgba(245,166,35,.4);
  transition:background .14s var(--ease), border-color .14s, transform .14s; }
.pw-nav button:hover{ background:rgba(22,36,72,.92); border-color:var(--gold); transform:translateY(-1px); }

/* overview = rail + field cutout */
.pw-overview{ flex:1 1 auto; min-height:0; display:flex; gap:18px; align-items:stretch; }

/* LEFT INFO RAIL - three stations (Setup · Adjustments · Break It Down)
   distributed down the full height, so the empty space becomes even rhythm
   instead of one dead void. space-between adds room beyond the min gap. */
.pw-rail{ flex:0 0 376px; max-width:376px; display:flex; flex-direction:column;
  justify-content:space-between; gap:24px; min-height:0; overflow-y:auto; }
.pw-rail-ey{ font-family:var(--font-display); font-weight:800; font-size:12.5px; letter-spacing:.18em;
  text-transform:uppercase; color:var(--gold); margin-bottom:11px; }
.pw-rail-text{ margin:0; font-size:16.5px; line-height:1.7; color:rgba(240,231,203,.88); }

/* adjustments - floating panel in the top-right of the field zone */
.pw-adj-panel{ position:absolute; top:14px; right:14px; z-index:6; width:220px; max-width:36%;
  background:rgba(8,14,30,0.86); backdrop-filter:blur(10px);
  border:1.5px solid rgba(245,166,35,0.55); border-radius:10px; padding:13px 15px;
  transition:opacity .3s ease; }
.pw-field-zone.pw-zoomed .pw-adj-panel{ opacity:0; pointer-events:none; }
.pw-adj-toggle{ display:flex; align-items:center; justify-content:space-between; width:100%;
  background:none; border:none; padding:0; cursor:default; }
.pw-adj-toggle .pw-rail-ey{ margin-bottom:0; }
.pw-adj-caret{ display:none; }            /* desktop: panel is always open, no toggle */
.pw-adj-panel .pw-rail-adj{ margin-top:9px; }
.pw-rail-adj{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:9px; }
.pw-rail-adj li{ position:relative; padding-left:20px; font-size:13.5px; line-height:1.5;
  color:rgba(240,231,203,.9); }
.pw-rail-adj li::before{ content:""; position:absolute; left:2px; top:7px; width:8px; height:8px;
  background:var(--gold); transform:rotate(45deg); box-shadow:0 0 6px rgba(245,166,35,.5); }

/* bottom station: the nodes (primary action, most generous size) + the CTA */
.pw-rail-bottom{ display:flex; flex-direction:column; gap:16px; }
.pw-rail-nodes{ display:flex; flex-direction:column; gap:11px; }
.pw-watch{ display:flex; align-items:center; gap:13px; text-align:left; cursor:pointer;
  color:var(--ink-gold);
  background:linear-gradient(180deg,var(--gold-lt),var(--gold) 55%,var(--gold-dk));
  border:2px solid var(--gold-dk); border-radius:15px; padding:14px 20px;
  box-shadow:0 10px 26px rgba(0,0,0,.42); transition:transform .14s var(--ease), filter .14s var(--ease); }
.pw-watch:hover{ transform:translateY(-2px); filter:brightness(1.06); }
.pw-watch-ico{ flex:0 0 auto; display:inline-flex; } .pw-watch-ico svg{ width:20px; height:20px; }
.pw-watch-tx{ display:flex; flex-direction:column; gap:2px; min-width:0; }
.pw-watch-tx b{ font-family:var(--font-display); font-weight:900; text-transform:uppercase;
  letter-spacing:.05em; font-size:15px; line-height:1; }
.pw-watch-tx em{ font-style:normal; font-family:var(--font-display); font-weight:700; text-transform:uppercase;
  letter-spacing:.03em; font-size:10.5px; line-height:1.15; color:var(--ink-gold); opacity:.78; }

.pw-cat{ display:flex; gap:13px; align-items:center; text-align:left; cursor:pointer; width:100%;
  padding:13px 16px 14px; opacity:0; transform:translateX(-12px);
  background:var(--cream); border:2.5px solid var(--primary); border-radius:14px;
  box-shadow:0 7px 18px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.6);
  transition:transform .45s var(--ease) var(--d,0s), opacity .45s ease var(--d,0s),
             box-shadow .15s var(--ease), border-color .15s var(--ease); }
.pw-card.ready .pw-cat{ opacity:1; transform:translateX(0); }
.pw-cat:hover{ box-shadow:0 12px 26px rgba(0,0,0,.55), 0 0 0 3px rgba(245,166,35,.5); transform:translateX(3px); }
.pw-cat.king{ border-color:var(--gold); }
.pw-cat.active{ border-color:var(--gold); box-shadow:0 0 0 3px rgba(245,166,35,.55), 0 12px 26px rgba(0,0,0,.6); }
.pw-card:has(.pw-cat.active) .pw-cat:not(.active){ opacity:.45; }
.pw-cat-ico{ flex:0 0 44px; height:44px; border-radius:50%; align-self:flex-start; margin-top:1px;
  background:radial-gradient(circle at 35% 30%, #27439a, var(--primary)); border:2px solid var(--gold);
  color:var(--cream); display:flex; align-items:center; justify-content:center; }
.pw-cat-ico svg{ width:22px; height:22px; }
.pw-cat.king .pw-cat-ico{ background:radial-gradient(circle at 35% 30%, var(--gold-lt), var(--gold) 58%, var(--gold-dk));
  color:var(--ink-gold); }
.pw-cat-body{ flex:1; min-width:0; }
.pw-cat-title{ display:block; font-family:var(--font-display); font-weight:900; text-transform:uppercase;
  letter-spacing:.4px; font-size:17px; color:var(--ink); line-height:1.05; }
.pw-cat-sub{ display:block; font-family:var(--font-display); font-weight:700; text-transform:uppercase;
  letter-spacing:.06em; font-size:10.5px; color:var(--primary); opacity:.74; margin-top:4px; }
.pw-cat.king .pw-cat-sub{ color:var(--ink-gold); opacity:.9; }
.pw-cat-chev{ flex:0 0 auto; align-self:center; color:var(--primary); opacity:.5; font-size:22px;
  font-family:var(--font-display); font-weight:700; }
.pw-cat-list{ list-style:none; margin:4px 0 0; padding:0; counter-reset:rd;
  display:grid; grid-template-columns:1fr 1fr; gap:3px 12px; }
.pw-cat-list li{ counter-increment:rd; position:relative; padding-left:19px;
  font-family:var(--font-display); font-weight:700; text-transform:uppercase; letter-spacing:.02em;
  font-size:11.5px; color:var(--ink-soft); line-height:1.6; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.pw-cat-list li::before{ content:counter(rd); position:absolute; left:0; top:2px;
  width:13px; height:13px; border-radius:50%; background:var(--primary); color:var(--cream);
  font-size:8px; font-weight:900; display:flex; align-items:center; justify-content:center; }

/* FIELD CUTOUT */
.pw-field-zone{ position:relative; flex:1 1 auto; min-width:0; align-self:stretch;
  border-radius:12px; overflow:hidden; box-shadow:0 6px 26px rgba(0,0,0,.55), inset 0 0 0 1px rgba(245,166,35,.18); }
.pw-field-img{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
  transition:filter .5s var(--ease), transform .6s var(--ease); }
.pw-hint{ position:absolute; right:14px; bottom:12px; z-index:4;
  font-family:var(--font-display); font-weight:700; text-transform:uppercase; letter-spacing:.18em;
  font-size:10px; color:rgba(240,231,203,.85); pointer-events:none; text-shadow:0 1px 6px rgba(0,0,0,.9);
  animation:pwHintPulse 2.8s ease-in-out infinite; transition:opacity .3s ease; }
@keyframes pwHintPulse{ 0%,100%{opacity:.35;} 50%{opacity:.8;} }
.pw-field-zone.pw-zoomed .pw-hint{ opacity:0; }
.pw-field-zone.pw-zoomed .pw-field-img{ filter:blur(14px) brightness(.34) saturate(1.05); transform:scale(1.06); }

/* ---- the expansion WEB (inside the field zone) ---- */
.pw-web{ position:absolute; inset:0; z-index:9; opacity:0; pointer-events:none; transition:opacity .3s ease; }
.pw-web.in{ opacity:1; pointer-events:auto; }
.pw-web-veil{ position:absolute; inset:0; cursor:zoom-out;
  background:radial-gradient(120% 110% at 54% 46%, rgba(4,7,16,.28), rgba(2,4,10,.58)); }
.pw-web-svg{ position:absolute; inset:0; width:100%; height:100%; overflow:visible; pointer-events:none; z-index:1; }
.pw-wstrand{ fill:none; stroke:var(--gold); stroke-width:3.5; stroke-linecap:round; opacity:.6;
  filter:drop-shadow(0 0 4px rgba(245,166,35,.5));
  stroke-dasharray:100; stroke-dashoffset:100; transition:stroke-dashoffset .7s cubic-bezier(.4,0,.1,1); }
.pw-web.in .pw-wstrand{ stroke-dashoffset:0; }
.pw-wpulse{ fill:none; stroke:#ffe8a8; stroke-width:3.5; stroke-linecap:round; stroke-dasharray:5 95;
  filter:drop-shadow(0 0 5px var(--gold)); opacity:0; animation:hubPulse 2.6s linear infinite; }
.pw-web.in .pw-wpulse{ opacity:.85; transition:opacity .4s ease .55s; }

/* webbed item nodes */
.pw-wnode{ position:absolute; transform:translate(-50%,-50%) scale(.82); z-index:3;
  width:clamp(200px,22%,290px); background:var(--cream); color:var(--ink);
  border:2.5px solid var(--primary); border-radius:14px; padding:13px 15px; text-align:left;
  box-shadow:0 14px 34px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.55);
  opacity:0; transition:transform .46s var(--ease) var(--d,0s), opacity .46s ease var(--d,0s); }
.pw-web.in .pw-wnode{ opacity:1; transform:translate(-50%,-50%) scale(1); }
.pw-wnode.read, .pw-wnode.adj, .pw-wnode.cpoint{ display:flex; gap:12px; align-items:flex-start; }
.pw-wn-n{ flex:0 0 32px; height:32px; border-radius:50%; margin-top:1px;
  background:radial-gradient(circle at 35% 30%, #27439a, var(--primary)); border:2px solid var(--gold);
  color:var(--cream); font-family:var(--font-display); font-weight:900; font-size:15px;
  display:flex; align-items:center; justify-content:center; }
.pw-wn-ico{ flex:0 0 36px; height:36px; border-radius:50%; margin-top:1px;
  background:radial-gradient(circle at 35% 30%, var(--gold-lt), var(--gold) 58%, var(--gold-dk));
  border:2px solid var(--gold-dk); color:var(--ink-gold);
  display:flex; align-items:center; justify-content:center; }
.pw-wn-ico svg{ width:19px; height:19px; }
.pw-wn-tx{ flex:1; min-width:0; }
.pw-wn-tx b{ display:block; font-family:var(--font-display); font-weight:900; text-transform:uppercase;
  letter-spacing:.4px; font-size:16px; color:var(--ink); margin-bottom:3px; line-height:1.05; }
.pw-wn-tx p{ margin:0; font-size:13px; line-height:1.52; color:var(--ink-soft); }
.pw-wnode.cpoint{ border-color:var(--gold); }
.pw-wnode.cpoint .pw-wn-tx b{ color:var(--primary); }

/* trait nodes (Why It Works) - clickable, jump to the filtered call sheet */
.pw-wnode.tagnode{ width:clamp(170px,16%,210px); cursor:pointer; display:flex; flex-direction:column;
  align-items:center; gap:7px; text-align:center; border-color:var(--gold);
  transition:transform .46s var(--ease) var(--d,0s), opacity .46s ease var(--d,0s),
             box-shadow .15s var(--ease); }
.pw-web.in .pw-wnode.tagnode:hover{ transform:translate(-50%,-50%) scale(1.05);
  box-shadow:0 18px 40px rgba(0,0,0,.6), 0 0 0 3px rgba(245,166,35,.6); }
.pw-wn-tag-ico{ width:34px; height:34px; border-radius:50%;
  background:radial-gradient(circle at 35% 30%, var(--gold-lt), var(--gold) 58%, var(--gold-dk));
  border:2px solid var(--gold-dk); color:var(--ink-gold); display:flex; align-items:center; justify-content:center; }
.pw-wn-tag-ico svg{ width:17px; height:17px; }
.pw-wn-tag-l{ font-family:var(--font-display); font-weight:900; text-transform:uppercase; letter-spacing:.4px;
  font-size:14px; color:var(--ink); line-height:1.05; }
.pw-wn-tag-go{ font-family:var(--font-display); font-weight:700; text-transform:uppercase; letter-spacing:.08em;
  font-size:9px; color:var(--primary); opacity:.7; }

/* play nodes (Same Set) - each branches to another call from this formation */
.pw-wnode.playnode{ cursor:pointer; display:flex; flex-direction:column; gap:5px; align-items:flex-start;
  border-color:var(--primary);
  transition:transform .46s var(--ease) var(--d,0s), opacity .46s ease var(--d,0s), box-shadow .15s var(--ease); }
.pw-web.in .pw-wnode.playnode:hover{ transform:translate(-50%,-50%) scale(1.04);
  box-shadow:0 18px 40px rgba(0,0,0,.6), 0 0 0 3px rgba(245,166,35,.55); }
.pw-wn-play-type{ font-family:var(--font-display); font-weight:800; text-transform:uppercase; letter-spacing:.14em;
  font-size:9px; color:var(--primary); opacity:.7; }
.pw-wn-play-name{ font-family:var(--font-display); font-weight:900; text-transform:uppercase; letter-spacing:.4px;
  font-size:18px; color:var(--ink); line-height:1.02; }

/* single, centred node (video) */
.pw-wnode.single{ transform:translate(-50%,-50%) scale(.9); }
.pw-web.in .pw-wnode.single{ transform:translate(-50%,-50%) scale(1); }
.pw-wnode.video{ width:min(820px,80%); text-align:center; }
.pw-wn-ey{ font-family:var(--font-display); font-weight:900; text-transform:uppercase; letter-spacing:.22em;
  font-size:12px; color:var(--primary); margin:0 0 12px; }
.pwp-video .imgslot{ width:100%; aspect-ratio:16/9; border-radius:10px; overflow:hidden; }
.pwp-video .video-frame{ width:100%; height:100%; border:0; display:block; }

/* back chip */
.pw-web-back{ position:absolute; left:16px; top:16px; z-index:6; cursor:pointer;
  display:inline-flex; align-items:center; gap:6px; font-family:var(--font-display); font-weight:800;
  text-transform:uppercase; letter-spacing:.12em; font-size:12px; color:var(--cream);
  background:rgba(14,24,48,.78); border:1px solid rgba(245,166,35,.36); border-radius:999px;
  padding:8px 15px 8px 12px; backdrop-filter:blur(6px); transition:background .15s, border-color .15s, transform .15s; }
.pw-web-back:hover{ background:rgba(20,34,66,.95); border-color:var(--gold); transform:translateX(-2px); }
.pw-web-back span{ font-size:17px; line-height:0; }

/* reduced motion: everything is visible by default, the reveal just snaps in.
   Never gate content on a transition that won't fire (brand non-negotiable). */
@media (prefers-reduced-motion: reduce){
  .pw-card.pw-enter,
  .pw-card.pw-enter .pw-field-zone,
  .pw-card.pw-enter .pw-rail{ animation:none !important; }
  .pw-cat{ opacity:1 !important; transform:none !important; transition:none !important; }
  .pw-wnode{ opacity:1 !important; transform:translate(-50%,-50%) !important; transition:none !important; }
  .pw-wstrand{ stroke-dashoffset:0 !important; transition:none !important; }
  .pw-wpulse{ animation:none !important; opacity:0 !important; }
  .pw-field-img{ transition:filter .01s !important; }
  .pw-hint{ animation:none !important; }
}

/* ============================================================
   CATEGORY WEB - a play category (Run / Pass / Star) blows up into a
   centre hub and its plays branch out as patches on gold strands over
   the blurred home web. Same materials as the play screen.
   ============================================================ */
#takeover:has(.cat-web){ padding:0; }
body.cat-web-open #field, body.cat-web-open #cover{ filter:blur(13px) brightness(.5);
  transition:filter .45s ease; }
.card.cat-web{ width:100vw; height:100vh; max-width:none; max-height:none; display:block;
  background:none; border:0; border-radius:0; box-shadow:none; overflow:hidden; }
.cat-web .card-close{ z-index:20; }
.cat-web-svg{ position:absolute; inset:0; width:100%; height:100%; overflow:visible; pointer-events:none; z-index:1; }
.cat-web.in .pw-wstrand{ stroke-dashoffset:0; }
.cat-web .pw-wstrand{ transition-delay:.16s; }
.cat-web.in .pw-wpulse{ opacity:.8; transition:opacity .4s ease .5s; }

/* the blown-up hub (the clicked node, scaled up) */
.cat-web-hub{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%) scale(.2);
  opacity:0; z-index:3; display:flex; flex-direction:column; align-items:center; text-align:center;
  padding:20px 44px 16px; border-radius:24px; pointer-events:none;
  background:var(--cream); background-image:var(--noise); background-blend-mode:soft-light;
  border:3px solid var(--primary); box-shadow:0 22px 64px rgba(0,0,0,.62), inset 0 0 0 2px var(--gold); }
.cat-web.in .cat-web-hub{ transform:translate(-50%,-50%) scale(1); opacity:1;
  transition:transform .5s var(--ease), opacity .4s ease; }
.cat-web-hub-sub{ font-family:var(--font-display); font-weight:800; text-transform:uppercase;
  letter-spacing:.22em; font-size:13px; color:var(--primary); opacity:.8; }
.cat-web-hub-title{ font-family:var(--font-display); font-weight:900; text-transform:uppercase;
  letter-spacing:.5px; font-size:clamp(34px,4vw,56px); color:var(--ink); line-height:.92; margin-top:5px; }
.cat-web-hub-crown{ color:var(--gold); margin-top:9px; line-height:0; }
.cat-web-hub-crown svg{ width:30px; height:30px; filter:drop-shadow(0 2px 4px rgba(0,0,0,.3)); }

/* each play BRANCHES OUT from the hub to its spot, then settles */
.cat-web-node{ position:absolute; opacity:0; z-index:4; width:clamp(298px,23vw,368px);
  transform:translate(-50%,-50%) translate(calc(var(--sx,0) * 1vw), calc(var(--sy,0) * 1vh)) scale(.65);
  transition:opacity .45s ease var(--d,0s), transform .58s var(--ease) var(--d,0s); }
.cat-web.in .cat-web-node{ opacity:1; transform:translate(-50%,-50%) scale(1); }
/* the patch grows to fit a wrapped name instead of truncating it */
.cat-web-node .patch{ position:static; width:100%; margin:0; animation:none;
  height:auto; min-height:90px; border-radius:20px; align-items:center;
  padding-top:11px; padding-bottom:11px; }
.cat-web-node .pp-main{ gap:5px; }
.cat-web-node .pp-name{ font-size:21px; white-space:normal; line-height:1.04; }
.cat-web-node .pp-form{ font-size:11px; margin-top:0; }

@media (prefers-reduced-motion: reduce){
  .cat-web-hub{ opacity:1 !important; transform:translate(-50%,-50%) !important; transition:none !important; }
  .cat-web-node{ opacity:1 !important; transform:translate(-50%,-50%) !important; transition:none !important; }
  body.cat-web-open #field, body.cat-web-open #cover{ transition:none !important; }
}

/* ============================================================
   FULL SYSTEM - the "brain" zoom-out. Every hub branch blooms
   its real children at once, all wired back to the crest. A wow
   shot; everything stays clickable. Same web materials as the
   play + category screens, on a full-bleed dimmed/blurred field.
   ============================================================ */
#takeover:has(.fs-web){ padding:0; }
body.fs-open #field, body.fs-open #cover{ filter:blur(16px) brightness(.42);
  transition:filter .6s ease; }
.card.fs-web{ width:100vw; height:100vh; max-width:none; max-height:none; display:block;
  background:none; border:0; border-radius:0; box-shadow:none; overflow:hidden; }
.fs-web .card-close{ z-index:30; }
.fs-svg{ position:absolute; inset:0; width:100%; height:100%; overflow:visible;
  pointer-events:none; z-index:1; }
.fs-strand{ fill:none; stroke:var(--gold); stroke-width:2; vector-effect:non-scaling-stroke;
  opacity:.34; stroke-linecap:round; stroke-dasharray:100; stroke-dashoffset:100;
  transition:stroke-dashoffset .9s var(--ease) var(--sd,0s), opacity .5s ease var(--sd,0s); }
.fs-strand.main{ stroke-width:3; opacity:.5; }
.fs-web.in .fs-strand{ stroke-dashoffset:0; opacity:.34; }
.fs-web.in .fs-strand.main{ opacity:.55; }
.fs-pulse{ fill:none; stroke:#ffe8a8; stroke-width:3.5; vector-effect:non-scaling-stroke;
  stroke-linecap:round; stroke-dasharray:8 92; opacity:0;
  filter:drop-shadow(0 0 4px var(--gold)); }
.fs-web.in .fs-pulse{ opacity:.7; animation:hubPulse 2.8s linear infinite; }

/* the crest at the centre - the "brain". Swap fs-core-img per scheme. */
.fs-core{ position:absolute; left:50%; top:48%; transform:translate(-50%,-50%) scale(.3);
  opacity:0; z-index:5; display:flex; flex-direction:column; align-items:center; text-align:center;
  pointer-events:none; }
.fs-web.in .fs-core{ transform:translate(-50%,-50%) scale(1); opacity:1;
  transition:transform .6s var(--ease), opacity .45s ease; }
.fs-core-img{ width:clamp(120px,12vw,184px); height:auto;
  filter:drop-shadow(0 14px 40px rgba(0,0,0,.6)); }
.fs-core-sub{ font-family:var(--font-display); font-weight:800; text-transform:uppercase;
  letter-spacing:.26em; font-size:12px; color:var(--gold); margin-top:14px; }
.fs-core-title{ font-family:var(--font-display); font-weight:900; text-transform:uppercase;
  letter-spacing:.5px; font-size:clamp(22px,2.4vw,34px); color:var(--cream); line-height:.95;
  margin-top:5px; text-shadow:0 3px 16px rgba(0,0,0,.7); }

/* a primary BRANCH medallion - opens its section/category */
.fs-branch{ position:absolute; z-index:4; cursor:pointer; opacity:0;
  transform:translate(-50%,-50%)
    translate(calc(var(--sx,0)*1vw), calc(var(--sy,0)*1vh)) scale(.55);
  transition:opacity .5s ease var(--d,0s), transform .6s var(--ease) var(--d,0s);
  display:flex; flex-direction:column; align-items:center; text-align:center; gap:4px;
  padding:9px 15px 10px; border-radius:14px; min-width:102px;
  background:var(--cream); background-image:var(--noise); background-blend-mode:soft-light;
  border:2.5px solid var(--gold); box-shadow:0 12px 30px rgba(0,0,0,.5), inset 0 0 0 1px rgba(20,40,90,.25); }
.fs-web.in .fs-branch{ opacity:1; transform:translate(-50%,-50%) scale(1); }
.fs-branch:hover{ box-shadow:0 16px 38px rgba(0,0,0,.6), 0 0 0 3px rgba(245,166,35,.5);
  transform:translate(-50%,-50%) scale(1.05); }
.fs-branch-t{ font-family:var(--font-display); font-weight:900; text-transform:uppercase;
  letter-spacing:.4px; font-size:18px; color:var(--ink); line-height:1; }
.fs-branch-s{ font-family:var(--font-display); font-weight:700; text-transform:uppercase;
  letter-spacing:.08em; font-size:10px; color:var(--primary); opacity:.72; }

/* a child LEAF - opens its play/section. Light chip so 30+ stay readable. */
.fs-leaf{ position:absolute; z-index:3; cursor:pointer; opacity:0; white-space:nowrap;
  transform:translate(-50%,-50%)
    translate(calc(var(--sx,0)*1vw), calc(var(--sy,0)*1vh)) scale(.6);
  transition:opacity .45s ease var(--d,0s), transform .55s var(--ease) var(--d,0s);
  font-family:var(--font-display); font-weight:800; text-transform:uppercase;
  letter-spacing:.02em; font-size:11px; color:var(--cream); line-height:1;
  padding:6px 11px; border-radius:10px;
  background:rgba(13,26,58,.82); border:1.5px solid rgba(245,166,35,.55);
  box-shadow:0 6px 16px rgba(0,0,0,.45); backdrop-filter:blur(2px); }
.fs-web.in .fs-leaf{ opacity:1; transform:translate(-50%,-50%) scale(1); }
.fs-leaf:hover{ background:var(--gold); color:var(--ink-gold); border-color:var(--gold);
  transform:translate(-50%,-50%) scale(1.07); box-shadow:0 10px 24px rgba(245,166,35,.45); }
.fs-web:has(.fs-branch:hover) .fs-leaf:not(.lit){ opacity:.4; }
.fs-leaf.lit{ border-color:var(--gold); box-shadow:0 8px 22px rgba(245,166,35,.4); }

@media (max-width:760px){
  .fs-branch{ min-width:0; padding:7px 11px 8px; }
  .fs-branch-t{ font-size:13px; } .fs-branch-s{ display:none; }
  .fs-leaf{ font-size:9.5px; padding:5px 8px; }
  .fs-core-img{ width:84px; }
}
@media (prefers-reduced-motion: reduce){
  .fs-core,.fs-branch,.fs-leaf{ opacity:1 !important;
    transform:translate(-50%,-50%) !important; transition:none !important; }
  .fs-strand{ stroke-dashoffset:0 !important; transition:none !important; }
  .fs-web.in .fs-pulse{ animation:none; opacity:0; }
  body.fs-open #field, body.fs-open #cover{ transition:none !important; }
}

/* Formations - patch rows: dark field diagram + name + description + play tags */
.form-list{display:flex; flex-direction:column; gap:16px;}
.form-row{display:flex; gap:18px; align-items:center; padding:14px 18px;}

.ftag{font-family:var(--font-display); font-weight:700; text-transform:uppercase; letter-spacing:.5px;

/* ---- SERIES WRITE-UP ("Full Offense" pill) ---- */
.series-intro{line-height:1.65; font-size:15px; color:var(--cream); margin:0 auto 24px;
  max-width:72ch; text-align:center; text-shadow:0 1px 6px rgba(0,0,0,.6);}
/* three vertical "trading card" patches */
.team-list{display:grid; grid-template-columns:repeat(3,1fr); gap:18px;}
.team-row{display:flex; flex-direction:column; align-items:center; text-align:center; padding:24px 18px 20px;}
.team-row .t-shield{width:90px; height:90px; border-radius:50%; margin-bottom:13px;

  display:flex; align-items:center; justify-content:center;}
.team-row .t-shield img{width:100%; height:100%; object-fit:contain; transform:scale(1.9);}

.team-row .t-era{font-family:var(--font-display); font-weight:700; text-transform:uppercase;

.team-row .t-name{font-family:var(--font-display); font-weight:900; text-transform:uppercase;

.team-row .yt-link, .team-row .sk-badge{width:100%; justify-content:center;}

/* ============================================================
   PRO-STYLE SERIES - full-bleed hero carousel (replaces the 3 cards)
   ============================================================ */
/* Floating card (NOT full-bleed) so the fireworks field still shows around it */
.series-section-card{
  width:min(1760px, 95vw) !important; height:min(1040px, 92vh) !important;
  max-height:92vh !important; min-height:0 !important; padding:0 !important;
  overflow:hidden !important; border-radius:18px !important;
  box-shadow:0 34px 100px rgba(0,0,0,.62), 0 0 0 1px rgba(245,166,35,.16) inset;
}
.series-section-card .sc-eyebrow,
.series-section-card .sc-title,
.series-section-card .sc-divider{ display:none !important; }
.series-section-card .card-close{ z-index:9; }

.series-hero{ position:absolute; inset:0; overflow:hidden; }
.series-eyebrow-tag{
  position:absolute; top:clamp(20px,3.4vh,34px); left:0; right:0; z-index:6; text-align:center;
  font-family:var(--font-display); font-weight:800; font-size:12px; letter-spacing:.3em;
  text-transform:uppercase; color:var(--gold); text-shadow:0 2px 10px rgba(0,0,0,.8);
  pointer-events:none;
}

/* Each team slide */
.series-slide{
  position:absolute; inset:0; opacity:0; pointer-events:none;
  --accent:var(--gold); --accent2:var(--cream);
  transition:opacity .5s ease;
}
.series-slide.on{ opacity:1; pointer-events:auto; }
/* transform-only sweep - opacity is owned by the .on transition, so a finished
   animation's fill can never pin an off-slide visible (the old desync bug) */
.series-slide.enter-next{ animation:seriesInNext .68s cubic-bezier(.22,1,.36,1) both; }
.series-slide.enter-prev{ animation:seriesInPrev .68s cubic-bezier(.22,1,.36,1) both; }
@keyframes seriesInNext{ from{transform:translateX(70px) scale(1.015);} to{transform:none;} }
@keyframes seriesInPrev{ from{transform:translateX(-70px) scale(1.015);} to{transform:none;} }

.series-bg{
  position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:0;
  animation:kenBurnsGroup 26s ease-in-out infinite alternate;
}
/* Perf: only the active slide's Ken Burns runs */
.series-slide:not(.on) .series-bg{ animation-play-state:paused; }
.series-veil{
  position:absolute; inset:0; z-index:1; pointer-events:none;
  background:
    linear-gradient(100deg, rgba(4,7,16,.94) 0%, rgba(4,7,16,.78) 34%, rgba(4,7,16,.4) 66%, rgba(4,7,16,.66) 100%),
    radial-gradient(130% 110% at 28% 42%, transparent 36%, rgba(2,3,9,.72) 100%);
}
.series-content{
  position:absolute; inset:0; z-index:2;
  display:flex; flex-direction:column; justify-content:space-between;
  padding:clamp(34px,5vh,52px) clamp(32px,4vw,60px) clamp(56px,7vh,72px);
}

/* identity block */
.series-top{ max-width:62%; }
.sr-era{ font-family:var(--font-display); font-weight:800; font-size:13px; letter-spacing:.22em;
  text-transform:uppercase; color:var(--accent2); text-shadow:0 2px 8px rgba(0,0,0,.8); margin-bottom:10px; }
.sr-name{ font-family:'Cinzel','Georgia',serif; font-weight:700; line-height:.98;
  font-size:clamp(34px,4.6vw,76px); color:var(--cream); margin:0 0 12px;
  text-shadow:0 4px 22px rgba(0,0,0,.7); }
.sr-rings{ display:flex; align-items:center; gap:7px; margin-bottom:14px; }
.sr-ring{ width:22px; height:22px; color:var(--accent2); filter:drop-shadow(0 2px 6px rgba(0,0,0,.7)); }
.sr-ring svg{ width:100%; height:100%; }
.sr-rings-l{ font-family:var(--font-display); font-weight:800; font-size:11px; letter-spacing:.16em;
  text-transform:uppercase; color:rgba(240,231,203,.78); margin-left:6px; }
.sr-thesis{ font-size:clamp(15px,1.5vw,19px); line-height:1.55; color:rgba(240,231,203,.92);
  max-width:46ch; margin:0; text-shadow:0 2px 10px rgba(0,0,0,.7); }

/* middle: stat ribbon + signature graph share a row */
.series-mid{ display:flex; align-items:flex-end; justify-content:space-between; gap:clamp(24px,4vw,64px); flex-wrap:wrap; }
.sr-stats{ display:flex; gap:clamp(20px,2.6vw,42px); flex-wrap:wrap; }
.sr-stat{ position:relative; padding-left:15px; }
.sr-stat::before{ content:""; position:absolute; left:0; top:4px; bottom:4px; width:3px;
  background:var(--accent2); border-radius:2px; box-shadow:0 0 10px color-mix(in srgb,var(--accent2) 60%,transparent); }
.sr-stat-n{ font-family:var(--font-display); font-weight:900; font-size:clamp(32px,3.6vw,54px);
  line-height:1; color:var(--cream); text-shadow:0 3px 14px rgba(0,0,0,.7); }
.sr-stat-l{ font-family:var(--font-display); font-weight:700; font-size:11px; letter-spacing:.12em;
  text-transform:uppercase; color:rgba(240,231,203,.82); margin-top:6px; }
.sr-stat-s{ font-size:10.5px; letter-spacing:.04em; color:rgba(240,231,203,.72); margin-top:3px;
  text-shadow:0 1px 5px rgba(0,0,0,.75); }

/* signature graph - glass panel echoing the DNA scouting board */
.sr-sig{ flex:0 0 clamp(360px,33vw,500px); max-width:46%;
  background:rgba(8,14,30,.62); -webkit-backdrop-filter:blur(7px); backdrop-filter:blur(7px);
  border:1.5px solid color-mix(in srgb,var(--accent2) 50%,transparent); border-radius:12px;
  padding:16px 20px 18px; box-shadow:0 14px 40px rgba(0,0,0,.5); }
.sr-sig-h{ font-family:var(--font-display); font-weight:900; font-size:17px; letter-spacing:.04em;
  text-transform:uppercase; color:var(--cream); }
.sr-sig-sub{ font-size:11px; letter-spacing:.08em; text-transform:uppercase;
  color:var(--accent2); margin:2px 0 14px; }
/* dual / contrast bars */
.sr-bars{ display:flex; flex-direction:column; gap:4px; }
.sr-bar-row{ display:grid; grid-template-columns:1fr auto; align-items:center; gap:10px 12px;
  grid-template-areas:"name val" "track track"; }
.sr-bar-name{ grid-area:name; font-family:var(--font-display); font-weight:700; font-size:12.5px;
  letter-spacing:.06em; text-transform:uppercase; color:rgba(240,231,203,.9); }

  color:var(--cream); white-space:nowrap; }

  text-transform:uppercase; color:rgba(240,231,203,.68); margin-left:5px; }
.sr-bar-track{ grid-area:track; height:9px; border-radius:6px; overflow:hidden;
  background:rgba(255,255,255,.09); margin:2px 0 2px; }
.sr-bar-track i{ display:block; height:100%; width:0; border-radius:6px;
  background:linear-gradient(90deg, color-mix(in srgb,var(--accent) 70%,#000), var(--accent2));
  transition:width .9s cubic-bezier(.22,1,.36,1) .2s; }
.series-slide.on .sr-bar-track i{ width:var(--w); }
.sr-bar-row.dim .sr-bar-track i{ background:rgba(255,255,255,.34); }
.sr-bar-row.dim .sr-bar-val{ color:rgba(240,231,203,.7); }
.sr-bar-sub{ font-size:10.5px; color:rgba(240,231,203,.68); margin:-2px 0 8px; }
/* ratio donut (FSU) */
.sr-ratio{ display:flex; align-items:center; gap:20px; }
.sr-donut{ width:118px; height:118px; flex:0 0 auto; transform:rotate(0deg); }
.sr-donut-bg{ fill:none; stroke:rgba(255,255,255,.12); stroke-width:11; }
.sr-donut-fg{ fill:none; stroke:var(--accent2); stroke-width:11; stroke-linecap:round;
  stroke-dasharray:0 999; transition:stroke-dasharray 1.1s cubic-bezier(.22,1,.36,1) .25s; }
.series-slide.on .sr-donut-fg{ stroke-dasharray:var(--dash); }
.sr-donut-n{ fill:var(--cream); font-family:var(--font-display); font-weight:900; font-size:30px;

.sr-donut-l{ fill:rgba(240,231,203,.6); font-family:var(--font-display); font-weight:700;

.sr-ratio-side{ display:flex; flex-direction:column; gap:7px; }
.sr-ratio-row{ font-size:13px; color:rgba(240,231,203,.82); }
.sr-ratio-row b{ font-family:var(--font-display); font-weight:900; font-size:18px; color:var(--cream); margin-right:5px; }
.sr-ratio-row.big b{ color:var(--accent2); font-size:22px; }

/* bottom: names + CTA */
.series-bottom{ display:flex; align-items:flex-end; justify-content:space-between; gap:24px; flex-wrap:wrap; }
.sr-players-l{ font-family:var(--font-display); font-weight:800; font-size:10px; letter-spacing:.2em;
  text-transform:uppercase; color:rgba(240,231,203,.7); margin-bottom:9px; text-shadow:0 1px 5px rgba(0,0,0,.7); }
.sr-players-row{ display:flex; gap:9px; flex-wrap:wrap; }
.sr-player{ display:flex; align-items:center; gap:8px; padding:7px 13px 7px 9px; border-radius:999px;

.sr-player:hover{ transform:translateY(-2px); box-shadow:0 8px 22px rgba(0,0,0,.55), 0 0 0 2px color-mix(in srgb,var(--accent2) 70%,transparent); }
.sr-player-pos{ font-family:var(--font-display); font-weight:900; font-size:9.5px; letter-spacing:.06em;

.sr-player-name{ font-family:var(--font-display); font-weight:800; font-size:13px; color:var(--accent);

.sr-cta-wrap{ display:flex; flex-direction:column; gap:8px; align-items:flex-end; }

/* the two stacked badges (YouTube + Scheme Kings playbook) */

.sr-badge-btn svg{ width:15px; height:15px; flex:0 0 auto; }
.sr-badge-btn.yt{ color:#fff; background:linear-gradient(180deg,#f0353f,#cc1620);
  border:1.5px solid #ff5a62; box-shadow:0 6px 18px rgba(180,20,28,.4); }
.sr-badge-btn.yt:hover{ transform:translateY(-2px); filter:brightness(1.08); }
.sr-badge-btn.yt.soon{ opacity:.62; cursor:default; }
.sr-badge-btn.yt.soon:hover{ transform:none; filter:none; }
.sr-badge-btn.sk{ color:var(--ink-gold);
  background:linear-gradient(180deg, var(--gold-lt), var(--gold) 52%, var(--gold-dk));

/* team logo watermark */
.series-logo{ position:absolute; right:clamp(26px,4vw,70px); top:50%; transform:translateY(-50%);

.series-logo img{ width:100%; height:100%; object-fit:contain; }

/* nav: arrows + dots */
.series-arrow{ position:absolute; top:50%; transform:translateY(-50%); z-index:7;
  width:52px; height:52px; border-radius:50%; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:26px; line-height:1; color:var(--cream);
  background:rgba(8,14,30,.6); border:1.5px solid rgba(245,166,35,.4);
  -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);
  transition:background .15s ease, border-color .15s ease, transform .15s ease; }
.series-arrow:hover{ background:rgba(20,34,66,.9); border-color:var(--gold); }
.series-arrow.prev{ left:clamp(14px,2vw,28px); }
.series-arrow.next{ right:clamp(14px,2vw,28px); }
.series-arrow.prev:hover{ transform:translateY(-50%) translateX(-3px); }
.series-arrow.next:hover{ transform:translateY(-50%) translateX(3px); }
.series-dots{ position:absolute; bottom:clamp(22px,3.4vh,34px); left:0; right:0; z-index:7;
  display:flex; justify-content:center; gap:10px; }
.series-dot{ cursor:pointer; padding:7px 16px; border-radius:999px;

  text-transform:uppercase; color:rgba(240,231,203,.7);

@media (prefers-reduced-motion:reduce){

}

}
/* Phone: the centered series tag collides with the per-team era label; the

@media (max-width:560px){

  background:rgba(245,166,35,.08); }
.db-gate-ico svg{ width:34px; height:34px; }
.db-gate-eyebrow{ font-family:var(--font-display); font-weight:800; font-size:10px; letter-spacing:.22em;

.db-gate-title{ font-family:var(--font-display); font-weight:900; font-size:34px; text-transform:uppercase;
  color:var(--cream); letter-spacing:.01em; line-height:1; margin:2px 0 10px; }
.db-gate-msg{ font-size:15px; line-height:1.6; color:rgba(240,231,203,.82); margin:0 0 22px; }
.db-gate-back{ font-family:var(--font-display); font-weight:900; text-transform:uppercase; letter-spacing:.1em;
  font-size:14px; color:var(--cream); background:var(--primary); border:2px solid var(--cream);

.db-gate-back:hover{ filter:brightness(1.08); transform:translateY(-1px); }

/* Phone: the play page is a 376px rail + field row on desktop - stack it into
   one scrollable column (image first, then the breakdown rail). */
@media (max-width:560px){
  .pw-overview{ flex-direction:column; align-items:stretch; overflow-y:auto; gap:14px; }
  .pw-field-zone{ flex:0 0 auto; width:100%; aspect-ratio:16/9; order:1; }
  .pw-rail{ flex:0 0 auto; width:100%; max-width:100%; overflow:visible; order:2; }
  .pw-header{ flex-wrap:wrap; gap:8px; }
  .pw-header-meta{ flex-wrap:wrap; row-gap:6px; }
  /* Adjustments collapses to a tap-to-expand chip over the image */
  .pw-adj-panel{ width:auto; max-width:calc(100% - 28px); padding:8px 13px; }
  .pw-adj-toggle{ cursor:pointer; gap:12px; }
  .pw-adj-caret{ display:inline; font-size:17px; line-height:1; color:var(--gold);
    transition:transform .22s ease; }
  .pw-adj-panel.open .pw-adj-caret{ transform:rotate(90deg); }
  .pw-adj-panel .pw-rail-adj{ display:none; margin-top:10px; }
  .pw-adj-panel.open .pw-rail-adj{ display:flex; }
  .pw-rail-adj li{ font-size:12.5px; }

  /* Reads / Coaching Keys / Tags / Same Set: the spatial node-web doesn't fit a
     phone. When one opens, hide the rail + play image and turn the field zone
     into a scrollable sheet holding the nodes as a stacked list (no overlay /
     fixed positioning, so no stacking-context fights). */
  .pw-overview:has(.pw-web.in){ overflow:hidden; }
  .pw-overview:has(.pw-web.in) .pw-rail{ display:none; }
  .pw-field-zone:has(.pw-web.in){ aspect-ratio:auto; flex:1 1 auto; height:auto;
    min-height:0; overflow-y:auto; border-radius:0; }
  .pw-field-zone:has(.pw-web.in) > :not(.pw-web){ display:none; }
  .pw-web.in{
    position:relative; inset:auto; min-height:100%; opacity:1; pointer-events:auto;
    background:rgba(5,8,16,.97);
    display:flex; flex-direction:column; gap:13px; padding:56px 15px 26px;
  }
  .pw-web-svg, .pw-web .pw-web-svg{ display:none; }   /* strands are meaningless in a list */
  .pw-web.in .pw-wnode{
    position:static !important; transform:none !important; opacity:1 !important;
    left:auto !important; top:auto !important; width:100% !important; max-width:none !important;
    margin:0; scale:1 !important; }
  .pw-web.in .pw-wnode.video{ width:100% !important; }
  .pw-web-back{ position:absolute; left:13px; top:13px; z-index:6; }

  /* Category play picker (Run / Pass / Star): the spatial node-web becomes a
     simple stacked, scrollable list of full-width play pills. */
  .card.cat-web{ display:flex; flex-direction:column; gap:11px;
    padding:58px 15px 28px; overflow-y:auto; }
  .cat-web-svg{ display:none; }
  .cat-web-hub{ position:relative; left:auto; top:auto; width:100%; margin:0 0 4px;
    transform:none !important; opacity:1 !important; }
  .cat-web-node{ position:static !important; transform:none !important; opacity:1 !important;
    left:auto !important; top:auto !important; width:100% !important; margin:0; }
  .cat-web-node .pp-name{ font-size:18px; }
  .cat-web-node .play-pill{ --patch-h:72px; }
}
/* Short viewports (laptops): compact the vertical rhythm so nothing clips */
@media (max-height:820px){
  .series-content{ padding:26px clamp(28px,4vw,52px) 46px; }
  .sr-name{ font-size:clamp(28px,3.6vw,44px); margin-bottom:7px; }
  .sr-era{ margin-bottom:6px; }
  .sr-rings{ margin-bottom:9px; }
  .sr-thesis{ font-size:14px; line-height:1.4; }
  .series-mid{ gap:20px; }
  .sr-stat-n{ font-size:clamp(24px,2.6vw,34px); }
  .sr-sig{ padding:12px 16px 14px; }
  .sr-sig-h{ font-size:15px; }
  .sr-bar-val{ font-size:18px; }
  .sr-players-l{ margin-bottom:6px; }

/* gold "Watch Full YouTube Breakdown" button - shared by About + each team */

/* ---- LIST CARD - category list + full call sheet, opened as overlays ---- */

/* plays flow across the screen in two columns (group labels span the row) */
.list-card .overlay-list{display:grid; grid-template-columns:repeat(2,1fr);

/* ==========================================================================
   [STYLE:MOBILE] - separate vertical-phone layout, <768px. Not a shrink.
   ========================================================================== */
.mobile-only{display:none;}
@media (max-width:768px){
  body{overflow:auto;}
  #bg-video{filter:blur(2px) brightness(0.32);}   /* lighter blur for perf */

  .desktop-only{display:none !important;}
  .mobile-only{display:block;}

  /* cover scales fine; just tighten */
  .cover-logo{width:96px; height:96px;}

  .mobile-nav .patch .patch-title{font-size:23px;}

    filter:grayscale(.78) brightness(.82); opacity:.9;}

  /* --- takeover: single column, scrollable --- */
  #takeover{padding:0; align-items:stretch;}

  .card-left, .card-right{overflow:visible; flex:0 0 auto;}

  .thumb-row{flex-direction:row;}
  .card-right{padding:20px 18px 40px;}
  .card-name{font-size:34px;}
  .card-close{position:fixed; top:10px; right:10px;}  /* always reachable */

  .section-card{width:100%; height:100%; max-height:100%; padding:22px 18px 40px;}
  .card-grid{grid-template-columns:repeat(2,1fr); gap:12px;}
  .mini-card .mc-pos{font-size:38px;}
  .team-list{grid-template-columns:1fr;}
  .list-card .overlay-list{grid-template-columns:1fr;}
  .play-pill .pp-name{font-size:22px;}
  .form-row{flex-direction:column; align-items:stretch;}

  .pers-deep-x{ left:12px; top:12px; padding:7px 13px 7px 10px; font-size:11px; z-index:6; }
