// Thread the game-plan connector line exactly through the three stat nodes,
// measured from the live layout so it stays aligned at any monitor width.
function wireGamePlan(root){
  const flow = root.querySelector(".gp-flow"), line = root.querySelector(".gp-conn-line");
  if(!flow || !line) return;
  const setPts = () => {
    const fr = flow.getBoundingClientRect();
    if(!fr.width || !fr.height) return;
    const pts = [...flow.querySelectorAll(".gp-stat")].map(s => {
      const r = s.getBoundingClientRect();
      return ((r.left + r.width/2 - fr.left) / fr.width * 100).toFixed(1) + "," +
             ((r.top + r.height/2 - fr.top) / fr.height * 100).toFixed(1);
    }).join(" ");
    if(pts) line.setAttribute("points", pts);
  };
  // measure once layout exists, then again after the entrance settles
  requestAnimationFrame(() => requestAnimationFrame(setPts));
  setTimeout(setPts, 120);
  setTimeout(setPts, 1200);
  window.addEventListener("resize", setPts);
}

// Master-detail formations: clicking a thumbnail swaps the featured formation.
function wireDnaFormations(root){
  const rail = root.querySelector(".fm-rail"), feat = root.querySelector("#fm-feature");
  if(!rail || !feat) return;
  const growBar = () => feat.querySelectorAll(".dna-f-run").forEach(e => {
    const w = e.dataset.w + "%"; e.style.width = "0";
    requestAnimationFrame(() => requestAnimationFrame(() => e.style.width = w));
  });
  growBar();
  rail.querySelectorAll(".fm-thumb").forEach(btn => {
    btn.addEventListener("click", () => {
      const fi = +btn.dataset.fi;
      rail.querySelectorAll(".fm-thumb").forEach(b => b.classList.toggle("active", b === btn));
      feat.innerHTML = dnaFormationFeature(FORMATIONS[fi]);
      feat.classList.remove("fm-feat-anim"); void feat.getBoundingClientRect(); feat.classList.add("fm-feat-anim");
      feat.querySelectorAll(".dna-fchip[data-play]").forEach(b => b.addEventListener("click", () => openPlay(b.dataset.play)));
      growBar();
      loadCardImages();
    });
  });
}

// The fractal play-tree: clicking an attack branch fans it into its plays (each
// a door to the breakdown card). Pre-expands the biggest branch on load.
function wireDnaTree(root){
  const l1 = root.querySelector("#dz-l1"), l2 = root.querySelector("#dz-l2");
  if(!l1 || !l2) return;
  const d = computeDNA();
  const branches = [...l1.querySelectorAll(".dz-branch")];
  let activeTag = d.arsenal[0] ? d.arsenal[0].tag : null, introTimer = null;
  // Switching branches once the tree is up only animates the new plays (level 2).
  const expand = (tag) => {
    const cat = l1.querySelector(`.dz-cat[data-tag="${tag}"]`);
    const branch = d.arsenal.find(a => a.tag === tag);
    if(!cat || !branch) return;
    activeTag = tag;
    l1.querySelectorAll(".dz-cat").forEach(c => c.classList.toggle("active", c === cat));
    l2.innerHTML = dnaBranchLeaves(branch, +cat.dataset.y);
    l2.querySelectorAll(".dz-leaf[data-play]").forEach(g => {
      g.addEventListener("click", () => openPlay(g.dataset.play));
      g.addEventListener("keydown", e => { if(e.key === "Enter" || e.key === " "){ e.preventDefault(); openPlay(g.dataset.play); } });
    });
  };
  // The full intro / replay: level-1 branches draw first, THEN the active branch
  // fans into its plays (level 2). Clicking the snap node replays the whole thing.
  const runIntro = () => {
    clearTimeout(introTimer);
    l2.innerHTML = "";
    branches.forEach(b => b.classList.remove("dz-draw"));
    void l1.getBoundingClientRect();                 // force reflow so the draw restarts
    branches.forEach(b => b.classList.add("dz-draw"));
    introTimer = setTimeout(() => expand(activeTag), prefersReducedMotion() ? 0 : 1500);
  };
  l1.querySelectorAll(".dz-cat").forEach(cat => {
    cat.addEventListener("click", () => expand(cat.dataset.tag));
    cat.addEventListener("keydown", e => { if(e.key === "Enter" || e.key === " "){ e.preventDefault(); expand(cat.dataset.tag); } });
  });
  const snap = root.querySelector(".dz-snap");
  if(snap){
    snap.addEventListener("click", runIntro);
    snap.addEventListener("keydown", e => { if(e.key === "Enter" || e.key === " "){ e.preventDefault(); runIntro(); } });
  }
  // Mobile accordion: tap a branch head to expand its plays; tap a play to open it.
  root.querySelectorAll(".dzm-head").forEach(head => {
    head.addEventListener("click", () => {
      const branch = head.closest(".dzm-branch");
      const open = branch.classList.toggle("open");
      head.setAttribute("aria-expanded", String(open));
    });
  });
  root.querySelectorAll(".dzm-play[data-play]").forEach(b =>
    b.addEventListener("click", () => openPlay(b.dataset.play)));
  runIntro();
}

           <div class="f-name">${f.name}</div>
           <div class="f-desc">${f.desc}</div>
           ${(f.tags||[]).length ? `<div class="f-tags">${f.tags.map(t => {
             const match = PLAYS.find(x => x.name.toLowerCase() === t.toLowerCase());
             return match
               ? `<button class="ftag" data-play="${match.id}">${t}</button>`
               : `<span class="ftag">${t}</span>`;
           }).join("")}</div>` : ""}
         </div>
       </div>`).join("") + `</div>`;
  }
  else if(key === "series"){
    eyebrow = SERIES.eyebrow; title = SERIES.title;
    body = seriesCarouselHTML();
  }
  else if(key === "dna"){
    eyebrow = "Scouting Report"; title = "Scheme DNA";
    const d = computeDNA();
    body = `<div class="dna-wrap" data-mode="analytics">
        <div class="dna-mode" id="dna-mode">${dnaAnalyticsHTML(d)}</div>
        ${dnaTabsHTML("analytics")}
      </div>`;
  }

  const doOpen = () => {
  openTakeover(`
    <div class="card section-card">
      <button class="card-close" title="Close (Esc)">&times;</button>
      <div class="sc-eyebrow eyebrow">${eyebrow}</div>
      <h2 class="display sc-title">${title}</h2>
      <div class="sc-divider"></div>
      ${body}
    </div>`, "left");

  inner.querySelector(".card-close").addEventListener("click", closeTakeover);
  if(key === "about"){
    const mf = inner.querySelector("#manifesto");
    const stage = mf.querySelector(".mf-stage");
    const total = +mf.dataset.total;
    let idx = 0, busy = false;
    // wire the "Embodied by [player]" chip to deep-link into Personnel
    const wireChip = (root) => {
      const chip = root.querySelector(".mf-player");
      if(chip) chip.addEventListener("click", () => openPersonnelPlayer(+chip.dataset.pi));
    };
    const showFirst = () => {
      const first = stage.querySelector(".mf-tenet");
      wireChip(first);
      // let the section card finish its entrance, then pop the first tenet
      setTimeout(() => popTenet(first), 440);
    };
    const go = (n) => {
      n = (n + total) % total;
      if(n === idx || busy) return;
      busy = true;
      const cur = stage.querySelector(".mf-tenet");
      cur.classList.add("leave");
      const tmp = document.createElement("div");
      tmp.innerHTML = aboutTenetHTML(ABOUT.pillars[n], n, total);
      const next = tmp.firstElementChild;
      setTimeout(() => {
        stage.innerHTML = "";
        stage.appendChild(next);
        wireChip(next);
        popTenet(next, () => { busy = false; });
        idx = n;
        mf.querySelectorAll(".mf-dot").forEach((d, i) => d.classList.toggle("active", i === idx));
      }, 240);
    };
    mf.querySelector(".mf-next").addEventListener("click", () => go(idx + 1));
    mf.querySelector(".mf-prev").addEventListener("click", () => go(idx - 1));
    mf.querySelectorAll(".mf-dot").forEach(d => d.addEventListener("click", () => go(+d.dataset.i)));
    showFirst();
  }
  if(key === "personnel"){
    inner.querySelector(".section-card").classList.add("pers-section-card");
  }
  if(key === "series"){
    inner.querySelector(".section-card").classList.add("series-section-card");
    const hero = inner.querySelector(".series-hero");
    const slides = [...hero.querySelectorAll(".series-slide")];
    const dots = [...hero.querySelectorAll(".series-dot")];
    const pop = hero.querySelector("#sr-pop");
    let idx = +hero.dataset.start || 0;
    let busy = false;
    const closePop = () => {
      pop.classList.remove("in");
      setTimeout(() => { if(!pop.classList.contains("in")) pop.classList.remove("open"); }, 280);
    };
    const show = (n, dir) => {
      n = (n + slides.length) % slides.length;
      if(n === idx || busy) return;
      busy = true;
      if(pop.classList.contains("open")) closePop();
      const cur = slides[idx], nxt = slides[n];
      cur.classList.remove("on");
      nxt.classList.add("on");
      nxt.classList.remove("enter-next", "enter-prev");
      void nxt.offsetWidth;                       // restart the rotate animation
      nxt.classList.add(dir > 0 ? "enter-next" : "enter-prev");
      dots.forEach((d, i) => d.classList.toggle("on", i === n));
      idx = n;
      setTimeout(() => { busy = false; }, 480);
    };
    hero.querySelector(".series-arrow.next").addEventListener("click", () => show(idx + 1, 1));
    hero.querySelector(".series-arrow.prev").addEventListener("click", () => show(idx - 1, -1));
    dots.forEach((d, i) => d.addEventListener("click", () => show(i, i > idx ? 1 : -1)));

    // player chip -> scouting popup
    const openPop = (ti, pj) => {
      const team = SERIES.teams[ti], p = team && team.players[pj];
      if(!p) return;
      pop.style.setProperty("--accent", team.accent);
      pop.querySelector(".sr-pop-pos").textContent = p.pos;
      pop.querySelector(".sr-pop-name").textContent = p.name;
      pop.querySelector(".sr-pop-season").textContent = p.season || "";
      pop.querySelector(".sr-pop-line").textContent = p.line || "";
      pop.querySelector(".sr-pop-blurb").textContent = p.blurb || "";
      pop.classList.add("open");
      requestAnimationFrame(() => requestAnimationFrame(() => pop.classList.add("in")));
    };
    hero.querySelectorAll(".sr-player").forEach(b =>
      b.addEventListener("click", () => openPop(+b.dataset.ti, +b.dataset.pj)));
    pop.querySelector(".sr-pop-x").addEventListener("click", closePop);
    pop.addEventListener("click", (e) => { if(e.target === pop) closePop(); });

    // signature graph -> expandable "full breakdown" drawer
    hero.querySelectorAll(".sr-sig-toggle").forEach(btn => {
      btn.addEventListener("click", () => {
        const more = btn.nextElementSibling;
        const isOpen = btn.getAttribute("aria-expanded") === "true";
        btn.setAttribute("aria-expanded", String(!isOpen));
        more.classList.toggle("open", !isOpen);
      });
    });

    // arrow keys cycle teams; Esc closes the popup first (before the section)
    const keyh = (e) => {
      if(!document.body.contains(hero)){ document.removeEventListener("keydown", keyh, true); return; }
      if(e.key === "Escape" && pop.classList.contains("open")){ e.stopPropagation(); closePop(); return; }
      if(e.key === "ArrowRight") show(idx + 1, 1);
      else if(e.key === "ArrowLeft") show(idx - 1, -1);
    };
    document.addEventListener("keydown", keyh, true);
  }
  if(key === "formations"){
    inner.querySelectorAll(".ftag[data-play]").forEach(b =>
      b.addEventListener("click", () => openPlay(b.dataset.play)));
  }
  if(key === "dna"){
    const card = inner.querySelector(".section-card");
    card.classList.add("dna-section-card");
    takeover.classList.add("dna-open");        // blur the field behind the graphs

    const wrap = inner.querySelector(".dna-wrap");
    const modeEl = wrap.querySelector("#dna-mode");
    // cross-fade swap between the three modes; each recomputes from PLAYS
    const render = (mode) => {
      modeEl.classList.add("dna-swap");
      setTimeout(() => {
        const d = computeDNA();
        modeEl.innerHTML = mode === "recommended" ? dnaRecommendedHTML(d)
                         : mode === "formations"  ? dnaFormationsHTML()
                         : dnaAnalyticsHTML(d);
        wrap.dataset.mode = mode;
        modeEl.classList.remove("dna-swap");
        dnaAnimateIn(modeEl);
        wireDnaInner(modeEl);
      }, 240);
    };
    wrap.querySelectorAll(".dna-tab").forEach(b =>
      b.addEventListener("click", () => {
        if(b.dataset.tab === wrap.dataset.mode) return;
        wrap.querySelectorAll(".dna-tab").forEach(x => x.classList.toggle("on", x === b));
        render(b.dataset.tab);
      }));
    dnaAnimateIn(modeEl);
    wireDnaInner(modeEl);
  }
  if(key === "personnel"){
    const rail = inner.querySelector("#pers-rail");
    const deep = inner.querySelector("#pers-deep");
    const playerLabels = inner.querySelectorAll(".pers-player-label");

    // selecting a player highlights his rail card
    const selectPlayer = (pi) => {
      rail && rail.querySelectorAll(".pers-pcard").forEach(c => c.classList.toggle("active", +c.dataset.pi === pi));
    };
    const clearSelect = () => {
      rail && rail.querySelectorAll(".pers-pcard").forEach(c => c.classList.remove("active"));
    };

    // Rail: tap a card to scout the player (expand his breakdown)
    rail && rail.querySelectorAll(".pers-pcard").forEach(card => {
      card.addEventListener("click", (e) => {
        if(e.target.closest("[data-deep]")) return;   // the breakdown button opens the deep dive
        const pi = +card.dataset.pi;
        if(card.classList.contains("active")) clearSelect(); else selectPlayer(pi);
      });
    });

    // Deep dive - full-screen takeover. Built fresh on open, torn down on close.
    let deepKeyHandler = null;
    function openDeep(pi){
      const p = PERSONNEL[pi];
      if(!p || !deep) return;
      selectPlayer(pi);
      deep.innerHTML = persDeepHTML(p);
      deep.classList.add("open");
      deep.setAttribute("aria-hidden", "false");
      requestAnimationFrame(() => requestAnimationFrame(() => deep.classList.add("in")));

      // Mouse parallax — frame drifts toward cursor (fine pointers only; the
      // mobile deep-dive is a plain stacked scroll, so no parallax there).
      if(window.matchMedia('(pointer: fine)').matches &&
         !window.matchMedia('(prefers-reduced-motion: reduce)').matches){
        const frame = deep.querySelector('.pers-deep-frame');
        const stage = deep.querySelector('.pers-deep-stage');
        if(frame && stage){
          const onMove = (e) => {
            const r = stage.getBoundingClientRect();
            const dx = (e.clientX - r.left) / r.width  - .5;   // -0.5 … 0.5
            const dy = (e.clientY - r.top)  / r.height - .5;
            frame.style.transform = `translate(${dx * 18}px, ${dy * 11}px)`;
          };
          const onLeave = () => { frame.style.transform = ''; };
          stage.addEventListener('mousemove', onMove);
          stage.addEventListener('mouseleave', onLeave);
        }
      }

      deep.querySelectorAll("[data-play]").forEach(b =>
        b.addEventListener("click", () => openPlay(b.dataset.play)));
      deep.querySelectorAll("[data-deepclose]").forEach(b =>
        b.addEventListener("click", closeDeep));
      deepKeyHandler = (e) => { if(e.key === "Escape"){ e.stopPropagation(); closeDeep(); } };
      document.addEventListener("keydown", deepKeyHandler, true);
    }
    function closeDeep(){
      if(!deep) return;
      deep.classList.remove("in");
      deep.setAttribute("aria-hidden", "true");
      if(deepKeyHandler){ document.removeEventListener("keydown", deepKeyHandler, true); deepKeyHandler = null; }
      setTimeout(() => { if(!deep.classList.contains("in")){ deep.classList.remove("open"); deep.innerHTML = ""; } }, 460);
    }

    // Player label → deep dive. Rail "Full Breakdown" button → deep dive.
    playerLabels.forEach(btn => btn.addEventListener("click", () => openDeep(+btn.dataset.pi)));
    rail && rail.querySelectorAll("[data-deep]").forEach(btn =>
      btn.addEventListener("click", (e) => { e.stopPropagation(); openDeep(+btn.dataset.deep); }));

    // deep-link: arrived here focused on a player → open his breakdown
    if(pendingPersonnel != null){
      const pi = pendingPersonnel;
      pendingPersonnel = null;
      setTimeout(() => openDeep(pi), 480);
    }
  }
  }; // end doOpen

  // Premium "segment bumper" title card before the section reveals.
  // Start with personnel as the test; add more keys here once it's dialed in.
  const BUMPER_SECTIONS = ["about", "personnel", "dna"];
  if(BUMPER_SECTIONS.includes(key) && !prefersReducedMotion() && !navReplaying){
    runBumper(eyebrow, title, doOpen, key);
  } else {
    doOpen();   // back-navigation skips the bumper - it's a return, not a reveal
  }
}

/* ----- CATEGORY LIST (opened by a right-side category pill) ----- */
// The category node BLOWS UP into a hub and its plays BRANCH OUT as patches on
// gold strands over the blurred home web - same language as the play screen.
function openCategory(type){
  navMaybePush("category");
  const plays = PLAYS.filter(p => p.type === type);
  state.view = { kind:"category", type };
  state.list = plays.map(p => p.id);     // prev/next cycles within this category

  const meta = CATEGORIES.find(c => c.type === type) || {};
  const sub = meta.sub || "Play Category";
  const title = meta.title || type;

  if(!plays.length){
    openTakeover(`
      <div class="card section-card list-card">
        <button class="card-close" title="Close (Esc)">&times;</button>
        <div class="sc-eyebrow eyebrow">${sub}</div>
        <h2 class="display sc-title">${title}</h2>
        <div class="sc-divider"></div>
        <div class="overlay-list"><div class="empty">No plays in this category yet.</div></div>
      </div>`, "right");
    inner.querySelector(".card-close").addEventListener("click", closeTakeover);
    return;
  }

  // structured web: two columns flanking the centre hub, distributed vertically
  const n = plays.length, leftN = Math.ceil(n / 2);
  const HUB = [800, 450];                  // viewBox centre (1600×900)
  let strands = "", pulses = "", nodes = "";
  plays.forEach((p, i) => {
    const isLeft = i < leftN;
    const idx = isLeft ? i : i - leftN;
    const cnt = isLeft ? leftN : (n - leftN);
    const xp = isLeft ? 21 : 79;
    const yp = cnt === 1 ? 50 : 14 + (72 / (cnt - 1)) * idx;
    const nx = xp * 16, ny = yp * 9;
    const cx = (HUB[0] + nx) / 2, cy = HUB[1] + (ny - HUB[1]) * 0.32;
    const d = `M${HUB[0]},${HUB[1]} Q${cx.toFixed(0)},${cy.toFixed(0)} ${nx.toFixed(0)},${ny.toFixed(0)}`;
    strands += `<path class="pw-wstrand" d="${d}" pathLength="100"/>`;
    pulses  += `<path class="pw-wpulse" d="${d}" pathLength="100" style="animation-delay:${(i*0.18).toFixed(2)}s"/>`;
    // --sx/--sy start each patch near the hub so it BRANCHES OUT to its spot
    nodes   += `<div class="cat-web-node" style="left:${xp}%;top:${yp}%;--sx:${((50-xp)*0.72).toFixed(1)};--sy:${((50-yp)*0.72).toFixed(1)};--d:${(0.36 + i*0.06).toFixed(2)}s">${playItemHTML(p)}</div>`;
  });

  openTakeover(`
    <div class="card cat-web">
      <button class="card-close" title="Close (Esc)">&times;</button>
      <svg class="cat-web-svg" viewBox="0 0 1600 900" preserveAspectRatio="none" aria-hidden="true">${strands}${pulses}</svg>
      <div class="cat-web-hub">
        <span class="cat-web-hub-sub">${sub}</span>
        <span class="cat-web-hub-title display">${title}</span>
        <span class="cat-web-hub-crown">${CROWN}</span>
      </div>
      ${nodes}
    </div>`, "scale");

  document.body.classList.add("cat-web-open");        // blur the home web behind
  const root = inner.querySelector(".cat-web");
  inner.querySelector(".card-close").addEventListener("click", closeTakeover);
  inner.querySelectorAll("[data-play]").forEach(b =>
    b.addEventListener("click", () => openPlay(b.dataset.play)));
  requestAnimationFrame(() => requestAnimationFrame(() => root.classList.add("in")));
  setTimeout(() => root.classList.add("in"), 80);
}

/* ==========================================================================
   FULL SYSTEM - the "brain" zoom-out. One button blows the whole hub open:
   every branch keeps its place but pulls inward, and its REAL children bloom
   into the outer ring, all wired back to the crest. Low utility, high wow -
   everything stays clickable (a leaf opens its play/section, a branch opens
   its hub). Children are pulled live from the data, never invented.
   ========================================================================== */
function fsBranches(){
  const byType = t => PLAYS.filter(p => p.type === t)
                           .map(p => ({ label:p.name, kind:"play", id:p.id }));
  const sec = key => label => ({ label, kind:"section", arg:key });
  // `at` = each branch's spot, pulled INWARD from its hub position so the
  // children have room to fan out past it toward the edge.
  return [
    { key:"about",     title:"About",        sub:"Philosophy", at:{x:30,y:29},
      open:()=>openSection("about"),
      kids: ABOUT.rail.markers.map(m => sec("about")(m.k)) },
    { key:"personnel", title:"Personnel",    sub:"Who Runs It", at:{x:24,y:48},
      open:()=>openSection("personnel"),
      kids: PERSONNEL.map(p => sec("personnel")(p.title)) },
    { key:"dna",       title:"Scheme DNA",   sub:"Scouting", at:{x:27,y:66},
      open:()=>openSection("dna"),
      kids: FORMATIONS.map(f => sec("dna")(f.name)) },
    { key:"series",    title:"Full Offense", sub:"The Series", at:{x:48,y:81}, flat:0.46, smul:2.0,
      open:()=>openSection("series"),
      kids: SERIES.teams.map(t => sec("series")(t.era.replace(/^Next-Gen\s+/,""))) },
    { key:"run",  title:"Run Game",   sub:"Ground Attack", at:{x:67,y:33},
      open:()=>openCategory("Run Game"),  kids: byType("Run Game") },
    { key:"pass", title:"Pass Game",  sub:"Through The Air", at:{x:76,y:48},
      open:()=>openCategory("Pass Game"), kids: byType("Pass Game") },
    { key:"star", title:"Star Plays", sub:"Money Calls", at:{x:67,y:64},
      open:()=>openCategory("Star Play"), kids: byType("Star Play") },
  ];
}

function openFullSystem(){
  navMaybePush("fullsystem");
  state.view = { kind:"fullsystem" };

  const C = { x:50, y:48 }, AR = 0.5625;     // centre + viewport aspect (h/w)
  const branches = fsBranches();
  const clamp = (v,lo,hi) => Math.max(lo, Math.min(hi, v));
  let strands = "", pulses = "", coreStr = "", nodes = "";
  let pulseIdx = 0;

  // a curved viewBox path (1600×900, preserveAspectRatio:none) between two %pts
  const path = (a, b) => {
    const ax=a.x*16, ay=a.y*9, bx=b.x*16, by=b.y*9;
    const mx=(ax+bx)/2, my=(ay+by)/2;
    const cx2 = C.x*16, cy2 = C.y*9;            // bow each strand toward centre
    const qx = mx + (cx2-mx)*0.16, qy = my + (cy2-my)*0.16;
    return `M${ax.toFixed(0)},${ay.toFixed(0)} Q${qx.toFixed(0)},${qy.toFixed(0)} ${bx.toFixed(0)},${by.toFixed(0)}`;
  };

  branches.forEach((b, bi) => {
    // main strand crest -> branch
    const md = path(C, b.at);
    coreStr += `<path class="fs-strand main" data-b="${b.key}" d="${md}" style="--sd:${(0.22+bi*0.05).toFixed(2)}s"/>`;
    pulses  += `<path class="fs-pulse" d="${md}" style="animation-delay:${(pulseIdx++*0.2).toFixed(2)}s"/>`;

    // branch node
    const bsx = (C.x-b.at.x)*0.82, bsy = (C.y-b.at.y)*0.82;
    nodes += `<button class="fs-branch" data-b="${b.key}" style="left:${b.at.x}%;top:${b.at.y}%;`
           + `--sx:${bsx.toFixed(1)};--sy:${bsy.toFixed(1)};--d:${(0.26+bi*0.05).toFixed(2)}s">`
           + `<span class="fs-branch-t">${b.title}</span><span class="fs-branch-s">${b.sub}</span></button>`;

    // fan the children outward, each in its OWN angular lane. Many children
    // (run game) split across an inner + outer arc rather than one wide fan,
    // so a branch reads as a clean two-row spray that never crosses a neighbour.
    const n = b.kids.length;
    const dir = { x:(b.at.x-C.x), y:(b.at.y-C.y)*AR };
    const baseA = Math.atan2(dir.y, dir.x);
    const bV = { x:b.at.x, y:b.at.y*AR };
    const twoRow = n >= 5;
    const inN = twoRow ? Math.ceil(n/2) : n;       // inner arc count
    b.kids.forEach((k, i) => {
      const outer = twoRow && i >= inN;
      const rowN  = outer ? (n - inN) : inN;
      const pos   = outer ? (i - inN) : i;
      const ring  = (outer ? 22 : 13.5) * (b.rmul||1);
      const spread = Math.min(1.85, 0.6*Math.max(rowN-1,0)) * (b.smul||1);  // wide enough to separate stacked chips
      const t = rowN===1 ? 0 : (pos/(rowN-1) - 0.5);
      const ang = baseA + t*spread;
      const cv = { x:bV.x + Math.cos(ang)*ring, y:bV.y + Math.sin(ang)*ring*(b.flat||1) };
      const cp = { x:clamp(cv.x, 4, 96), y:clamp(cv.y/AR, 6, 94) };
      const cd = path(b.at, cp);
      const sd = (0.5 + bi*0.04 + i*0.05);
      strands += `<path class="fs-strand" data-b="${b.key}" d="${cd}" style="--sd:${sd.toFixed(2)}s"/>`;
      if(i % 2 === 0) pulses += `<path class="fs-pulse" d="${cd}" style="animation-delay:${(pulseIdx++*0.2).toFixed(2)}s"/>`;
      const lsx = (b.at.x-cp.x)*0.82, lsy = (b.at.y-cp.y)*0.82;
      const route = k.kind==="play" ? `data-play="${k.id}"` : `data-section="${k.arg}"`;
      // constellation labels strip the "MTN/Motion" prefix - full name on click
      const lab = k.kind==="play" ? k.label.replace(/^(MTN|Motion)\s+/,"") : k.label;
      nodes += `<button class="fs-leaf" data-b="${b.key}" ${route} style="left:${cp.x.toFixed(1)}%;top:${cp.y.toFixed(1)}%;`
             + `--sx:${lsx.toFixed(1)};--sy:${lsy.toFixed(1)};--d:${(sd+0.08).toFixed(2)}s">${lab}</button>`;
    });
  });

  const crest = SCHEME_CONFIG.teamLogo
    ? `<img class="fs-core-img" src="${SCHEME_CONFIG.teamLogo}" alt="">`
    : `<span class="fs-core-img" style="color:var(--gold)">${CROWN}</span>`;

  openTakeover(`
    <div class="card fs-web">
      <button class="card-close" title="Close (Esc)">&times;</button>
      <svg class="fs-svg" viewBox="0 0 1600 900" preserveAspectRatio="none" aria-hidden="true">${coreStr}${strands}${pulses}</svg>
      <div class="fs-core">${crest}
        <span class="fs-core-sub">The Whole System</span>
        <span class="fs-core-title display">${SCHEME_CONFIG.schemeName || SCHEME_CONFIG.teamName || "Every Call, Connected"}</span>
      </div>
      ${nodes}
    </div>`, "scale");

  document.body.classList.add("fs-open");          // blur + darken the field behind
  const root = inner.querySelector(".fs-web");
  inner.querySelector(".card-close").addEventListener("click", closeTakeover);
  // a branch lights its own leaves on hover (reinforces the wiring)
  inner.querySelectorAll(".fs-branch, .fs-leaf").forEach(el => {
    const key = el.dataset.b;
    el.addEventListener("pointerenter", () =>
      root.querySelectorAll(`.fs-leaf[data-b="${key}"]`).forEach(l => l.classList.add("lit")));
    el.addEventListener("pointerleave", () =>
      root.querySelectorAll(`.fs-leaf[data-b="${key}"]`).forEach(l => l.classList.remove("lit")));
  });
  inner.querySelectorAll(".fs-branch").forEach((b, i) =>
    b.addEventListener("click", () => branches[i].open()));
  inner.querySelectorAll(".fs-leaf[data-play]").forEach(b =>
    b.addEventListener("click", () => openPlay(b.dataset.play)));
  inner.querySelectorAll(".fs-leaf[data-section]").forEach(b =>
    b.addEventListener("click", () => openSection(b.dataset.section)));
  requestAnimationFrame(() => requestAnimationFrame(() => root.classList.add("in")));
  setTimeout(() => root.classList.add("in"), 80);
}

// (Re)render the call sheet filter chips + grouped list for the active filter.
function renderCallSheetBody(){
  // formationFilter (set by a play's "see all calls from this set" door) takes
  // precedence over the tag filter; clicking any tag chip clears it.
  const match = (p) => state.formationFilter
    ? p.formation === state.formationFilter
    : (state.filter === "all" || (p.tags||[]).includes(state.filter));

  // filter chips (+ a formation context chip when a formation door opened this)
  const fr = $("#ov-filter-row");
  fr.innerHTML =
    (state.formationFilter ? `<button class="chip active" data-clearform>◆ ${state.formationFilter} &times;</button>` : "")
    + filterChipIds().map(id =>
      `<button class="chip ${!state.formationFilter && id===state.filter?'active':''}" data-filter="${id}">${id==="all" ? "All" : tagLabel(id)}</button>`).join("");
  fr.querySelectorAll("[data-filter]").forEach(b =>
    b.addEventListener("click", () => { state.formationFilter = null; state.filter = b.dataset.filter; renderCallSheetBody(); }));
  const clearForm = fr.querySelector("[data-clearform]");
  if(clearForm) clearForm.addEventListener("click", () => { state.formationFilter = null; renderCallSheetBody(); });

  // grouped play list (also records the order for prev/next)
  const filtered = PLAYS.filter(match);
  state.list = filtered.map(p => p.id);
  const groups = [
    { type:"Run Game",  label:"Run Game" },
    { type:"Pass Game", label:"Pass Game" },
    { type:"Star Play", label:"Star Plays" },
  ];
  let html = "";
  groups.forEach(g => {
    const ps = filtered.filter(p => p.type === g.type);
    if(!ps.length) return;
    html += `<div class="group-label">${g.label}</div>` + ps.map(playItemHTML).join("");
  });
  if(!html) html = `<div class="empty">No plays match this filter.</div>`;

  const list = $("#ov-list");
  list.innerHTML = html;
  list.querySelectorAll("[data-play]").forEach(b =>
    b.addEventListener("click", () => openPlay(b.dataset.play)));
  staggerReveal(inner);   // re-cascade the rows on open + each filter change
}

// One-Play TD - a deep ball in FIELD-SPACE from the LOS (f.los) to a target in the end
// zone (f.target). f.apex is the control-point y: negative lofts the arc up into the sky.
// f.side shifts the landing left/right (0.5 = middle) so the arc reads as a curve.
function buildShot(f){
  const side = f.side != null ? f.side : 0.5;
  const sx = fieldFracX(f.los, 0.5),  sy = f.los;
  const ex = fieldFracX(f.target, side), ey = f.target;
  const cx = fieldFracX(f.los, 0.5 + (side - 0.5) * 0.7), cy = f.apex;
  const d  = `M ${sx.toFixed(1)} ${sy} Q ${cx.toFixed(1)} ${cy} ${ex.toFixed(1)} ${ey}`;
  return `<path class="shot-arc" pathLength="100" d="${d}"/>
    <g transform="translate(${ex.toFixed(1)},${ey})"><g class="shot-target">
      <ellipse class="st-ring" rx="22" ry="9"/><ellipse class="st-ring" rx="12" ry="5"/>
      <line class="st-cross" x1="-28" y1="0" x2="28" y2="0"/><line class="st-cross" x1="0" y1="-11" x2="0" y2="11"/>
    </g></g>
    <g class="shot-ball"><ellipse rx="7" ry="4.4"/>
      <animateMotion dur="1.15s" begin="0.2s" keyPoints="0;0.5" keyTimes="0;1" calcMode="linear" fill="freeze" rotate="auto" path="${d}"/>
    </g>`;
}
// Star Plays - a gold spotlight glow + twinkling sparkles on the midfield crown
function buildSpotlight(){
  const cx = fieldFracX(279, 0.5), cy = 279;
  let s = `<circle class="star-glow" cx="${cx.toFixed(1)}" cy="${cy}" r="110"/>`;
  const pts = [[0.36,255],[0.64,255],[0.40,308],[0.60,308],[0.5,231],[0.5,330],[0.30,283],[0.70,283]];
  pts.forEach((p, i) => {
    const x = fieldFracX(p[1], p[0]), y = p[1];
    s += `<g transform="translate(${x.toFixed(1)},${y})"><path class="star-spark s${i%3}" d="M0,-9 L2.6,-2.6 9,0 2.6,2.6 0,9 -2.6,2.6 -9,0 -2.6,-2.6Z"/></g>`;
  });
  return s;
}

      b.classList.toggle("on", +b.dataset.i === activeIndex));
  }
  const BASE = "scale(1) translate(0%, 0%)";
  fieldwrap.style.transform = BASE;
  // Wide-field transition timings for the close-field handoff. DIVE = accelerate INTO
  // the field (enter, zoom in + blur out). RESOLVE = decelerate as the wide field pulls
  // back and focuses (exit). Set inline because the direction decides the feel.
  const DIVE    = "transform 1.0s cubic-bezier(.4,0,.7,.45), opacity .72s ease-in, filter .82s ease-in";
  const RESOLVE = "transform 1.08s cubic-bezier(.18,.72,.2,1), opacity .8s ease, filter .86s ease";
  // Build a wide-field camera transform for situation w (or full field if null), with an
  // optional scale multiplier used to push the camera further in during the dive.
  function camTransform(w, mul){
    const sc = (w ? w.s : 1) * (mul || 1), fx = w ? w.fx : 50, fy = w ? w.fy : 50;
    const tilt = (w && w.tilt) ? ` rotateX(${w.tilt}deg)` : "";
    return `scale(${sc.toFixed(3)}) translate(${(50 - fx).toFixed(1)}%, ${(50 - fy).toFixed(1)}%)${tilt}`;
  }


  // on-field furniture (line of scrimmage, first-down line, football) - appears
  // AFTER the camera settles, clears before it moves.
  let furnTimer = null;
  function hideFurniture(){ clearTimeout(furnTimer); furniture.classList.remove("on"); shotLayer.classList.remove("on"); }
  function showFurniture(s){
    const f = s.furn;
    shotLayer.classList.remove("on");
    if(f.shot){
      losLine.style.display = "none"; fdLine.style.display = "none";
      band.style.display = "none"; marker.style.display = "none";
      covG.style.display = ""; covG.innerHTML = buildShot(f); football.style.display = "none";
      requestAnimationFrame(() => requestAnimationFrame(() => furniture.classList.add("on")));
      return;
    }
    if(f.spotlight){
      losLine.style.display = "none"; fdLine.style.display = "none";
      band.style.display = "none"; marker.style.display = "none"; football.style.display = "none";
      covG.style.display = ""; covG.innerHTML = buildSpotlight();
      requestAnimationFrame(() => requestAnimationFrame(() => furniture.classList.add("on")));
      return;
    }

      losLine.style.display = "none"; fdLine.style.display = "none";
      band.style.display = "none"; marker.style.display = "none";
      covG.style.display = "";

    } else {
      losLine.style.display = ""; fdLine.style.display = ""; marker.style.display = "";
      covG.style.display = "none"; covG.innerHTML = "";
      losLine.setAttribute("x1", fieldEdgeX(f.los, "L").toFixed(1)); losLine.setAttribute("y1", f.los);
      losLine.setAttribute("x2", fieldEdgeX(f.los, "R").toFixed(1)); losLine.setAttribute("y2", f.los);
      fdLine.setAttribute("x1", fieldEdgeX(f.fd, "L").toFixed(1));   fdLine.setAttribute("y1", f.fd);
      fdLine.setAttribute("x2", fieldEdgeX(f.fd, "R").toFixed(1));   fdLine.setAttribute("y2", f.fd);
      if(f.band){
        band.setAttribute("points", [
          fieldEdgeX(f.los,"L").toFixed(1) + "," + f.los, fieldEdgeX(f.los,"R").toFixed(1) + "," + f.los,
          fieldEdgeX(f.fd,"R").toFixed(1)  + "," + f.fd,  fieldEdgeX(f.fd,"L").toFixed(1)  + "," + f.fd
        ].join(" "));
        band.style.display = "";
      } else { band.style.display = "none"; }
      const sw = (8.5 / s.s).toFixed(2);
      losLine.style.strokeWidth = sw; fdLine.style.strokeWidth = sw;
      marker.style.setProperty("--ms", (1 / s.s).toFixed(3));
      markerTxt.textContent = f.markerText || s.chip || s.name || "";
      marker.style.left = (f.ballX / 1000 * 100).toFixed(2) + "%";
      marker.style.top  = (f.fd    / 558  * 100).toFixed(2) + "%";
    }
    football.style.display = "";
    football.style.left  = (f.ballX / 1000 * 100).toFixed(2) + "%";
    football.style.top   = (f.los   / 558  * 100).toFixed(2) + "%";
    football.style.width = f.ballW + "%";
    requestAnimationFrame(() => requestAnimationFrame(() => furniture.classList.add("on")));
  }

  function fill(s){
    bKick.textContent = s.kicker; bName.innerHTML = s.name;
    bChip.textContent = s.chip || ""; bChip.style.display = s.chip ? "" : "none";
    bKeys.innerHTML = s.keys.map(k =>
      `<div class="db-bkey"><div class="db-bkh">${k[0]}</div><div class="db-bks">${k[1]}</div></div>`).join("");
    const ps = driveSitPlays(s);
    playList.innerHTML = ps.length
      ? ps.map(p => `<button class="db-pill" data-play="${p.id}"><span class="db-pdot"></span><span class="db-ptext"><span class="db-pname">${p.name}</span>${p.formation ? `<span class="db-pform">${p.formation}</span>` : ""}</span><span class="db-padd" data-add="${p.id}" role="button" title="Add to drive">&#xFF0B;</span></button>`).join("")
      : `<div class="db-empty">No plays tagged yet.</div>`;
    playList.querySelectorAll(".db-pill").forEach(b =>
      b.addEventListener("click", (e) => {
        const addEl = e.target.closest(".db-padd");
        if(addEl){                                   // ＋ drops the play straight onto the web
          e.stopPropagation();
          addCall(addEl.dataset.add, s.btn, "");
          addEl.classList.add("added"); addEl.innerHTML = "&#10003;";
          setTimeout(() => { addEl.classList.remove("added"); addEl.innerHTML = "&#xFF0B;"; }, 1100);
          return;
        }
        showPlayCall(b.dataset.play, ps);
      }));
  }
  function clearPlayCall(){
    const pc = inner.querySelector("#db-pc");
    if(pc){ pc.classList.remove("show"); pc.innerHTML = ""; }
  }
  function showPlayCall(id, ps){
    const p = PLAYS.find(x => x.id === id); if(!p) return;
    board.classList.remove("down"); plays.classList.remove("in");   // clear the look - focus the call
    const pc = inner.querySelector("#db-pc");
    pc.innerHTML = playCallHTML(p);
    requestAnimationFrame(() => requestAnimationFrame(() => pc.classList.add("show")));
    pc.querySelector(".db-pc-close").addEventListener("click", () => {
      clearPlayCall(); board.classList.add("down"); plays.classList.add("in");   // back to the look
    });
    pc.querySelector(".db-pc-full").addEventListener("click", () => {
      state.list = ps.map(x => x.id); openPlay(id);                              // full breakdown (leaves Drive Builder)
    });
    const addBtn = pc.querySelector(".db-pc-add");
    addBtn.addEventListener("click", () => {
      const sit = activeIndex >= 0 ? DRIVE_SITUATIONS[activeIndex].btn : (DRIVE_SITUATIONS[0] && DRIVE_SITUATIONS[0].btn);
      addCall(id, sit, "");
      addBtn.classList.add("added");
      addBtn.innerHTML = "&#10003;&nbsp;Added to Drive";
      setTimeout(() => { addBtn.classList.remove("added"); addBtn.innerHTML = "&#xFF0B;&nbsp;Add to Drive"; }, 1500);
    });
  }
  const isClose = s => s && s.view === "close";
  // Re-trigger the radial zoom-streak burst (restart the keyframe animation).
  function fireStreak(){
    zoomStreak.classList.remove("fire");
    void zoomStreak.offsetWidth;
    zoomStreak.classList.add("fire");
  }
  // ENTER the close field: ONE continuous push-in. The wide field DIVES in (zooms
  // further + blurs out), and as it blurs the close field RESOLVES out of the blur to
  // "populate" the view. prevS tells us which wide framing we're diving from.
  function enterClose(s, prevS){
    const fromZoom = !!(prevS && !isClose(prevS));   // diving from an already-zoomed look
    const w = fromZoom ? prevS : null;                // the wide framing we dive through
    // 1) wide field dives in + blurs out
    fieldwrap.style.transition = DIVE;
    fieldwrap.classList.add("recede");
    fieldwrap.style.transform = camTransform(w, 1.55);
    wash.style.background = s.wash || "transparent";    // keep the per-situation mood tint
    // 2) close field resolves out of the blur into focus
    closewrap.classList.remove("on", "leaving");
    closewrap.classList.toggle("from-zoom", fromZoom);
    void closewrap.offsetWidth;                          // reflow so it plays from the start state
    fireStreak();                                        // radial zoom-blur streaks
    requestAnimationFrame(() => requestAnimationFrame(() => closewrap.classList.add("on")));
    covGClose.innerHTML = '';
    if(s.furn){
      const _af=s.furn;
      _af.keys=s.keys;
      if(_af.coverage==='zone') setTimeout(()=>animateZonesClose(covGClose,_af),350);
      else if(_af.coverage==='man'&&_af.blitz) setTimeout(()=>animateBlitzClose(covGClose,_af),350);
      else if(_af.coverage==='man') setTimeout(()=>animateManClose(covGClose,_af),350);
      else if(_af.anim==='star') setTimeout(()=>animateStarClose(covGClose,_af),350);
      else if(_af.anim==='run') setTimeout(()=>animateRunClose(covGClose,_af),350);
      else if(_af.anim==='rpo') setTimeout(()=>animateRPOClose(covGClose,_af),350);
      else if(_af.anim==='option') setTimeout(()=>animateOptionClose(covGClose,_af),350);
      else if(_af.anim==='screen') setTimeout(()=>animateScreenClose(covGClose,_af),350);
    }
  }
  // EXIT the close field: zoom OUT through it (recede + blur + fade); the caller then
  // resolves the wide field in underneath. Only fires when the close field was showing.
  function exitClose(){
    covGClose.innerHTML = '';
    if(closewrap.classList.contains("on")){
      fireStreak();
      closewrap.classList.add("leaving");
      const cw = closewrap;
      setTimeout(() => cw.classList.remove("leaving"), 580);   // reset for next enter
    }
    closewrap.classList.remove("on", "from-zoom");
  }
  // Resolve the WIDE field into a target framing (situation s, or full field if null).
  // wasClose => we're pulling back out of the close field, so decelerate (RESOLVE) and
  // un-blur; otherwise it's a normal camera fly (stylesheet timing).
  function flyWide(s, wasClose){
    fieldwrap.style.transition = wasClose ? RESOLVE : "";
    fieldwrap.classList.remove("recede");
    fieldwrap.style.transform = s ? camTransform(s, 1) : BASE;
  }
  function deploy(s, prevS){
    clearPlayCall(); hideFurniture(); furniture.classList.remove("calib");
    if(isClose(s)){
      // close-field furniture is calibrated separately, so we don't draw the
      // wide-field zones here (they'd land in the wrong place).
      enterClose(s, prevS);
    } else {
      const wasClose = isClose(prevS);
      exitClose();                                       // zoom out through the close field
      flyWide(s, wasClose);                              // wide field resolves in / flies
      wash.style.background = s.wash || "transparent";
      if(s.furn) furnTimer = setTimeout(() => showFurniture(s), wasClose ? 1300 : 1200);
    }
    board.classList.add("down"); plays.classList.add("in"); intro.classList.add("out");
    requestAnimationFrame(() => fill(s));
  }
  let busy = false, activeIndex = -1;
  function resetToFull(){
    closeReveal();                                // leaving to the bare full field - drop the drive overlay
    clearPlayCall(); hideFurniture();
    const wasClose = isClose(DRIVE_SITUATIONS[activeIndex]);
    exitClose();
    flyWide(null, wasClose); wash.style.background = "transparent";
    board.classList.remove("down"); plays.classList.remove("in"); intro.classList.remove("out");
    sits.querySelectorAll(".db-sit").forEach(x => x.classList.remove("on"));
    hint.style.opacity = ""; activeIndex = -1; markActiveCat();
  }
  function select(i, btn){
    if(busy) return;
    if(i === activeIndex){ resetToFull(); return; }   // re-click the active situation → back to full field
    const prevS = activeIndex >= 0 ? DRIVE_SITUATIONS[activeIndex] : null;
    hint.style.opacity = 0;
    // build mode stays open while you browse looks - it just refeeds the play list
    sits.querySelectorAll(".db-sit").forEach(x => x.classList.remove("on")); btn.classList.add("on");
    activeIndex = i;
    markActiveCat();
    const s = DRIVE_SITUATIONS[i];
    if(board.classList.contains("down")){
      busy = true; board.classList.remove("down"); plays.classList.remove("in");
      setTimeout(() => { deploy(s, prevS); busy = false; }, 340);   // lift, fly, re-drop
    } else { deploy(s, prevS); }
  }
  sits.querySelectorAll(".db-sit").forEach(b => b.addEventListener("click", () => select(+b.dataset.i, b)));
  // Deep-link: a Scheme DNA CTA asked us to fly straight to a situation.
  if(pendingDriveSit != null){
    const idx = DRIVE_SITUATIONS.findIndex(s => s.btn === pendingDriveSit);
    pendingDriveSit = null;
    if(idx >= 0){
      const target = sits.querySelector(`.db-sit[data-i="${idx}"]`);
      if(target) setTimeout(() => select(idx, target), 760);   // let it settle, then fly to the slice
    }
  }
  // ======================================================================
  // THE DRIVE - BUILD MODE (the RPG web) + the on-field reveal.
  // A drive is a TREE: { main:[ {play,sit,tag,left:[],right:[]} ] } where each
  // mainline call can carry LEFT branches (positive counters - "they're biting")
  // and RIGHT branches (negative fallbacks - "it stalled"). Build mode blurs the
  // field and grows the web UP from the Build-a-Drive button; the side lists stay
  // live. driveCustom: null = King Reggie's recommended showcase (read-only until
  // you touch it); an object = your editable drive.  See-on-Field projects the
  // same tree onto the grass via the legacy perspective layer.
  // ======================================================================
  const buildBtn   = inner.querySelector("#db-build"),
        web        = inner.querySelector("#db-web"),
        canvas     = inner.querySelector("#db-webcanvas"),
        strandsSvg = inner.querySelector("#db-webstrands"),
        nodesLayer = inner.querySelector("#db-webnodes"),
        drivelayer = inner.querySelector("#db-drivelayer"),
        driveField = inner.querySelector("#db-drivefield"),
        driveweb   = inner.querySelector("#db-driveweb"),
        drivenodes = inner.querySelector("#db-drivenodes"),
        drivebar   = inner.querySelector("#db-drivebar"),
        driveCap   = inner.querySelector("#db-drivecap");
  let driveCustom = null;          // null = recommended; else { main:[...] }
  let armed = null;                // null | { chainPath:[...] }  (chain to append to)
  let openMenuKey = null;          // pathKey of the node whose action menu is open
  let navFromLadder = false;
  // tree-layout constants. ROW = vertical gap between calls; HALFW = half a chip's
  // footprint; GAP = clearance reserved between two adjacent subtrees so branches that
  // shoot out can never land on top of each other.
  const ROW = 124, HALFW = 118, GAP = 70;
  let panX = 0, panY = 0, zoom = 1, needsFit = true;
  // independent pan/zoom for the See-on-Field reveal (the whole field + drive
  // transform together so the chips stay registered to the grass).
  let rPanX = 0, rPanY = 0, rZoom = 1;
  const playName = id => { const p = PLAYS.find(x => x.id === id); return p ? p.name : id; };
  const clamp = (v,a,b) => Math.max(a, Math.min(b, v));

  // --- tree helpers --------------------------------------------------------
  // DEEP recursive clone - branches can now nest arbitrarily (a real tree).
  const cloneNode = c => ({ play:c.play, sit:c.sit, tag:c.tag || "",
    left:(c.left || []).map(cloneNode), right:(c.right || []).map(cloneNode) });
  const cloneDrive = d => ({ main: d.main.map(cloneNode) });
  const currentDrive = () => driveCustom || RECOMMENDED_DRIVE;
  function ensureEditable(){            // first mutation: deep-clone so the const stays pristine
    if(driveCustom === null) driveCustom = cloneDrive(RECOMMENDED_DRIVE);
    return driveCustom;
  }
  // A chain path is a list of (index, side) pairs that walks down branch chains:
  // [] = the trunk (drive.main); [2,"left"] = node #3's counter chain; etc.
  function resolveChain(drive, path){
    let chain = drive.main;
    for(let k = 0; k < path.length; k += 2){ chain = chain[path[k]][path[k+1]]; }
    return chain;
  }
  function resolveNode(drive, nodePath){      // odd-length: chain path + final index
    const chain = resolveChain(drive, nodePath.slice(0, -1));
    return chain[nodePath[nodePath.length - 1]];
  }
  const pathKey  = p => p.join(".");
  const chainKey = p => "c:" + p.join(".");
  const parseKey = k => k.replace(/^c:/, "").split(".").filter(s => s !== "")
                          .map(s => /^\d+$/.test(s) ? +s : s);
  // Subtitle = the REAL situation tag (down & distance / coverage / run type). For a
  // play dropped from "All Calls" (whole book) we fall back to the play's primary tag.
  function playPrimaryTag(p){
    if(!p) return "";
    const tags = p.tags || [];
    for(const s of DRIVE_SITUATIONS){
      if(s.top || s.all) continue;
      if(s.star){ if(p.type === "Star Play") return s.btn; continue; }
      if((s.tags || []).some(t => tags.includes(t))) return s.btn;
    }
    return p.formation || p.type || "";
  }
  function nodeSubtitle(node){
    if(node.sit && node.sit !== "All Calls") return node.sit;
    return playPrimaryTag(PLAYS.find(x => x.id === node.play));
  }

  // --- the build-mode web: a recursive PAN/ZOOM TREE -----------------------
  // Lay out a vertical SPINE that climbs from its attach point (0,0); the first call
  // sits at (0,-ROW). Each call can shoot a branch out left/right - the branch is laid
  // out as its OWN spine, then offset far enough sideways to clear EVERYTHING already
  // placed on that side, so chains can never land on top of each other. A branch's
  // first call + its incoming curved strand carry the side colour (green counter /
  // blue fallback); continue that chain and it goes gold ("yellow until you branch off
  // again"). Returns nodes/strands/addSlots in this frame plus the horizontal span
  // [spanMin,spanMax] the whole subtree occupies. up = -y.
  function layoutSpine(chain, chainPath, sideClass, connectBase){
    const res = { nodes:[], strands:[], addSlots:[] };
    let spanMin = -HALFW, spanMax = HALFW, prevY = 0;
    const isTrunk = sideClass === "";
    chain.forEach((node, idx) => {
      const y = prevY - ROW, path = [...chainPath, idx];
      const firstOfBranch = idx === 0 && !isTrunk;
      const goal     = isTrunk && idx === chain.length - 1;
      const chipCls  = goal ? "goal" : (firstOfBranch ? sideClass : "");
      const badge    = firstOfBranch ? (sideClass === "br-left" ? "★" : "↺") : String(idx + 1);
      const badgeCls = firstOfBranch ? sideClass : "";
      res.nodes.push({ x:0, y, path, name:playName(node.play), sub:nodeSubtitle(node),
        sit:node.sit, play:node.play, chipCls, badge, badgeCls });
      // spine segment (always gold - the trunk and any continued branch read gold)
      if(idx > 0 || connectBase)
        res.strands.push({ kind:"L", x1:0, y1:prevY, x2:0, y2:y, cls:"" });
      ["left","right"].forEach(side => {
        const br = node[side];
        if(br && br.length){
          const bCls = side === "left" ? "br-left" : "br-right";
          const sub = layoutSpine(br, [...path, side], bCls, false);
          // slide the branch subtree clear of whatever's already on that side
          const offset = side === "left" ? spanMin - GAP - sub.spanMax
                                         : spanMax + GAP - sub.spanMin;
          sub.nodes.forEach(n    => res.nodes.push({ ...n, x:n.x + offset, y:n.y + y }));
          sub.strands.forEach(s  => res.strands.push(shiftStrand(s, offset, y)));
          sub.addSlots.forEach(a => res.addSlots.push({ ...a, x:a.x + offset, y:a.y + y }));
          const fy = y - ROW;        // curved connector: shoot out, then curve vertical
          res.strands.push({ kind:"C", cls:bCls,
            x1:0, y1:y, c1x:offset * 0.45, c1y:y, c2x:offset, c2y:y - ROW * 0.5, x2:offset, y2:fy });
          spanMin = Math.min(spanMin, offset + sub.spanMin);
          spanMax = Math.max(spanMax, offset + sub.spanMax);
        }
      });
      prevY = y;
    });
    const tipY = prevY - ROW;
    res.addSlots.push({ x:0, y:tipY, chainPath });
    res.strands.push({ kind:"L", x1:0, y1:prevY, x2:0, y2:tipY, cls:"", stub:true });
    res.spanMin = spanMin; res.spanMax = spanMax;
    return res;
  }
  const shiftStrand = (s, dx, dy) => s.kind === "L"
    ? { ...s, x1:s.x1+dx, y1:s.y1+dy, x2:s.x2+dx, y2:s.y2+dy }
    : { ...s, x1:s.x1+dx, y1:s.y1+dy, c1x:s.c1x+dx, c1y:s.c1y+dy,
        c2x:s.c2x+dx, c2y:s.c2y+dy, x2:s.x2+dx, y2:s.y2+dy };
  const strandD = s => s.kind === "L"
    ? `M ${s.x1.toFixed(1)} ${s.y1.toFixed(1)} L ${s.x2.toFixed(1)} ${s.y2.toFixed(1)}`
    : `M ${s.x1.toFixed(1)} ${s.y1.toFixed(1)} C ${s.c1x.toFixed(1)} ${s.c1y.toFixed(1)}, ${s.c2x.toFixed(1)} ${s.c2y.toFixed(1)}, ${s.x2.toFixed(1)} ${s.y2.toFixed(1)}`;
  function applyTransform(){ canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`; }
  function fitWeb(ctx){
    const pts = ctx.nodes.map(n => ({ x:n.x, y:n.y })).concat(ctx.addSlots.map(s => ({ x:s.x, y:s.y })));
    if(!pts.length) pts.push({ x:0, y:0 });
    let minX=1e9, maxX=-1e9, minY=1e9, maxY=-1e9;
    pts.forEach(p => { minX=Math.min(minX,p.x); maxX=Math.max(maxX,p.x); minY=Math.min(minY,p.y); maxY=Math.max(maxY,p.y); });
    minX-=180; maxX+=180; minY-=80; maxY+=100;                 // pad for chip size
    const r = web.getBoundingClientRect(), W = r.width || 1000, H = r.height || 560;
    const treeW = Math.max(1, maxX-minX), treeH = Math.max(1, maxY-minY);
    zoom = clamp(Math.min((W*0.9)/treeW, (H*0.84)/treeH), 0.3, 1.12);
    panX = W/2 - ((minX+maxX)/2) * zoom;
    panY = H/2 - ((minY+maxY)/2) * zoom;
    applyTransform();
  }
  function renderWeb(){
    const main = currentDrive().main;
    const ctx = layoutSpine(main, [], "", true);
    strandsSvg.innerHTML = ctx.strands.map(s => {
      const d = strandD(s);
      const base = `<path class="db-tstrand ${s.cls}" d="${d}"/>`;
      return s.stub ? base
        : base + `<path class="db-tpulse ${s.cls}" pathLength="100" d="${d}"/>`;
    }).join("");
    let html = ctx.nodes.map(nd => {
      const key = pathKey(nd.path);
      return `<div class="db-tnode ${nd.chipCls} ${openMenuKey===key ? "menu-open":""}"
          data-key="${key}" style="left:${nd.x.toFixed(1)}px; top:${nd.y.toFixed(1)}px">
          <span class="db-tnum ${nd.badgeCls}">${nd.badge}</span>
          <span class="db-tnm">${nd.name}</span>
          ${nd.sub ? `<span class="db-tsub">${nd.sub}</span>` : ""}
          <div class="db-tactions">
            <span class="db-tact pos" data-act="left"  data-key="${key}">＋ Counter</span>
            <span class="db-tact neg" data-act="right" data-key="${key}">＋ Fallback</span>
            <span class="db-tact run" data-act="run"   data-key="${key}">▶ Open</span>
            <span class="db-tact rm"  data-act="rm"    data-key="${key}">Remove</span>
          </div>
        </div>`;
    }).join("");
    html += ctx.addSlots.map(sl => {
      const ck = chainKey(sl.chainPath);
      const isArmed = armed && chainKey(armed.chainPath) === ck;
      const label = (sl.chainPath.length === 0 && !main.length) ? "＋ Add the first call" : "＋ Add Call";
      return `<button class="db-tadd ${isArmed ? "armed":""}" data-chain="${ck}" style="left:${sl.x.toFixed(1)}px; top:${sl.y.toFixed(1)}px">${label}</button>`;
    }).join("");
    if(!main.length){
      html += `<div class="db-tempty" style="left:0px; top:${-ROW*2}px">Pick a look on the right, then tap <strong style="color:var(--gold)">＋</strong> on a play to drop in your opening call - branch any call left (counter) or right (fallback) to grow the tree.</div>`;
    }
    nodesLayer.innerHTML = html;
    wireWeb();
    driveCap.innerHTML = drivePromptText();
    if(needsFit){ fitWeb(ctx); needsFit = false; } else { applyTransform(); }
  }
  function drivePromptText(){
    if(armed){
      const p = armed.chainPath, last = p[p.length - 1];
      if(!p.length) return "Adding your next call - pick a look and tap <strong style=\"color:var(--gold)\">＋</strong> on a play.";
      if(last === "left")  return "Adding a <strong style=\"color:#7fe0a0\">counter</strong> (if they bite) - tap <strong style=\"color:var(--gold)\">＋</strong> on a play.";
      if(last === "right") return "Adding a <strong style=\"color:#9ab4ff\">fallback</strong> (if it stalls) - tap <strong style=\"color:var(--gold)\">＋</strong> on a play.";
      return "Adding to this branch - tap <strong style=\"color:var(--gold)\">＋</strong> on a play.";
    }
    if(driveCustom === null) return "King Reggie’s recommended drive - tap any call to branch it, or ＋ a play to make it your own. Drag to pan, scroll to zoom.";
    return currentDrive().main.length
      ? "Your drive - tap any call to branch a counter / fallback, or ＋ a play to extend it. Drag to pan, scroll to zoom."
      : "Empty drive - pick a look and tap ＋ on a play to start your script.";
  }
  function wireWeb(){
    nodesLayer.querySelectorAll(".db-tadd").forEach(b =>
      b.addEventListener("click", (e) => {
        e.stopPropagation();
        const cp = parseKey(b.dataset.chain);
        armed = (armed && chainKey(armed.chainPath) === chainKey(cp)) ? null : { chainPath:cp };
        openMenuKey = null; renderWeb();
      }));
    nodesLayer.querySelectorAll(".db-tnode").forEach(node =>
      node.addEventListener("click", (e) => {
        if(e.target.closest(".db-tact")) return;
        if(wasPanning) return;                       // ignore the click that ended a drag
        const key = node.dataset.key;
        openMenuKey = (openMenuKey === key) ? null : key;
        armed = null; renderWeb();
      }));
    nodesLayer.querySelectorAll(".db-tact").forEach(b =>
      b.addEventListener("click", (e) => {
        e.stopPropagation();
        const path = parseKey(b.dataset.key), act = b.dataset.act;
        if(act === "left" || act === "right"){
          armed = { chainPath:[...path, act] };       // branch chain = node[side]
          openMenuKey = null; renderWeb();
        } else if(act === "run"){
          const node = resolveNode(currentDrive(), path);
          openMenuKey = null; if(node) runDriveCall(node.sit, node.play);
        } else if(act === "rm"){
          ensureEditable();
          const container = resolveChain(driveCustom, path.slice(0, -1));
          container.splice(path[path.length - 1], 1);
          openMenuKey = null; armed = null; renderWeb();
        }
      }));
  }
  // The single "add a play to the drive" entry point (left-list ＋ and play-card ＋).
  // Appends to whatever chain is armed (a branch, or the trunk by default).
  function addCall(playId, sit, tag){
    ensureEditable();
    const c = dcall(playId, sit, tag || "");
    const path = (armed && armed.chainPath) ? armed.chainPath : [];
    resolveChain(driveCustom, path).push(c);
    armed = null;                       // keep the user's pan/zoom - the canvas is theirs
    if(buildOpen()) renderWeb();
  }
  // --- pan / zoom on the web canvas (wired once) ---------------------------
  let panning = false, wasPanning = false, startX = 0, startY = 0, startPanX = 0, startPanY = 0;
  web.addEventListener("pointerdown", (e) => {
    if(!buildOpen()) return;
    wasPanning = false;
    if(e.target.closest(".db-tnode, .db-tadd, .db-tact")) return;   // chips handle their own clicks
    panning = true; startX = e.clientX; startY = e.clientY; startPanX = panX; startPanY = panY;
    canvas.style.transition = "none"; web.classList.add("grabbing");
    try { web.setPointerCapture(e.pointerId); } catch(_){}
  });
  web.addEventListener("pointermove", (e) => {
    if(!panning) return;
    const dx = e.clientX - startX, dy = e.clientY - startY;
    if(Math.abs(dx) + Math.abs(dy) > 4) wasPanning = true;
    panX = startPanX + dx; panY = startPanY + dy; applyTransform();
  });
  function endPan(){ if(!panning) return; panning = false; web.classList.remove("grabbing"); canvas.style.transition = ""; }
  web.addEventListener("pointerup", endPan);
  web.addEventListener("pointercancel", endPan);
  web.addEventListener("wheel", (e) => {
    if(!buildOpen()) return;
    e.preventDefault();
    const r = web.getBoundingClientRect(), mx = e.clientX - r.left, my = e.clientY - r.top;
    const old = zoom, vx = (mx - panX) / old, vy = (my - panY) / old;
    zoom = clamp(zoom * (e.deltaY < 0 ? 1.12 : 0.89), 0.35, 1.5);
    panX = mx - vx * zoom; panY = my - vy * zoom;
    canvas.style.transition = "none"; applyTransform();
  }, { passive:false });
  // a non-drag click on empty canvas closes any open menu / disarms
  web.addEventListener("click", (e) => {
    if(!buildOpen() || wasPanning) return;
    if(e.target.closest(".db-tnode, .db-tact, .db-tadd")) return;
    if(openMenuKey !== null || armed !== null){ openMenuKey = null; armed = null; renderWeb(); }
  });

  // --- See-on-Field zoom (no drag - just scroll/trackpad to zoom toward the
  //     cursor. The whole field + drive scale together so chips stay on the grass;
  //     the static build field is hidden via .revealing so there's no duplicate). -
  const revealOpen = () => drivelayer.classList.contains("open");
  function applyRevealTransform(){
    if(!driveField) return;
    driveField.style.transform = `translate(${rPanX}px, ${rPanY}px) scale(${rZoom})`;
  }
  drivelayer.addEventListener("wheel", (e) => {
    if(!revealOpen()) return;
    e.preventDefault();
    // zoom toward the cursor. field is grid-centered, transform-origin center, so
    // its center sits at the layer's center C; solve for pan that keeps the cursor fixed.
    const r = drivelayer.getBoundingClientRect();
    const cx = r.width / 2, cy = r.height / 2;
    const mx = (e.clientX - r.left) - cx, my = (e.clientY - r.top) - cy;
    const old = rZoom, vx = (mx - rPanX) / old, vy = (my - rPanY) / old;
    rZoom = clamp(rZoom * (e.deltaY < 0 ? 1.12 : 0.89), 1, 3.2);
    rPanX = mx - vx * rZoom; rPanY = my - vy * rZoom;
    if(rZoom === 1){ rPanX = 0; rPanY = 0; }         // snap back to framed at min zoom
    driveField.style.transition = "none"; applyRevealTransform();
  }, { passive:false });

  // --- build mode open / minimize -----------------------------------------
  const buildOpen = () => web.classList.contains("open");
  function openBuild(){
    closeReveal();                                // never show the field reveal at the same time
    stage.classList.add("building");              // blur the field, keep side lists sharp
    openMenuKey = null; armed = null; needsFit = true;
    web.classList.add("open"); drivebar.classList.add("open"); driveCap.classList.add("open");
    renderWeb();                                  // fit needs the web's measured size, so render after .open
  }
  function closeBuild(){                           // MINIMIZE - keep the drive intact
    stage.classList.remove("building");
    web.classList.remove("open"); drivebar.classList.remove("open"); driveCap.classList.remove("open");
    armed = null; openMenuKey = null;
  }

  // --- See the Drive on the Field (read-only projection onto the grass) ----
  function depthScale(y){
    const t = (FIELD_GEO.botY - y) / (FIELD_GEO.botY - FIELD_GEO.topY);   // 0 near → 1 far
    return (1 - 0.30 * Math.max(0, Math.min(1, t))).toFixed(3);
  }
  function renderReveal(){
    // Project the SAME no-overlap tree the build canvas draws (layoutSpine) onto
    // the grass, in perspective: trunk climbs up the field, branches peel L/R,
    // everything cropped to the teal sidelines. See-on-Field == "their drive."
    const ctx = layoutSpine(currentDrive().main, [], "", true);
    if(!ctx.nodes.length){ driveweb.innerHTML = ""; drivenodes.innerHTML = ""; return; }
    // abstract tree bounds (node coords only; ignore the dangling "add" stubs)
    let yMin = 1e9, yMax = -1e9, halfSpan = 1;
    ctx.nodes.forEach(n => { yMin = Math.min(yMin, n.y); yMax = Math.max(yMax, n.y);
                             halfSpan = Math.max(halfSpan, Math.abs(n.x)); });
    // depth: the nearest row (yMax, the trunk's first call) lands at the near hash;
    // the whole tree climbs toward the back end zone.
    const NEAR_Y = 350, FAR_Y = 132, FILL = 0.86, ySpan = (yMax - yMin) || 1;
    const projY = ay => NEAR_Y - ((yMax - ay) / ySpan) * (NEAR_Y - FAR_Y);
    // width: trunk centered (frac .5); widest branch reaches ~FILL of the way to
    // the teal line; clamp keeps every chip just inside the sidelines (the crop).
    const projFrac = ax => clamp(0.5 + 0.5 * (ax / halfSpan) * FILL, 0.04, 0.96);
    const projX = (ax, ay) => fieldFracX(projY(ay), projFrac(ax));
    const pt = (x, y) => `${projX(x, y).toFixed(1)} ${projY(y).toFixed(1)}`;
    const fieldCls = c => c === "br-left" ? "pos" : c === "br-right" ? "alt" : c; // "" | "goal"
    // strands - reuse layoutSpine's structured paths, drop the tip stubs
    driveweb.innerHTML = ctx.strands.filter(s => !s.stub).map(s => {
      const d = s.kind === "L"
        ? `M ${pt(s.x1, s.y1)} L ${pt(s.x2, s.y2)}`
        : `M ${pt(s.x1, s.y1)} C ${pt(s.c1x, s.c1y)}, ${pt(s.c2x, s.c2y)}, ${pt(s.x2, s.y2)}`;
      const cls = fieldCls(s.cls);
      return `<path class="db-strand ${cls || ""}" d="${d}"/>` +
             `<path class="db-fpulse ${cls || ""}" pathLength="100" d="${d}"/>`;
    }).join("");
    // nodes - same badge/color semantics as the build tree
    const nodes = ctx.nodes.map(nd => ({ ...nd, fx: projX(nd.x, nd.y), fy: projY(nd.y),
                                         fcls: fieldCls(nd.chipCls), sc: depthScale(projY(nd.y)) }));
    drivenodes.innerHTML = nodes.map((nd, i) =>
      `<button class="db-fnode ${nd.fcls}" data-idx="${i}"
          style="left:${(nd.fx / 1000 * 100).toFixed(2)}%; top:${(nd.fy / 558 * 100).toFixed(2)}%; --sc:${nd.sc}">
          <span class="db-fnode-num">${nd.badge}</span>
          <span class="db-fnode-name">${nd.name}</span>
          ${nd.sub ? `<span class="db-fnode-tag">${nd.sub}</span>` : ""}
        </button>`).join("");
    drivenodes.querySelectorAll(".db-fnode").forEach(btn => {
      const nd = nodes[+btn.dataset.idx];
      btn.addEventListener("click", () => runDriveCall(nd.sit, nd.play));
    });
  }
  function seeOnField(){
    const needReset = activeIndex >= 0;
    closeBuild();
    if(needReset) resetToFull();                  // the reveal lives on the full wide field
    rPanX = 0; rPanY = 0; rZoom = 1; applyRevealTransform();   // start framed, un-zoomed
    renderReveal();
    setTimeout(() => {
      drivelayer.classList.add("open"); drivebar.classList.add("open"); driveCap.classList.add("open");
      stage.classList.add("revealing");           // hide the static build field beneath
      driveCap.innerHTML = "Your drive mapped on the field - scroll to zoom toward your cursor, tap any call to run it.";
    }, needReset ? 700 : 60);
  }
  function closeReveal(){ drivelayer.classList.remove("open"); stage.classList.remove("revealing"); }

  // Click any call (web node, branch, or field node) → fly to its look + open it.
  function runDriveCall(sit, playId){
    closeBuild(); closeReveal();
    const idx = DRIVE_SITUATIONS.findIndex(s => s.btn === sit);
    if(idx < 0) return;
    const already = (idx === activeIndex);
    const target = sits.querySelector(`.db-sit[data-i="${idx}"]`);
    if(!already && target){ navFromLadder = true; select(idx, target); navFromLadder = false; }
    if(playId){
      let ps = driveSitPlays(DRIVE_SITUATIONS[idx]);
      if(!ps.some(p => p.id === playId)){ const p = PLAYS.find(x => x.id === playId); if(p) ps = [p, ...ps]; }
      setTimeout(() => showPlayCall(playId, ps), already ? 140 : 780);
    }
  }
  let _driveSaving = false;
  async function saveGate(){
    if (_driveSaving) return;
    const ok = await skRequireLogin('save this drive');
    if (!ok) return;
    _driveSaving = true;
    driveCap.classList.add("open");
    driveCap.innerHTML = "Saving drive...";
    try {
      const snapshot = driveCustom || cloneDrive(RECOMMENDED_DRIVE);
      const firstNode = snapshot.main?.[0];
      const fp = firstNode ? PLAYS.find(p => p.id === firstNode.key) : null;
      const title = fp
        ? `${fp.name} Drive · ${new Date().toLocaleDateString()}`
        : `Drive · ${new Date().toLocaleDateString()}`;
      const { error } = await SK_AUTH.client.from('saved_drives')
        .insert({ member_id: SK_AUTH.memberId, scheme_key: SCHEME_CONFIG.schemeKey, title, data: snapshot });
      if (error) throw error;
      driveCap.innerHTML = `<strong style="color:var(--gold)">Drive saved!</strong> Find it in your coaching app under Play Library.`;
      skToast('Drive saved to your coaching app');
    } catch(e) {
      driveCap.innerHTML = `<strong style="color:#e55">Could not save</strong> — try again or check your connection.`;
    } finally {
      _driveSaving = false;
      setTimeout(() => driveCap.classList.remove("open"), 4000);
    }
  }

  buildBtn.addEventListener("click", () => buildOpen() ? closeBuild() : openBuild());
  inner.querySelector("#db-drive-close").addEventListener("click", () => { closeBuild(); closeReveal(); });
  inner.querySelector("#db-drive-field").addEventListener("click", seeOnField);
  inner.querySelector("#db-drive-clear").addEventListener("click", () => { driveCustom = { main:[] }; armed = null; openMenuKey = null; needsFit = true; renderWeb(); });
  inner.querySelector("#db-drive-reset").addEventListener("click", () => { driveCustom = null; armed = null; openMenuKey = null; needsFit = true; renderWeb(); });
  inner.querySelector("#db-drive-save").addEventListener("click", saveGate);

  inner.querySelector("#db-reset").addEventListener("click", resetToFull);
  // click empty field / backdrop → back to full field (ignore clicks on the UI pieces).
  // While building, the web canvas owns its own pan / click handling - leave it alone.
  stage.addEventListener("click", (e) => {
    if(buildOpen()) return;
    if(e.target.closest(".db-sits, .db-board, .db-pc-card, .db-plays, .db-reset, .db-build, .db-drivelayer, .db-drivebar, .db-web, .card-close")) return;
    resetToFull();
  });
}
